<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Fidelity Electromagnetism Simulation</title>
    <script>
        const TARGET_HASH = "596a81d15423beb932e31857b7c2f4296e4a885a94edfdadfc7cbeb4fc3289e4";

        async function verifyPageAccess() {
            document.documentElement.style.display = "none";

            const userInput = prompt("Classroom password required for this simulation:");

            if (userInput === null) {
                window.location.href = "../index.html";
                return;
            }

            const encoder = new TextEncoder();
            const data = encoder.encode(userInput);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

            if (hashHex === TARGET_HASH) {
                document.documentElement.style.display = "block";
            } else {
                alert("Incorrect password. Access denied.");
                window.location.href = "../index.html";
            }
        }

        verifyPageAccess();
    </script>

<script>
// ==========================================
// 1. PHYSICS ENGINE (Exact Discrete Causal)
// ==========================================
class PhysicsEngine {
    constructor() {
        this.mu_0 = 4 * Math.PI * 1e-7;
        this.R_res = 10.0;
        
        this.power_on = false;
        this.V = 12.0;
        this.N = 50.0;
        this.R_coil = 0.05;
        this.l_coil = 0.10;
        
        this.mu_r = 5000.0; 
        this.R_core = 0.04;
        this.l_core = 0.12;
        this.core_insertion = 0.0;
        
        this.z = 0.02;
        
        this.t = 0.0;
        this.I = 0.0;
        this.MAX_TIME = 45.0;
    }

    get_effective_mu() {
        let actual_r_core = Math.min(this.R_core, this.R_coil);
        let area_coil = Math.PI * Math.pow(this.R_coil, 2);
        let area_core = Math.PI * Math.pow(actual_r_core, 2);
        
        let fill_ratio_transverse = area_coil > 0 ? area_core / area_coil : 0;
        let overlap_length = Math.min(this.l_core * this.core_insertion, this.l_coil);
        let fill_ratio_longitudinal = this.l_coil > 0 ? overlap_length / this.l_coil : 0.0;
        
        return 1.0 + (this.mu_r - 1.0) * fill_ratio_transverse * fill_ratio_longitudinal;
    }

    get_inductance() {
        let area = Math.PI * Math.pow(this.R_coil, 2);
        let mu_eff = this.get_effective_mu();
        return (this.mu_0 * mu_eff * Math.pow(this.N, 2) * area) / Math.max(this.l_coil, 0.001);
    }

    step(dt) {
        if (this.t >= this.MAX_TIME) this.power_on = false;
        
        this.t += dt;
        let L = this.get_inductance();
        let V_applied = this.power_on ? this.V : 0.0;
        
        let tau = this.R_res > 0 ? L / this.R_res : 1e-9;
        let I_steady = this.R_res > 0 ? V_applied / this.R_res : 0.0;
        
        // Exact solution: Only updates FUTURE current trajectory based on current parameters
        this.I = I_steady + (this.I - I_steady) * Math.exp(-dt / tau);
        
        if (!this.power_on && this.I < 1e-6) this.I = 0.0;
    }

    get_bz_array_mT(I_val, z_from_end) {
        let mu_eff = this.get_effective_mu();
        let z_from_center = (this.l_coil / 2.0) + z_from_end;
        let numerator = this.mu_0 * mu_eff * this.N * I_val * Math.pow(this.R_coil, 2);
        let denominator = 2 * Math.pow(Math.pow(z_from_center, 2) + Math.pow(this.R_coil, 2), 1.5);
        return (numerator / denominator) * 1000.0;
    }
}

// ==========================================
// 2. 5E INQUIRY MANAGER
// ==========================================
const PROMPTS = [
    {stage: "ENGAGE", text: "Turn the power switch ON. What happens to the magnetic field? Does it reach its maximum value instantly? Explain what you observe on the graph."},
    {stage: "EXPLORE", text: "Change the core material to Iron, then turn the power ON again. Slowly slide the core INTO the coil. How does the magnetic field change as the insertion increases?"},
    {stage: "EXPLAIN", text: "When you turn the power on, the current doesn't jump to maximum instantly because the coil resists sudden changes. Based on the graph, how does inserting the Iron core change the time it takes for the magnetic field to reach its steady peak?"},
    {stage: "ELABORATE", text: "Move the Sensor to 2.0 cm, note the peak value, then move it to 4.0 cm. Is the magnetic field exactly half as strong at twice the distance? What does this tell you about how magnetic fields behave?"},
    {stage: "EVALUATE", text: "Based on your experimentation with the simulation, what are the key factors that cause an increase in the magnetic field strength of the electromagnet? Summarize your conclusions."}
];

let inqIdx = 0;
let inqAnswers = ["", "", "", "", ""];

function loadInq() {
    try {
        let d = JSON.parse(localStorage.getItem("solenoid_lab"));
        if(d) { inqIdx = d.idx; inqAnswers = d.ans; }
    } catch(e){}
    syncInqUI();
}

function inqSave(showMsg=false) {
    inqAnswers[inqIdx] = document.getElementById("inq-answer").value;
    localStorage.setItem("solenoid_lab", JSON.stringify({idx: inqIdx, ans: inqAnswers}));
    if(showMsg) document.getElementById("inq-status").innerText = "Progress saved at " + new Date().toLocaleTimeString();
}

function inqNav(dir) {
    inqSave();
    inqIdx += dir;
    syncInqUI();
}

function syncInqUI() {
    document.getElementById("inq-stage").innerText = "STAGE: " + PROMPTS[inqIdx].stage;
    document.getElementById("inq-counter").innerText = `Prompt ${inqIdx+1} of 5`;
    document.getElementById("inq-prompt").innerText = PROMPTS[inqIdx].text;
    document.getElementById("inq-answer").value = inqAnswers[inqIdx];
    
    document.getElementById("btn-prev").disabled = (inqIdx === 0);
    document.getElementById("btn-next").disabled = (inqIdx === 4);
}

async function inqExport() {
    inqSave();
    if(!window.docx) { alert("Missing DOCX Library."); return; }
    let name = prompt("Student Identification:\nEnter your full name for the report cover:", "Student Name");
    if(!name) return;

    const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;
    
    let children = [
        new Paragraph({ text: "Electromagnetism Simulation Lab Report", heading: HeadingLevel.TITLE }),
        new Paragraph(`Student Name: ${name}`),
        new Paragraph(`Date: ${new Date().toLocaleString()}\n\n`)
    ];

    for(let i=0; i<PROMPTS.length; i++) {
        children.push(new Paragraph({ text: `Part ${i+1}: ${PROMPTS[i].stage}`, heading: HeadingLevel.HEADING_1 }));
        children.push(new Paragraph({ children: [new TextRun({ text: PROMPTS[i].text, italics: true })] }));
        children.push(new Paragraph(inqAnswers[i] ? inqAnswers[i].trim() : "[No answer provided]"));
        children.push(new Paragraph(""));
    }

    const doc = new Document({ sections: [{ properties: {}, children: children }] });
    const blob = await Packer.toBlob(doc);
    saveAs(blob, "Electromagnetism_Lab.docx");
    document.getElementById("inq-status").innerText = "DOCX Generation Complete.";
}


// ==========================================
// 3. MAIN APPLICATION & RENDERING
// ==========================================
const phys = new PhysicsEngine();

// Data Buffers (Immutable History)
const MAX_POINTS = 3000;
let time_data = new Float32Array(MAX_POINTS);
let b_data = new Float32Array(MAX_POINTS);
let data_idx = 0;

let chart;
let lastTime = performance.now();

// UI Mapping
const SLIDER_CONFIGS = [
    {id: 'v', label: 'Voltage (V)', min: 1, max: 48, def: 12, target: 'V', cont: 'sliders-container'},
    {id: 'n', label: 'Turns (N)', min: 10, max: 100, def: 50, target: 'N', cont: 'sliders-container'},
    {id: 'rc', label: 'Coil Radius (m)', min: 0.01, max: 0.15, def: 0.05, target: 'R_coil', cont: 'sliders-container'},
    {id: 'rco', label: 'Core Radius (m)', min: 0.01, max: 0.15, def: 0.04, target: 'R_core', cont: 'sliders-container-2'},
    {id: 'lco', label: 'Core Length (m)', min: 0.02, max: 0.40, def: 0.12, target: 'l_core', cont: 'sliders-container-2'},
    {id: 'ins', label: 'Core Insertion (%)', min: 0, max: 100, def: 0, target: 'core_insertion', cont: 'sliders-container-2', scale: 0.01},
    {id: 'z', label: 'Sensor Z (m)', min: 0, max: 0.60, def: 0.02, target: 'z', cont: 'sliders-container-2'}
];

function buildControls() {
    SLIDER_CONFIGS.forEach(cfg => {
        let div = document.createElement('div');
        div.className = 'control-row';
        let lblColor = cfg.id === 'ins' ? 'style="color: var(--gold);"' : '';
        let sVal = ((cfg.def - cfg.min)/(cfg.max - cfg.min))*1000;
        
        div.innerHTML = `
            <label ${lblColor}>${cfg.label}</label>
            <input type="range" id="sl_${cfg.id}" min="0" max="1000" value="${sVal}">
            <input type="number" id="sp_${cfg.id}" min="${cfg.min}" max="${cfg.max}" step="0.001" value="${cfg.def}">
        `;
        document.getElementById(cfg.cont).appendChild(div);

        let sl = document.getElementById(`sl_${cfg.id}`);
        let sp = document.getElementById(`sp_${cfg.id}`);

        sl.oninput = (e) => {
            let v = cfg.min + (e.target.value/1000)*(cfg.max - cfg.min);
            sp.value = v.toFixed(3);
            phys[cfg.target] = cfg.scale ? v * cfg.scale : v;
            drawSchematic(); // ONLY update visuals. Data evolves naturally into the future.
        };
        sp.oninput = (e) => {
            let v = parseFloat(e.target.value) || cfg.def;
            sl.value = ((v - cfg.min)/(cfg.max - cfg.min))*1000;
            phys[cfg.target] = cfg.scale ? v * cfg.scale : v;
            drawSchematic();
        };
    });
}

function updateCore() {
    phys.mu_r = parseFloat(document.getElementById("cb_core").value);
    drawSchematic();
}

function togglePower() {
    if (phys.t >= phys.MAX_TIME) {
        alert("The 45-second simulation window has completed. Please press Reset to start again.");
        return;
    }
    phys.power_on = !phys.power_on;
    let btn = document.getElementById("btn-power");
    if(phys.power_on) {
        btn.innerText = "⏻ MASTER POWER: ON";
        btn.classList.add("on");
    } else {
        btn.innerText = "⏻ MASTER POWER: OFF";
        btn.classList.remove("on");
    }
    drawSchematic();
}

function resetSimulation() {
    phys.power_on = false;
    let btn = document.getElementById("btn-power");
    btn.innerText = "⏻ MASTER POWER: OFF";
    btn.classList.remove("on");
    
    phys.t = 0.0;
    phys.I = 0.0;
    data_idx = 0;
    
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    
    // Reset axis panning
    chart.options.scales.x.min = 0;
    chart.options.scales.x.max = 10;
    chart.update();
    
    drawSchematic();
}

function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(`tab-${tabId}`).classList.add('active');
}


// --- GRAPHING (Chart.js) ---
function initGraph() {
    const ctx = document.getElementById('graph-canvas').getContext('2d');
    
    let grad = ctx.createLinearGradient(0, 0, 0, 400);
    grad.addColorStop(0, 'rgba(0, 229, 255, 0.4)');
    grad.addColorStop(1, 'rgba(0, 229, 255, 0.0)');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Sensor (Cyan)',
                borderColor: '#00E5FF',
                backgroundColor: grad,
                borderWidth: 3,
                pointRadius: 0,
                fill: true,
                data: [],
                tension: 0.1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false, // Critical for fast 60fps pushing
            parsing: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false }
            },
            scales: {
                x: { type: 'linear', grid: { color: 'rgba(255,255,255,0.1)' }, min: 0, max: 10 },
                y: { 
                    type: 'linear', 
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    suggestedMin: 0, suggestedMax: 1 // Prevents initial flatline glitch
                }
            }
        }
    });

    // Custom Hover Telemetry targeting Historical Data perfectly
    const canvas = document.getElementById('graph-canvas');
    const tooltip = document.getElementById('chartjs-tooltip');
    
    canvas.onmousemove = (e) => {
        if(data_idx === 0) return;
        const rect = canvas.getBoundingClientRect();
        const x_px = e.clientX - rect.left;
        
        const xScale = chart.scales.x;
        const x_val = xScale.getValueForPixel(x_px);
        
        // Find closest historical data point
        let minDiff = Infinity;
        let idx = 0;
        for(let i=0; i<data_idx; i++) {
            let diff = Math.abs(time_data[i] - x_val);
            if(diff < minDiff) { minDiff = diff; idx = i; }
        }
        
        let t = time_data[idx];
        let b = b_data[idx];
        
        let px_x = xScale.getPixelForValue(t);
        let py_y = chart.scales.y.getPixelForValue(b);
        
        tooltip.style.opacity = 1;
        tooltip.style.left = (px_x + rect.left) + 'px';
        tooltip.style.top = (py_y + rect.top - 10) + 'px';
        tooltip.innerHTML = `Time: ${t.toFixed(2)} s<br><span style="color:#00E5FF; font-weight:bold;">B Field: ${b.toFixed(3)} mT</span>`;
    };
    canvas.onmouseleave = () => tooltip.style.opacity = 0;
}

// --- SCHEMATIC DRAWING (HTML5 Canvas) ---
let isDraggingSensor = false;

function initSchematic() {
    const canvas = document.getElementById('schematic-canvas');
    
    canvas.onmousedown = (e) => {
        let rect = canvas.getBoundingClientRect();
        let mx = e.clientX - rect.left;
        let sensorPx = mapX(phys.l_coil + phys.z, canvas.width);
        if(Math.abs(mx - sensorPx) < 15) isDraggingSensor = true;
    };
    
    window.onmouseup = () => isDraggingSensor = false;
    
    window.onmousemove = (e) => {
        if(!isDraggingSensor) return;
        let rect = canvas.getBoundingClientRect();
        let mx = e.clientX - rect.left;
        
        // Inverse Map X to real world bounds
        let worldX = -0.22 + (mx / canvas.width) * 0.67;
        let newZ = Math.max(0, worldX - phys.l_coil);
        newZ = Math.min(newZ, 0.60); 
        
        phys.z = newZ;
        document.getElementById('sl_z').value = (newZ / 0.60) * 1000;
        document.getElementById('sp_z').value = newZ.toFixed(3);
        drawSchematic(); // Only visual changes. Data evolves naturally.
    };
}

// Coordinate Mapping [-0.22 to 0.45] X (Wider left bound so core is visible!), [-0.25 to 0.25] Y
function mapX(x, w) { return ((x - -0.22) / 0.67) * w; }
function mapY(y, h) { return h - ((y - -0.25) / 0.50) * h; }

function drawSchematic() {
    const canvas = document.getElementById('schematic-canvas');
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    const ctx = canvas.getContext('2d');
    let cw = canvas.width, ch = canvas.height;

    ctx.clearRect(0, 0, cw, ch);
    
    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<cw; i+=40) { ctx.moveTo(i, 0); ctx.lineTo(i, ch); }
    for(let i=0; i<ch; i+=40) { ctx.moveTo(0, i); ctx.lineTo(cw, i); }
    ctx.stroke();

    // Base Circuit
    ctx.fillStyle = '#282832'; ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
    ctx.fillRect(mapX(-0.15, cw), mapY(-0.15, ch), mapX(-0.09, cw)-mapX(-0.15, cw), mapY(-0.19, ch)-mapY(-0.15, ch));
    ctx.strokeRect(mapX(-0.15, cw), mapY(-0.15, ch), mapX(-0.09, cw)-mapX(-0.15, cw), mapY(-0.19, ch)-mapY(-0.15, ch));
    
    ctx.fillStyle = '#969696'; ctx.fillRect(mapX(-0.09, cw), mapY(-0.16, ch), mapX(-0.08, cw)-mapX(-0.09, cw), mapY(-0.18, ch)-mapY(-0.16, ch));

    // Wires
    ctx.strokeStyle = '#555566'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(mapX(-0.08, cw), mapY(-0.17, ch)); ctx.lineTo(mapX(-0.04, cw), mapY(-0.17, ch));
    ctx.lineTo(mapX(-0.04, cw), mapY(phys.R_coil, ch)); ctx.lineTo(mapX(0, cw), mapY(phys.R_coil, ch));
    
    ctx.moveTo(mapX(phys.l_coil, cw), mapY(-phys.R_coil, ch)); ctx.lineTo(mapX(phys.l_coil+0.04, cw), mapY(-phys.R_coil, ch));
    ctx.lineTo(mapX(phys.l_coil+0.04, cw), mapY(-0.21, ch)); ctx.lineTo(mapX(-0.05, cw), mapY(-0.21, ch));
    ctx.moveTo(mapX(-0.12, cw), mapY(-0.21, ch)); ctx.lineTo(mapX(-0.12, cw), mapY(-0.19, ch));
    ctx.stroke();

    // Switch & LED
    ctx.lineWidth = 4;
    ctx.beginPath();
    if(phys.power_on) {
        ctx.strokeStyle = '#00FF7F';
        ctx.moveTo(mapX(-0.05, cw), mapY(-0.21, ch)); ctx.lineTo(mapX(-0.12, cw), mapY(-0.21, ch));
        ctx.fillStyle = '#00FF7F';
    } else {
        ctx.strokeStyle = '#FF3B30';
        ctx.moveTo(mapX(-0.05, cw), mapY(-0.21, ch)); ctx.lineTo(mapX(-0.10, cw), mapY(-0.17, ch));
        ctx.fillStyle = 'rgba(255, 59, 48, 0.3)';
    }
    ctx.stroke();
    ctx.beginPath(); ctx.arc(mapX(-0.135, cw), mapY(-0.175, ch), 4, 0, Math.PI*2); ctx.fill();

    // COIL (Back)
    let n_vis = Math.min(Math.floor(phys.N), 30);
    let l_spc = phys.l_coil / Math.max(1, n_vis);
    
    ctx.strokeStyle = '#A04000'; ctx.lineWidth = 9;
    for(let i=0; i<n_vis; i++) {
        ctx.beginPath();
        let cx = mapX(i*l_spc + l_spc*0.5, cw);
        let cy = mapY(0, ch);
        let rx = mapX(l_spc*0.6, cw) - mapX(0, cw);
        let ry = mapY(0, ch) - mapY(phys.R_coil, ch);
        ctx.ellipse(cx, cy, rx, ry, 0, 1.5*Math.PI, 0.5*Math.PI, true);
        ctx.stroke();
    }

    // CORE (Dynamic Gradients based on Material)
    let r_c = Math.min(phys.R_core, phys.R_coil * 0.95);
    let c_w = mapX(phys.l_core, cw) - mapX(0, cw);
    let c_h = mapY(-r_c, ch) - mapY(r_c, ch);
    
    let f_in = mapX(phys.l_coil/2 - phys.l_core/2, cw);
    let f_out = mapX(-0.15, cw); // Hardcoded visible start position outside the coil
    let c_x = f_out + (f_in - f_out) * phys.core_insertion;
    let c_y = mapY(r_c, ch);

    let grad = ctx.createLinearGradient(0, c_y, 0, c_y + c_h);
    let idx = document.getElementById("cb_core").selectedIndex;
    if(idx === 0) grad = 'rgba(0,0,0,0)';
    else if(idx === 1) grad = 'rgba(255,255,255,0.05)';
    else if(idx === 2) { grad.addColorStop(0,'#B4B4BE'); grad.addColorStop(0.5,'#DCDCE6'); grad.addColorStop(1,'#8C8C96'); }
    else if(idx === 3) { grad.addColorStop(0,'#464B50'); grad.addColorStop(0.5,'#78828C'); grad.addColorStop(1,'#32373C'); }
    else if(idx === 4) { grad.addColorStop(0,'#28140F'); grad.addColorStop(0.5,'#503228'); grad.addColorStop(1,'#1E0F0A'); }
    else if(idx === 5) { grad.addColorStop(0,'#28282D'); grad.addColorStop(0.5,'#64646E'); grad.addColorStop(1,'#1E1E23'); }
    else if(idx === 6) { grad.addColorStop(0,'#5A6E5A'); grad.addColorStop(0.5,'#96AA96'); grad.addColorStop(1,'#465A46'); }

    ctx.fillStyle = grad; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
    if(idx > 1) { ctx.fillRect(c_x, c_y, c_w, c_h); ctx.strokeRect(c_x, c_y, c_w, c_h); }

    // COIL (Front with Specular Highlight)
    for(let i=0; i<n_vis; i++) {
        let cx = mapX(i*l_spc + l_spc*0.5, cw);
        let cy = mapY(0, ch);
        let rx = mapX(l_spc*0.6, cw) - mapX(0, cw);
        let ry = mapY(0, ch) - mapY(phys.R_coil, ch);
        
        ctx.strokeStyle = '#E67E22'; ctx.lineWidth = 9;
        ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0.5*Math.PI, 1.5*Math.PI, true); ctx.stroke();
        
        ctx.strokeStyle = '#F1C40F'; ctx.lineWidth = 2.5; 
        ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0.5*Math.PI, 1.5*Math.PI, true); ctx.stroke();
    }

    // SENSOR
    let sx = mapX(phys.l_coil + phys.z, cw);
    ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 3; ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, ch); ctx.stroke(); ctx.setLineDash([]);
    
    ctx.fillStyle = '#00E5FF'; ctx.font = "bold 13px sans-serif";
    ctx.fillText(`Sensor Z: ${(phys.z*100).toFixed(1)} cm`, sx + 8, mapY(0.20, ch));
}

// --- MAIN LOOP (FORWARD CAUSAL TIME) ---
function updateLoop() {
    let now = performance.now();
    let dt = (now - lastTime) / 1000.0;
    lastTime = now;
    if(dt > 0.1) dt = 0.1;
    
    phys.step(dt);
    
    if (phys.t >= phys.MAX_TIME && phys.power_on) {
        phys.power_on = false;
        let btn = document.getElementById("btn-power");
        btn.classList.remove("on");
        btn.innerText = "⏻ MASTER POWER: OFF (TIME UP)";
        drawSchematic();
    }
    
    document.title = `Time: ${phys.t.toFixed(2)}s / ${phys.MAX_TIME}s`;
    
    if (data_idx < MAX_POINTS) {
        let current_b = phys.get_bz_array_mT(phys.I, phys.z);

        time_data[data_idx] = phys.t;
        b_data[data_idx] = current_b;
        
        chart.data.datasets[0].data.push({x: phys.t, y: current_b});
        data_idx++;
        
        // Auto-Pan X-Axis
        if(phys.t > chart.options.scales.x.max * 0.95) {
            chart.options.scales.x.max = phys.t + 5;
            chart.options.scales.x.min = Math.max(0, phys.t - 15);
        }
        
        // By calling update() naturally, Y-Axis scales perfectly to the full data history!
        chart.update('none'); 
    }
    
    if(phys.power_on) drawSchematic(); // Animate if active
    requestAnimationFrame(updateLoop);
}

// Boot
buildControls();
loadInq();
initGraph();
initSchematic();
updateCore(); 
window.addEventListener('resize', drawSchematic);

// Ensure a pre-draw and start
setTimeout(() => { drawSchematic(); chart.update(); }, 100);
requestAnimationFrame(updateLoop);

</script>
