<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rolling With Slipping Top Spin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e1a;color:#e0e0e0;font-family:'Segoe UI',Arial,sans-serif;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#app-title{text-align:center;font-size:17px;font-weight:bold;letter-spacing:5px;
  color:rgba(255,255,255,0.61);padding:8px 0;}
#controls{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;padding:10px 14px;margin:6px 14px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  box-shadow:0 3px 24px rgba(0,0,0,0.5);}
.slider-label{font-size:10px;color:rgba(255,255,255,0.55);}
input[type=range]{-webkit-appearance:none;width:160px;height:6px;
  background:rgba(255,255,255,0.12);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:#64b5f6;cursor:pointer;}
.slider-val{font-family:monospace;font-size:10px;color:#90caf9;min-width:45px;}
.vdiv{width:1px;align-self:stretch;background:rgba(255,255,255,0.1);margin:0 4px;}
.cb-group{display:flex;flex-direction:column;gap:3px;}
.cb-title{font-size:11px;font-weight:bold;color:rgba(255,255,255,0.42);margin-bottom:2px;}
.cb-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#b0b0b0;cursor:pointer;}
.cb-row input{accent-color:#7c4dff;width:14px;height:14px;}
.btn-group{display:flex;flex-direction:column;gap:6px;}
button{font-family:'Segoe UI',Arial,sans-serif;font-size:11px;font-weight:bold;
  letter-spacing:1px;border:none;border-radius:8px;padding:8px 18px;
  color:#fff;cursor:pointer;transition:background 0.15s;min-width:160px;}
button:disabled{background:rgba(255,255,255,0.06)!important;
  color:rgba(255,255,255,0.25);cursor:default;}
#main{display:flex;gap:10px;flex:1;padding:0 14px 10px;min-height:0;}
canvas{display:block;border-radius:10px;}
#simCanvas{flex:5;min-width:0;}
#graphCanvas{flex:3;min-width:0;}
#eqPanel{width:230px;flex-shrink:0;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;}
#eqCanvas{width:100%;height:100%;}
</style>
</head>
<body>
<div id="app-title">ROLLING WITH SLIPPING TOP SPIN</div>
<div id="controls"></div>
<div id="main">
  <canvas id="simCanvas"></canvas>
  <canvas id="graphCanvas"></canvas>
  <div id="eqPanel"><canvas id="eqCanvas"></canvas></div>
</div>
<script>
"use strict";
class BallPhysics {
    constructor() {
        this.R = 40.0;
        this.mass = 1.0;
        this.g = 400.0;
        this.mu = 0.35;
        this.omega_0 = 15.0;
        this.reset();
    }

    reset() {
        this.t = 0.0;
        this.omega = this.omega_0;
        this.v_cm = 0.0;
        this.theta = 0.0;
        this.x_cm = 0.0;
        this.phase = "hovering";

        this.drop_start_y = 0.0;
        this.y_cm = 0.0;
        this.y_target = 0.0;
        this.drop_v = 0.0;
        this.hover_elapsed = 0.0;

        this.drop_x = 0.0;

        this.recalc_analytical();

        this.hist_t = [];
        this.hist_v = [];
        this.hist_omega = [];
        this.hist_Romega = [];
        this.hist_vcontact = [];
    }

    recalc_analytical() {
        let d = 7.0 * this.mu * this.g;
        if (d < 1e-9) {
            this.t_r = Infinity;
            this.v_r = 0.0;
            this.omega_r = 0.0;
        } else {
            this.t_r = 2.0 * this.R * this.omega_0 / d;
            this.v_r = 2.0 * this.R * this.omega_0 / 7.0;
            this.omega_r = 2.0 * this.omega_0 / 7.0;
        }
    }

    step(dt) {
        if (this.phase === "hovering") {
            this.theta += this.omega * dt;
            this.hover_elapsed += dt;
            if (this.hover_elapsed >= 1.8) {
                this.phase = "falling";
                this.drop_v = 0.0;
            }
            return;
        }

        if (this.phase === "falling") {
            this.drop_v += 650.0 * dt;
            this.y_cm += this.drop_v * dt;
            this.theta += this.omega * dt;
            if (this.y_cm >= this.y_target) {
                this.y_cm = this.y_target;
                this.drop_v = 0.0;
                this.phase = "slipping";
                this.t = 0.0;
                this.v_cm = 0.0;
            }
            return;
        }

        if (this.phase === "slipping") {
            this.t += dt;
            let a_cm = this.mu * this.g;
            let alpha = -5.0 * this.mu * this.g / (2.0 * this.R);
            this.v_cm += a_cm * dt;
            this.omega += alpha * dt;
            if (this.omega < 0) {
                this.omega = 0.0;
            }
            if (this.v_cm >= this.R * this.omega) {
                this.v_cm = this.v_r;
                this.omega = this.omega_r;
                this.t = this.t_r;
                this.phase = "rolling";
            }
        }

        if (this.phase === "rolling") {
            if (this.t < this.t_r) {
                this.t = this.t_r;
            }
            this.t += dt;
        }

        this.x_cm += this.v_cm * dt;
        this.theta += this.omega * dt;

        let Rw = this.R * this.omega;
        let vc = this.v_cm - Rw;
        this.hist_t.push(this.t);
        this.hist_v.push(this.v_cm);
        this.hist_omega.push(this.omega);
        this.hist_Romega.push(Rw);
        this.hist_vcontact.push(vc);
    }
}

class SimCanvas {
    constructor(phy, canvas) {
        this.GROUND_FRAC = 0.72;
        this.phy = phy;
        this.canvas = canvas;
        this.ctx = this.canvas.getContext('2d');
        this.show_vcm = true;
        this.show_Rw = true;
        this.show_friction = true;
        this.show_weight = false;
        this.show_normal = false;
        this.sparks = [];
    }

    ground_y() {
        return Math.floor(this.canvas.height * this.GROUND_FRAC);
    }

    paintEvent() {
        let ctx = this.ctx;
        let w = this.canvas.width;
        let h = this.canvas.height;
        let gy = this.ground_y();
        let R = this.phy.R;
        let phy = this.phy;

        // Sky
        let sky = ctx.createLinearGradient(0, 0, 0, gy);
        sky.addColorStop(0.0, "#0b1120");
        sky.addColorStop(1.0, "#141e30");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, gy);

        // Ground
        let gnd = ctx.createLinearGradient(0, gy, 0, h);
        gnd.addColorStop(0.0, "#1a1a2e");
        gnd.addColorStop(1.0, "#0f0f1a");
        ctx.fillStyle = gnd;
        ctx.fillRect(0, gy, w, h - gy);

        // Ground line glow
        for (let i = 0; i < 5; i++) {
            let a = Math.max(5, 80 - i * 16);
            ctx.strokeStyle = `rgba(100, 200, 255, ${a / 255})`;
            ctx.lineWidth = 2.5 - i * 0.4;
            ctx.beginPath();
            ctx.moveTo(0, gy + i);
            ctx.lineTo(w, gy + i);
            ctx.stroke();
        }

        // Static hatching
        ctx.strokeStyle = "rgba(255, 255, 255, 0.07)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let xi = 0; xi <= w + 28; xi += 28) {
            ctx.moveTo(xi, gy + 3);
            ctx.lineTo(xi - 18, gy + 24);
        }
        ctx.stroke();

        // Compute ball screen position
        let drop_x = w * 0.18;
        let rest_y = gy - R;

        let bx, by;
        if (phy.phase === "hovering") {
            bx = drop_x;
            by = rest_y - 180;
        } else if (phy.phase === "falling") {
            bx = drop_x;
            by = phy.y_cm;
        } else {
            bx = drop_x + phy.x_cm;
            by = rest_y;
        }

        // Drop point marker
        if (phy.phase === "slipping" || phy.phase === "rolling") {
            if (phy.x_cm > 5) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
                ctx.lineWidth = 1;
                ctx.setLineDash([1, 2]);
                ctx.beginPath();
                ctx.moveTo(drop_x, gy - 50);
                ctx.lineTo(drop_x, gy);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.font = "8pt Segoe UI";
                ctx.fillStyle = "rgba(255, 255, 255, 0.16)";
                ctx.fillText("drop", drop_x + 4, gy - 54);

                // Distance line
                if (bx > drop_x && bx < w + 200) {
                    let ruler_y = gy + 28;
                    let draw_bx = Math.min(bx, w - 5);
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.16)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(drop_x, ruler_y);
                    ctx.lineTo(draw_bx, ruler_y);
                    ctx.moveTo(drop_x, ruler_y - 4);
                    ctx.lineTo(drop_x, ruler_y + 4);
                    ctx.moveTo(draw_bx, ruler_y - 4);
                    ctx.lineTo(draw_bx, ruler_y + 4);
                    ctx.stroke();

                    ctx.font = "8pt Segoe UI";
                    ctx.fillStyle = "rgba(255, 255, 255, 0.22)";
                    let mid = (drop_x + draw_bx) / 2;
                    ctx.fillText(`${phy.x_cm.toFixed(0)} px`, mid - 20, ruler_y - 6);
                }
            }
        }

        // Off-screen indicator
        if (bx > w + R) {
            ctx.font = "bold 12pt Segoe UI";
            ctx.fillStyle = "#42a5f5";
            ctx.fillText(`→ ball at x = ${phy.x_cm.toFixed(0)} px →`, w - 180, rest_y);
            if (phy.phase === "slipping" || phy.phase === "rolling") {
                this._hud(ctx, w, h);
            }
            return;
        }

        // Shadow
        let st = (phy.phase === "hovering" || phy.phase === "falling") ?
            Math.max(0.1, 1.0 - Math.max(1, rest_y - by) / 250) : 1.0;
        ctx.fillStyle = `rgba(0, 0, 0, ${80 * st / 255})`;
        ctx.beginPath();
        ctx.ellipse(bx, gy + 3, R * 1.5 * st, 4.5 * st, 0, 0, 2 * Math.PI);
        ctx.fill();

        // Ball color
        let bg = ctx.createRadialGradient(bx - R * 0.3, by - R * 0.3, R * 0.0, bx - R * 0.3, by - R * 0.3, R * 1.6);
        let gc;
        if (phy.phase === "hovering" || phy.phase === "falling") {
            bg.addColorStop(0.0, "#fff59d");
            bg.addColorStop(0.4, "#fdd835");
            bg.addColorStop(1.0, "#f9a825");
            gc = "rgba(253, 216, 53, 0.16)";
        } else if (phy.phase === "slipping") {
            bg.addColorStop(0.0, "#ff8a65");
            bg.addColorStop(0.4, "#e53935");
            bg.addColorStop(1.0, "#7f0000");
            gc = "rgba(255, 60, 30, 0.2)";
        } else {
            bg.addColorStop(0.0, "#81d4fa");
            bg.addColorStop(0.4, "#1e88e5");
            bg.addColorStop(1.0, "#0d47a1");
            gc = "rgba(30, 136, 229, 0.16)";
        }

        // Outer glow
        let glow = ctx.createRadialGradient(bx, by, 0, bx, by, R * 2.0);
        glow.addColorStop(0.4, gc);
        glow.addColorStop(1.0, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.ellipse(bx, by, R * 2, R * 2, 0, 0, 2 * Math.PI);
        ctx.fill();

        // Ball body
        ctx.fillStyle = bg;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(bx, by, R, R, 0, 0, 2 * Math.PI);
        ctx.fill();
        ctx.stroke();

        // Spokes
        let n_spokes = 8;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        for (let i = 0; i < n_spokes; i++) {
            let a = phy.theta + i * (2 * Math.PI / n_spokes);
            let sx = bx + R * 0.82 * Math.cos(a);
            let sy = by + R * 0.82 * Math.sin(a);
            ctx.moveTo(bx, by);
            ctx.lineTo(sx, sy);
        }
        ctx.stroke();

        // Thick radius line
        let ra = phy.theta;
        let rx = bx + R * 0.9 * Math.cos(ra);
        let ry = by + R * 0.9 * Math.sin(ra);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.55)";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(rx, ry);
        ctx.stroke();

        // "r" label
        ctx.font = "bold 10pt Segoe UI";
        ctx.fillStyle = "rgba(255, 255, 255, 0.43)";
        ctx.fillText("r", bx + R * 0.45 * Math.cos(ra) + 6, by + R * 0.45 * Math.sin(ra) - 6);

        // Centre dot
        ctx.fillStyle = "rgba(255, 255, 255, 0.63)";
        ctx.beginPath();
        ctx.ellipse(bx, by, 3.5, 3.5, 0, 0, 2 * Math.PI);
        ctx.fill();

        // Omega arc
        if (phy.omega > 0.2) {
            this._omega_arc(ctx, bx, by, R, phy.omega);
        }

        // Contact point
        if (phy.phase === "slipping" || phy.phase === "rolling") {
            let cpx = bx;
            let cpy = by + R;
            let cpc = (phy.phase === "slipping") ? "#ff1744" : "#00e676";
            let cg = ctx.createRadialGradient(cpx, cpy, 0, cpx, cpy, 12);
            cg.addColorStop(0.0, `rgba(${parseInt(cpc.slice(1, 3), 16)}, ${parseInt(cpc.slice(3, 5), 16)}, ${parseInt(cpc.slice(5, 7), 16)}, 0.35)`);
            cg.addColorStop(1.0, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = cg;
            ctx.beginPath();
            ctx.ellipse(cpx, cpy, 12, 12, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = cpc;
            ctx.beginPath();
            ctx.ellipse(cpx, cpy, 4, 4, 0, 0, 2 * Math.PI);
            ctx.fill();
        }

        // Vectors
        if (phy.phase === "slipping" || phy.phase === "rolling") {
            let scale = 1.8;
            let Rw = phy.R * phy.omega;

            // v_cm
            if (this.show_vcm && phy.v_cm > 0.3) {
                this._arrow(ctx, bx, by, bx + phy.v_cm * scale, by, "#66bb6a", 3.0, `v_cm = ${phy.v_cm.toFixed(1)}`);
            }

            // Rω
            if (this.show_Rw && Rw > 0.3) {
                this._arrow(ctx, bx, by - R, bx + Rw * scale, by - R, "#ce93d8", 2.5, `Rω = ${Rw.toFixed(1)} →`);
                this._arrow(ctx, bx, by + R, bx - Rw * scale, by + R, "#ce93d8", 2.5, `Rω = ${Rw.toFixed(1)} ←`);
                ctx.font = "8pt Segoe UI";
                ctx.fillStyle = "#ce93d8";
                ctx.fillText("Rω = 0 (CM)", bx - R - 55, by + 4);
            }

            // Friction
            if (this.show_friction && phy.phase === "slipping") {
                let f_mag = phy.mu * phy.mass * phy.g;
                let f_len = f_mag * 0.28;
                let fy = by + R + 14;
                this._arrow(ctx, bx - 10, fy, bx - 10 + f_len, fy, "#ffd740", 3.5, `f = μmg = ${f_mag.toFixed(0)} →`);
            }

            if (this.show_weight) {
                this._arrow(ctx, bx, by, bx, by + 50, "rgba(180, 180, 180, 0.47)", 2, "mg");
            }

            if (this.show_normal) {
                this._arrow(ctx, bx, by + R, bx, by + R - 55, "rgba(100, 220, 255, 0.47)", 2, "N");
            }
        }

        // v_contact text
        if (phy.phase === "slipping") {
            let vc = phy.v_cm - phy.R * phy.omega;
            ctx.font = "bold 9pt Consolas";
            ctx.fillStyle = "#ff5252";
            ctx.fillText(`v_contact = ${vc.toFixed(1)}`, bx + R + 10, by + R + 8);
        }

        // Sparks
        if (phy.phase === "slipping" && phy.omega > 0.3) {
            for (let i = 0; i < 3; i++) {
                this.sparks.push([
                    bx + Math.random() * 10 - 5,
                    gy - Math.random() * 3,
                    Math.random() * -50 - 10,
                    Math.random() * -80 - 30,
                    1.0
                ]);
            }
        }
        let alive = [];
        for (let i = 0; i < this.sparks.length; i++) {
            let sp = this.sparks[i];
            sp[0] += sp[2] * 0.016;
            sp[1] += sp[3] * 0.016;
            sp[3] += 280 * 0.016;
            sp[4] -= 0.04;
            if (sp[4] > 0) {
                let a = Math.floor(255 * sp[4]);
                let c = (sp[4] > 0.4) ? `rgba(255, 200, 50, ${a / 255})` : `rgba(255, 100, 30, ${a / 255})`;
                ctx.fillStyle = c;
                ctx.beginPath();
                ctx.ellipse(sp[0], sp[1], 3 * sp[4], 3 * sp[4], 0, 0, 2 * Math.PI);
                ctx.fill();
                alive.push(sp);
            }
        }
        this.sparks = alive;

        // Pure rolling label
        if (phy.phase === "rolling") {
            ctx.font = "bold 14pt Segoe UI";
            ctx.fillStyle = "#69f0ae";
            ctx.fillText("v_cm = Rω  ✓  Pure Rolling!", bx - 70, by - R - 38);
            ctx.font = "10pt Consolas";
            ctx.fillText(`v_cm = Rω = ${phy.v_r.toFixed(1)} px/s`, bx - 70, by - R - 20);
        }

        // Phase badge
        let badges = {
            "hovering": ["SPINNING CLOCKWISE IN AIR", "#fdd835"],
            "falling": ["FALLING (still spinning CW)", "#fdd835"],
            "slipping": ["SLIPPING → sliding RIGHT", "#ff5252"],
            "rolling": ["PURE ROLLING (CW)", "#69f0ae"],
        };
        let [bt, bc] = badges[phy.phase] || ["", "#fff"];
        ctx.font = "bold 12pt Segoe UI";
        let bw_ = ctx.measureText(bt).width + 30;
        let bh_ = 34;
        let br_x = w - bw_ - 12;
        let br_y = 10;

        ctx.fillStyle = "rgba(0, 0, 0, 0.66)";
        ctx.strokeStyle = bc;
        ctx.lineWidth = 1.5;
        this._drawRoundedRect(ctx, br_x, br_y, bw_, bh_, 8);
        ctx.fillStyle = bc;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(bt, br_x + bw_ / 2, br_y + bh_ / 2);
        ctx.textAlign = "start";
        ctx.textBaseline = "alphabetic";

        // HUD
        if (phy.phase === "slipping" || phy.phase === "rolling") {
            this._hud(ctx, w, h);
        }
    }

    _drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    _arrow(ctx, x1, y1, x2, y2, color, width, label) {
        let dx = x2 - x1;
        let dy = y2 - y1;
        let ln = Math.hypot(dx, dy);
        if (ln < 2) return;

        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        let ang = Math.atan2(dy, dx);
        let hl = Math.min(14, ln * 0.35);
        for (let s of [1, -1]) {
            let ha = ang + Math.PI + s * 0.4;
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 + hl * Math.cos(ha), y2 + hl * Math.sin(ha));
            ctx.stroke();
        }

        if (label) {
            ctx.font = "bold 9pt Segoe UI";
            ctx.fillStyle = color;
            ctx.fillText(label, (x1 + x2) / 2 - 25, Math.min(y1, y2) - 8);
        }
    }

    _omega_arc(ctx, cx, cy, R, omega) {
        let ar = R * 1.35;
        let span = Math.min(300, omega * 18);
        let c = "rgba(255, 171, 64, 0.63)";
        ctx.strokeStyle = c;
        ctx.lineWidth = 2.2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(cx, cy, ar, Math.PI / 2, Math.PI / 2 - span * Math.PI / 180, true);
        ctx.stroke();

        let end_deg = 90 - span;
        let end_rad = end_deg * Math.PI / 180;
        let tx_ = cx + ar * Math.cos(end_rad);
        let ty_ = cy - ar * Math.sin(end_rad);
        let tang_dx = Math.sin(end_rad);
        let tang_dy = Math.cos(end_rad);

        for (let s of [0.4, -0.4]) {
            let hx = tx_ - 10 * (tang_dx * Math.cos(s) - tang_dy * Math.sin(s));
            let hy = ty_ + 10 * (tang_dx * Math.sin(s) + tang_dy * Math.cos(s));
            ctx.beginPath();
            ctx.moveTo(tx_, ty_);
            ctx.lineTo(hx, hy);
            ctx.stroke();
        }

        let mid_rad = (90 - span / 2) * Math.PI / 180;
        let lx = cx + (ar + 16) * Math.cos(mid_rad);
        let ly = cy - (ar + 16) * Math.sin(mid_rad);
        ctx.font = "bold 12pt Segoe UI";
        ctx.fillStyle = "#ffab40";
        ctx.fillText("ω", lx - 4, ly + 5);
    }

    _hud(ctx, w, h) {
        let bw = 285, bh = 148;
        let bx_ = 10, by_ = h - bh - 10;

        ctx.fillStyle = "rgba(0, 0, 0, 0.67)";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 1;
        this._drawRoundedRect(ctx, bx_, by_, bw, bh, 10);

        let phy = this.phy;
        let Rw = phy.R * phy.omega;
        let lines = [
            `t = ${phy.t.toFixed(3)} s    t_r = ${phy.t_r.toFixed(3)} s`,
            `v_cm = ${phy.v_cm.toFixed(1)} px/s  (rightward)`,
            `ω = ${phy.omega.toFixed(2)} rad/s  (clockwise)`,
            `Rω = ${Rw.toFixed(1)} px/s`,
            `v_contact = v_cm − Rω = ${(phy.v_cm - Rw).toFixed(2)}`,
            `x = ${phy.x_cm.toFixed(0)} px   phase: ${phy.phase}`,
        ];

        ctx.font = "9pt Consolas";
        ctx.fillStyle = "rgba(220, 220, 220, 0.78)";
        for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], bx_ + 10, by_ + 20 + i * 20);
        }
    }
}
