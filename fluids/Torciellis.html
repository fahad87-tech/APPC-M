    <script>
        const TARGET_HASH = "596a81d15423beb932e31857b7c2f4296e4a885a94edfdadfc7cbeb4fc3289e4";

        document.documentElement.classList.add("password-locked");

        const passwordGateStyle = document.createElement("style");
        passwordGateStyle.textContent = `
            html.password-locked body { overflow: hidden; }
            html.password-locked body > * { visibility: hidden; }
            #password-gate {
                position: fixed;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                background: rgba(5, 9, 18, 0.88);
                padding: 24px;
                z-index: 9999;
            }
            html.password-locked #password-gate { display: flex; visibility: visible; }
            #password-gate-card {
                width: min(100%, 420px);
                background: #101625;
                border: 1px solid rgba(100,181,246,0.28);
                border-radius: 18px;
                padding: 24px;
                box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
                color: #e7edf7;
                font-family: 'Segoe UI', Arial, sans-serif;
            }
            #password-gate-title {
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 8px;
            }
            #password-gate-message {
                font-size: 14px;
                color: rgba(255,255,255,0.72);
                margin-bottom: 16px;
                line-height: 1.5;
            }
            #password-gate-input {
                width: 100%;
                padding: 12px 14px;
                border-radius: 12px;
                border: 1px solid rgba(100,181,246,0.35);
                background: rgba(255,255,255,0.05);
                color: #fff;
                font-size: 16px;
                outline: none;
                margin-bottom: 16px;
            }
            #password-gate-input:focus {
                border-color: #64b5f6;
                box-shadow: 0 0 0 3px rgba(100,181,246,0.16);
            }
            #password-gate-actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
            }
            .password-gate-button {
                border: none;
                border-radius: 10px;
                padding: 10px 16px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }
            #password-gate-cancel {
                background: rgba(255,255,255,0.08);
                color: #d9e2f2;
            }
            #password-gate-submit {
                background: #64b5f6;
                color: #08101c;
            }
        `;
        document.head.appendChild(passwordGateStyle);

        function requestPassword(title, message) {
            return new Promise(resolve => {
                const existingGate = document.getElementById("password-gate");
                if (existingGate) existingGate.remove();

                const gate = document.createElement("div");
                gate.id = "password-gate";
                gate.innerHTML = `
                    <div id="password-gate-card">
                        <div id="password-gate-title">${title}</div>
                        <div id="password-gate-message">${message}</div>
                        <input id="password-gate-input" type="password" autocomplete="current-password">
                        <div id="password-gate-actions">
                            <button id="password-gate-cancel" class="password-gate-button" type="button">Cancel</button>
                            <button id="password-gate-submit" class="password-gate-button" type="button">Unlock</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(gate);

                const input = document.getElementById("password-gate-input");
                const cancelButton = document.getElementById("password-gate-cancel");
                const submitButton = document.getElementById("password-gate-submit");

                const finish = value => {
                    gate.remove();
                    resolve(value);
                };

                cancelButton.addEventListener("click", () => finish(null));
                submitButton.addEventListener("click", () => finish(input.value));
                input.addEventListener("keydown", event => {
                    if (event.key === "Enter") finish(input.value);
                    if (event.key === "Escape") finish(null);
                });

                window.requestAnimationFrame(() => input.focus());
            });
        }

        async function verifyPageAccess() {
            const userInput = await requestPassword("Simulation Access", "Classroom password required for this simulation:");

            if (userInput === null) {
                window.location.href = "../index.html";
                return;
            }

            const encoder = new TextEncoder();
            const data = encoder.encode(userInput);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

            if (hashHex === TARGET_HASH) {
                document.documentElement.classList.remove("password-locked");
            } else {
                alert("Incorrect password. Access denied.");
                window.location.href = "../index.html";
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", verifyPageAccess, { once: true });
        } else {
            verifyPageAccess();
        }
    </script>

<script>
// ==========================================
// 1. PHYSICS ENGINE
// ==========================================
class FluidPhysics {
    constructor() {
        this.container_height = 25.0;
        this.water_level = 17.0;
        this.spout_height = 8.0;
        this.gravity = 9.81;
        this.density = 1000.0;
        this.tank_width = 5.0;
        this.spout_diameter = 0.5;
        this.discharge_coeff = 0.95;
        this.air_drag = 0.5;

        this.running = false;
        this.t = 0.0;
        this.history = []; // Array of {t, h, v}
        this.particles = [];
        this.wave_offset = 0.0;
    }

    get effective_head() {
        return Math.max(0.0, this.water_level - this.spout_height);
    }

    get exit_velocity() {
        return this.discharge_coeff * Math.sqrt(2 * this.gravity * this.effective_head);
    }

    step(dt) {
        // 1. Tank Physics
        if (this.running && this.effective_head > 0) {
            let area_tank = Math.pow(this.tank_width, 2);
            let area_spout = Math.PI * Math.pow(this.spout_diameter / 2, 2);
            area_spout = Math.min(area_spout, area_tank * 0.99);

            let drain_rate = (area_spout / area_tank) * this.exit_velocity;
            this.water_level -= drain_rate * dt;
            this.t += dt;

            if (this.water_level <= this.spout_height) {
                this.water_level = this.spout_height;
                this.running = false;
                document.getElementById('btn-start').innerText = "▶ START SIMULATION";
                document.getElementById('btn-start').classList.remove('paused');
            }

            // Record Data
            this.history.push({t: this.t, h: this.water_level, v: this.exit_velocity});
            if (this.history.length > 1000) this.history.shift();
        }

        // 2. Emit Particles
        let v_exit = this.exit_velocity;
        if (this.running && v_exit > 0.1) {
            let num_particles = Math.floor((this.spout_diameter * v_exit * dt) * 50);
            num_particles = Math.max(1, Math.min(num_particles, 15));
            
            for (let i = 0; i < num_particles; i++) {
                let spread_y = (Math.random() - 0.5) * this.spout_diameter;
                let vx = v_exit * (0.95 + Math.random() * 0.1);
                let vy = (Math.random() - 0.5) * 0.2 * v_exit;
                let radius = (0.05 + Math.random() * 0.1) * this.spout_diameter;
                this.particles.push({x: 0, y: spread_y, vx, vy, radius});
            }
        }

        // 3. Update Particles (Euler Integration)
        let drag_k = (this.air_drag / Math.max(1.0, this.density)) * 50.0;
        let alive = [];

        for (let p of this.particles) {
            let v_mag = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
            let ax = -drag_k * p.vx * v_mag;
            let ay = this.gravity - drag_k * p.vy * v_mag;

            p.vx += ax * dt;
            p.vy += ay * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;

            if (p.y < this.spout_height) alive.push(p);
        }
        this.particles = alive;
        this.wave_offset += dt * 5.0;
    }

    reset() {
        this.t = 0;
        this.history = [];
        this.particles = [];
    }
}

// ==========================================
// 2. GLOBAL STATE & UI BINDING
// ==========================================
const phys = new FluidPhysics();
let zoomFactor = 1.0;
const promptStageEl = document.getElementById('prompt-stage');
const promptCounterEl = document.getElementById('prompt-counter');
const promptQuestionEl = document.getElementById('prompt-question');
const promptAnswerEl = document.getElementById('prompt-answer');
const promptStatusEl = document.getElementById('prompt-status');
const promptBackBtn = document.getElementById('btn-prompt-back');
const promptNextBtn = document.getElementById('btn-prompt-next');
const promptSaveBtn = document.getElementById('btn-save-answer');
const promptExportBtn = document.getElementById('btn-export-docx');
const PROMPT_STORAGE_KEY = 'torciellis-qna-v1';
const promptSequence = [
    { id: 'engage-1', stage: 'Engage', question: 'Which hole depth should produce the fastest jet, and why do you think so?' },
    { id: 'engage-2', stage: 'Engage', question: 'Before starting the flow, which control do you predict will change the range the most?' },
    { id: 'explore-1', stage: 'Explore', question: 'Raise the water level and describe what changes in the jet speed and landing point.' },
    { id: 'explore-2', stage: 'Explore', question: 'Move the spout higher or lower. What changes in the path of the water?' },
    { id: 'explore-3', stage: 'Explore', question: 'Change the spout diameter. What do you notice first about the flow and draining?' },
    { id: 'explain-1', stage: 'Explain', question: 'Explain how effective head affects the exit velocity in this simulation.' },
    { id: 'explain-2', stage: 'Explain', question: 'Explain why tank width changes drain time more than the immediate exit speed.' },
    { id: 'elaborate-1', stage: 'Elaborate', question: 'Compare two different settings that produce noticeably different ranges. What is your comparison?' },
    { id: 'elaborate-2', stage: 'Elaborate', question: 'Try a different gravity value. How does it change both the launch and the fall of the jet?' },
    { id: 'evaluate-1', stage: 'Evaluate', question: 'What evidence from the graph and the animation supports Torricelli’s law?' },
    { id: 'evaluate-2', stage: 'Evaluate', question: 'State the main physics idea you learned from this simulation in one clear sentence.' }
];
let promptSaveTimer = null;
const hasLocalStorage = storageAvailable();
const promptState = loadPromptState();

function storageAvailable() {
    try {
        const testKey = '__torciellis_storage_test__';
        window.localStorage.setItem(testKey, 'ok');
        window.localStorage.removeItem(testKey);
        return true;
    } catch (error) {
        return false;
    }
}

function createDefaultPromptState() {
    return {
        currentIndex: 0,
        answers: {},
        studentName: ''
    };
}

function loadPromptState() {
    if (!hasLocalStorage) {
        return createDefaultPromptState();
    }

    try {
        const raw = window.localStorage.getItem(PROMPT_STORAGE_KEY);
        if (!raw) return createDefaultPromptState();
        const parsed = JSON.parse(raw);
        return {
            currentIndex: Number.isInteger(parsed.currentIndex) ? Math.min(Math.max(parsed.currentIndex, 0), promptSequence.length - 1) : 0,
            answers: parsed.answers && typeof parsed.answers === 'object' ? parsed.answers : {},
            studentName: typeof parsed.studentName === 'string' ? parsed.studentName : ''
        };
    } catch (error) {
        return createDefaultPromptState();
    }
}

function isQuotaError(error) {
    return error && (
        error.name === 'QuotaExceededError' ||
        error.name === 'NS_ERROR_DOM_QUOTA_REACHED' ||
        error.code === 22 ||
        error.code === 1014
    );
}

function setPromptStatus(message, tone = 'info') {
    promptStatusEl.textContent = message;
    promptStatusEl.classList.remove('is-error', 'is-success');
    if (tone === 'error') promptStatusEl.classList.add('is-error');
    if (tone === 'success') promptStatusEl.classList.add('is-success');
}

function persistPromptState(successMessage = '') {
    if (!hasLocalStorage) {
        if (successMessage) {
            setPromptStatus('Local storage is unavailable in this browser. Responses stay in memory until you leave the page.', 'error');
        }
        return false;
    }

    try {
        window.localStorage.setItem(PROMPT_STORAGE_KEY, JSON.stringify(promptState));
        if (successMessage) setPromptStatus(successMessage, 'success');
        return true;
    } catch (error) {
        if (isQuotaError(error)) {
            setPromptStatus('Local storage is full. Shorten answers or clear browser data before saving again.', 'error');
        } else {
            setPromptStatus('Could not save responses in this browser.', 'error');
        }
        return false;
    }
}

function getCurrentPrompt() {
    return promptSequence[promptState.currentIndex];
}

function saveCurrentAnswer(showMessage = false) {
    const currentPrompt = getCurrentPrompt();
    const answer = promptAnswerEl.value.trim();
    if (answer) {
        promptState.answers[currentPrompt.id] = answer;
    } else {
        delete promptState.answers[currentPrompt.id];
    }
    return persistPromptState(showMessage ? 'Answer saved locally.' : '');
}

function renderPrompt() {
    const currentPrompt = getCurrentPrompt();
    promptStageEl.textContent = currentPrompt.stage;
    promptCounterEl.textContent = `Prompt ${promptState.currentIndex + 1} of ${promptSequence.length}`;
    promptQuestionEl.textContent = currentPrompt.question;
    promptAnswerEl.value = promptState.answers[currentPrompt.id] || '';
    promptBackBtn.disabled = promptState.currentIndex === 0;
    promptNextBtn.disabled = promptState.currentIndex === promptSequence.length - 1;

    if (!hasLocalStorage) {
        setPromptStatus('Local storage is unavailable in this browser. Responses are temporary until export.', 'error');
    } else if (promptAnswerEl.value.trim()) {
        setPromptStatus('Saved response loaded from this browser.', 'success');
    } else {
        setPromptStatus('Answers save locally in this browser.', 'info');
    }
}

function goToPrompt(index) {
    saveCurrentAnswer(false);
    promptState.currentIndex = Math.min(Math.max(index, 0), promptSequence.length - 1);
    persistPromptState('');
    renderPrompt();
}

function sanitizeFileName(value) {
    return value.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_');
}

function downloadBlob(blob, fileName) {
    if (typeof window.saveAs === 'function') {
        window.saveAs(blob, fileName);
        return;
    }

    const url = window.URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    link.remove();
    window.URL.revokeObjectURL(url);
}

async function exportPromptResponses() {
    saveCurrentAnswer(false);

    const existingName = promptState.studentName || '';
    const enteredName = window.prompt('Enter your name for the exported document:', existingName);
    if (enteredName === null) {
        setPromptStatus('Export cancelled.', 'info');
        return;
    }

    const studentName = enteredName.trim();
    if (!studentName) {
        setPromptStatus('Student name is required before exporting.', 'error');
        window.alert('Please enter your name before exporting the .docx file.');
        return;
    }

    promptState.studentName = studentName;
    persistPromptState('');

    if (!window.docx || !window.docx.Document || !window.docx.Packer) {
        setPromptStatus('The document export library did not load. Check your internet connection and try again.', 'error');
        window.alert('The .docx export library is unavailable right now.');
        return;
    }

    try {
        const { AlignmentType, Document, HeadingLevel, Packer, Paragraph, TextRun } = window.docx;
        const generatedAt = new Date().toLocaleString();
        const children = [
            new Paragraph({
                text: 'Torricelli Simulation Responses',
                heading: HeadingLevel.TITLE,
                alignment: AlignmentType.CENTER
            }),
            new Paragraph({
                alignment: AlignmentType.CENTER,
                children: [new TextRun({ text: `Student: ${studentName}`, bold: true })]
            }),
            new Paragraph({
                alignment: AlignmentType.CENTER,
                children: [new TextRun({ text: `Generated: ${generatedAt}` })]
            }),
            new Paragraph({ text: '' })
        ];

        promptSequence.forEach((prompt, index) => {
            const answer = promptState.answers[prompt.id] || 'No answer entered.';
            children.push(
                new Paragraph({
                    text: `${index + 1}. ${prompt.stage}: ${prompt.question}`,
                    heading: HeadingLevel.HEADING_2
                }),
                new Paragraph({
                    children: [
                        new TextRun({
                            text: answer,
                            italics: !promptState.answers[prompt.id]
                        })
                    ]
                }),
                new Paragraph({ text: '' })
            );
        });

        const documentFile = new Document({
            sections: [
                {
                    properties: {},
                    children
                }
            ]
        });

        const blob = await Packer.toBlob(documentFile);
        const safeName = sanitizeFileName(studentName) || 'student';
        downloadBlob(blob, `${safeName}_torcielli_responses.docx`);
        setPromptStatus('The .docx file was generated and sent to your browser download location.', 'success');
    } catch (error) {
        setPromptStatus('Export failed. Please try again after checking your browser storage and network access.', 'error');
        window.alert('The .docx export failed. Please try again.');
    }
}

promptBackBtn.addEventListener('click', () => goToPrompt(promptState.currentIndex - 1));
promptNextBtn.addEventListener('click', () => goToPrompt(promptState.currentIndex + 1));
promptSaveBtn.addEventListener('click', () => saveCurrentAnswer(true));
promptExportBtn.addEventListener('click', exportPromptResponses);
promptAnswerEl.addEventListener('input', () => {
    clearTimeout(promptSaveTimer);
    promptSaveTimer = window.setTimeout(() => saveCurrentAnswer(true), 250);
});

renderPrompt();

const params = [
    { id: 'container_height', label: 'Container Height', min: 5, max: 50, val: 25, unit: 'm', step: 0.1 },
    { id: 'water_level', label: 'Water Level', min: 0, max: 50, val: 17, unit: 'm', step: 0.1 },
    { id: 'spout_height', label: 'Spout Height', min: 0, max: 50, val: 8, unit: 'm', step: 0.1 },
    { id: 'tank_width', label: 'Tank Width', min: 1, max: 15, val: 5, unit: 'm', step: 0.1 },
    { id: 'spout_diameter', label: 'Spout Diameter', min: 0.05, max: 3, val: 0.5, unit: 'm', step: 0.05 },
    { id: 'density', label: 'Fluid Density (ρ)', min: 100, max: 13600, val: 1000, unit: 'kg/m³', step: 10 },
    { id: 'gravity', label: 'Gravity (g)', min: 1, max: 25, val: 9.81, unit: 'm/s²', step: 0.01 },
    { id: 'discharge_coeff', label: 'Discharge Coeff. (Cd)', min: 0.4, max: 1.0, val: 0.95, unit: '', step: 0.01 }
];

const sliderDiv = document.getElementById('sliders');
const uiElements = {};

params.forEach(p => {
    const cont = document.createElement('div');
    cont.className = 'slider-container';
    cont.innerHTML = `
        <div class="slider-header">
            <span style="color: #a0aabf">${p.label}</span>
            <span class="slider-val" id="val-${p.id}">${p.val.toFixed(2)} ${p.unit}</span>
        </div>
        <input type="range" id="sl-${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.val}">
    `;
    sliderDiv.appendChild(cont);
    
    const input = document.getElementById(`sl-${p.id}`);
    const display = document.getElementById(`val-${p.id}`);
    uiElements[p.id] = { input, display, unit: p.unit };

    input.addEventListener('input', (e) => {
        let val = parseFloat(e.target.value);
        display.innerText = `${val.toFixed(2)} ${p.unit}`;
        phys[p.id] = val;
        
        // Constraints
        if (p.id === 'container_height' && phys.water_level > val) {
            phys.water_level = val;
            uiElements['water_level'].input.value = val;
            uiElements['water_level'].display.innerText = `${val.toFixed(2)} m`;
        }
        if (p.id === 'water_level' && !phys.running) phys.reset();
    });
});

// Update UI from Physics Engine periodically
function syncUI() {
    uiElements['water_level'].input.value = phys.water_level;
    uiElements['water_level'].display.innerText = `${phys.water_level.toFixed(2)} m`;
    document.getElementById('live-vel').innerText = `${phys.exit_velocity.toFixed(2)} m/s`;
}

// Buttons
document.getElementById('btn-start').addEventListener('click', (e) => {
    if (phys.water_level <= phys.spout_height) resetSim();
    phys.running = !phys.running;
    if (phys.running) {
        e.target.innerText = "⏸ PAUSE SIMULATION";
        e.target.classList.add('paused');
    } else {
        e.target.innerText = "▶ RESUME SIMULATION";
        e.target.classList.remove('paused');
    }
});

document.getElementById('btn-reset').addEventListener('click', resetSim);

function resetSim() {
    phys.water_level = 17.0;
    phys.reset();
    phys.running = false;
    syncUI();
    let btn = document.getElementById('btn-start');
    btn.innerText = "▶ START SIMULATION";
    btn.classList.remove('paused');
}

// Mouse Wheel Zoom
document.getElementById('anim-container').addEventListener('wheel', (e) => {
    e.preventDefault();
    if (e.deltaY < 0) zoomFactor *= 1.15;
    else zoomFactor /= 1.15;
    zoomFactor = Math.max(0.1, Math.min(zoomFactor, 15.0));
    document.getElementById('zoom-label').innerText = `Zoom: ${zoomFactor.toFixed(2)}x`;
});

// ==========================================
// 3. RENDER ENGINE (Canvas)
// ==========================================
const canvasA = document.getElementById('anim-canvas');
const ctxA = canvasA.getContext('2d');
const canvasG = document.getElementById('graph-canvas');
const ctxG = canvasG.getContext('2d');

function resizeCanvas() {
    const rectA = canvasA.parentElement.getBoundingClientRect();
    canvasA.width = rectA.width;
    canvasA.height = rectA.height;
    
    const rectG = canvasG.parentElement.getBoundingClientRect();
    canvasG.width = rectG.width;
    canvasG.height = rectG.height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let lastTime = performance.now();

function animate(currentTime) {
    let dt = (currentTime - lastTime) / 1000.0;
    lastTime = currentTime;
    
    // Hard cap dt to prevent explosions if tab is inactive
    if (dt > 0.1) dt = 0.1; 
    
    // Step physics (running at 5x speed for visual appeal, mirroring Python)
    phys.step(dt * 5.0);
    syncUI();

    drawTank(ctxA, canvasA.width, canvasA.height);
    drawGraph(ctxG, canvasG.width, canvasG.height);

    requestAnimationFrame(animate);
}

function drawTank(ctx, w, h) {
    // Background gradient
    let bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#0a0e17');
    bg.addColorStop(1, '#121826');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    let scale = 14.0 * zoomFactor;
    let ground_y = h * 0.85;
    let tank_center_x = w * 0.25;

    let tank_w_px = phys.tank_width * scale;
    let container_h_px = phys.container_height * scale;
    let water_level_px = phys.water_level * scale;
    let spout_y_px = phys.spout_height * scale;
    let spout_dia_px = Math.max(3.0, phys.spout_diameter * scale);

    // Ground
    ctx.fillStyle = '#14181e';
    ctx.fillRect(0, ground_y, w, h - ground_y);
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, ground_y);
    ctx.lineTo(w, ground_y);
    ctx.stroke();

    // Tank Wall
    ctx.fillStyle = 'rgba(25, 30, 45, 0.7)';
    ctx.strokeStyle = 'rgba(80, 90, 110, 0.6)';
    ctx.beginPath();
    ctx.roundRect(tank_center_x - tank_w_px/2, ground_y - container_h_px, tank_w_px, container_h_px, 6);
    ctx.fill();
    ctx.stroke();

    // Water Body
    if (phys.water_level > 0) {
        let waterGrad = ctx.createLinearGradient(0, ground_y - water_level_px, 0, ground_y);
        waterGrad.addColorStop(0, 'rgba(0, 200, 255, 0.8)');
        waterGrad.addColorStop(1, 'rgba(0, 100, 200, 0.9)');
        ctx.fillStyle = waterGrad;

        let start_x = tank_center_x - tank_w_px/2 + 2;
        let end_x = start_x + tank_w_px - 4;
        let base_y = ground_y - water_level_px;

        ctx.beginPath();
        ctx.moveTo(start_x, ground_y);
        ctx.lineTo(start_x, base_y);

        // Sine wave surface
        if (phys.running && phys.exit_velocity > 0) {
            for (let wx = start_x; wx <= end_x + 2; wx += 4) {
                let wy = base_y + Math.sin((wx * 0.1) + phys.wave_offset) * (3.0 * zoomFactor);
                ctx.lineTo(wx, wy);
            }
        } else {
            ctx.lineTo(end_x, base_y);
        }
        
        ctx.lineTo(end_x, ground_y);
        ctx.closePath();
        ctx.fill();
    }

    // Spout
    let spout_x = tank_center_x + tank_w_px/2;
    let spout_y_screen = ground_y - spout_y_px;
    let spout_length = Math.max(12, 1.2 * scale);
    
    let spoutGrad = ctx.createLinearGradient(spout_x, spout_y_screen - spout_dia_px/2, spout_x, spout_y_screen + spout_dia_px/2);
    spoutGrad.addColorStop(0, '#dcbe50');
    spoutGrad.addColorStop(0.5, '#a08228');
    spoutGrad.addColorStop(1, '#645014');
    
    ctx.fillStyle = spoutGrad;
    ctx.strokeStyle = '#32280a';
    ctx.beginPath();
    ctx.roundRect(spout_x, spout_y_screen - (spout_dia_px/2), spout_length, spout_dia_px, 2);
    ctx.fill();
    ctx.stroke();

   // Particles
    let p_start_x = spout_x + spout_length;
    let p_start_y = spout_y_screen;

    ctx.fillStyle = 'rgba(0, 220, 255, 0.6)';
    for(let drop of phys.particles) {
        let dx = p_start_x + drop.x * scale;
        // FIX: Add drop.y instead of subtracting it (Canvas Y increases downwards)
        let dy = p_start_y + drop.y * scale; 
        let r = Math.max(1.5, drop.radius * scale);
        
        let v_mag = Math.sqrt(drop.vx*drop.vx + drop.vy*drop.vy);
        let stretch = Math.max(1.0, v_mag * 0.1);
        // FIX: Remove the negative sign from drop.vy
        let angle = Math.atan2(drop.vy, drop.vx); 

        ctx.save();
        ctx.translate(dx, dy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, r * stretch, r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    
    }

    // UI Dash Line
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(tank_center_x - tank_w_px, ground_y - water_level_px);
    ctx.lineTo(tank_center_x + tank_w_px*1.5, ground_y - water_level_px);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.font = 'bold 12px "Segoe UI"';
    ctx.fillText(`h = ${phys.water_level.toFixed(1)}m`, tank_center_x + tank_w_px*1.5 + 5, ground_y - water_level_px + 4);
}

function drawGraph(ctx, w, h) {
    ctx.fillStyle = '#0e121c';
    ctx.fillRect(0, 0, w, h);

    const margin_l = 55, margin_r = 20, margin_t = 15, margin_b = 15, gap = 20;
    const plot_w = w - margin_l - margin_r;
    const plot_h = (h - margin_t - margin_b - gap) / 2;

    if (plot_w < 30 || plot_h < 20) return;

    let t_min = phys.history.length ? phys.history[0].t : 0;
    let t_max = phys.history.length > 1 ? phys.history[phys.history.length-1].t : 10.0;
    if (t_max - t_min > 40.0) t_min = t_max - 40.0;

    let visible_hist = phys.history.filter(d => d.t >= t_min);

    // Plot 1: Water Level
    drawSubplot(ctx, margin_l, margin_t, plot_w, plot_h, visible_hist, 'h', t_min, t_max, '#00e5ff', 'Water Level (m)');
    
    // Plot 2: Velocity
    drawSubplot(ctx, margin_l, margin_t + plot_h + gap, plot_w, plot_h, visible_hist, 'v', t_min, t_max, '#ffb432', 'Exit Velocity (m/s)');
}

function drawSubplot(ctx, px, py, pw, ph, data, key, t_min, t_max, color, label) {
    // BG & Grid
    ctx.fillStyle = '#141923';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 4);
    ctx.fill();
    ctx.stroke();

    for(let i=1; i<4; i++) {
        let y = py + (i/4)*ph;
        ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px+pw, y); ctx.stroke();
    }

    // Label Y
    ctx.save();
    ctx.translate(px - 35, py + ph / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = color;
    ctx.font = 'bold 10px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    if (data.length < 2) return;

    let max_val = Math.max(...data.map(d => d[key]));
    let y_max = max_val > 0 ? max_val * 1.1 : 1.0;
    let y_min = 0.0;

    // Y Axis Ticks
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.font = '9px "Segoe UI"';
    for(let i=0; i<3; i++) {
        let frac = i/2;
        let y = py + frac * ph;
        let val = y_max - frac*(y_max - y_min);
        ctx.fillText(val.toFixed(1), px - 5, y);
    }

    const mapX = (t) => px + ((t - t_min) / Math.max(1e-9, t_max - t_min)) * pw;
    const mapY = (v) => py + ph - ((v - y_min) / Math.max(1e-9, y_max - y_min)) * ph;

    // Plot Line
    ctx.save();
    ctx.beginPath();
    ctx.rect(px, py, pw, ph);
    ctx.clip();

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    
    ctx.moveTo(mapX(data[0].t), mapY(data[0][key]));
    for (let i = 1; i < data.length; i++) {
        ctx.lineTo(mapX(data[i].t), mapY(data[i][key]));
    }
    ctx.stroke();

    // Glow Point
    let last = data[data.length-1];
    let lx = mapX(last.t), ly = mapY(last[key]);
    ctx.beginPath();
    ctx.arc(lx, ly, 3, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    
    ctx.restore();
}

// Start loop
requestAnimationFrame(animate);

</script>
