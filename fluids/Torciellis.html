        const TARGET_HASH = "596a81d15423beb932e31857b7c2f4296e4a885a94edfdadfc7cbeb4fc3289e4";

        async function verifyPageAccess() {
            document.documentElement.style.display = "none";

            if (sessionStorage.getItem("physicsUnlocked") === "true") {
                document.documentElement.style.display = "block";
                return;
            }

            const userInput = prompt("Classroom password required for this simulation:");

            if (userInput === null) {
                window.location.href = "../index.html";
                return;
            }

            const encoder = new TextEncoder();
            const data = encoder.encode(userInput);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

            if (hashHex === TARGET_HASH) {
                sessionStorage.setItem("physicsUnlocked", "true");
                document.documentElement.style.display = "block";
            } else {
                alert("Incorrect password. Access denied.");
                window.location.href = "../index.html";
            }
        }

        verifyPageAccess();

// ==========================================
// 1. PHYSICS ENGINE
// ==========================================
class FluidPhysics {
    constructor() {
        this.container_height = 25.0;
        this.water_level = 17.0;
        this.spout_height = 8.0;
        this.gravity = 9.81;
        this.density = 1000.0;
        this.tank_width = 5.0;
        this.spout_diameter = 0.5;
        this.discharge_coeff = 0.95;
        this.air_drag = 0.5;

        this.running = false;
        this.t = 0.0;
        this.history = []; // Array of {t, h, v}
        this.particles = [];
        this.wave_offset = 0.0;
    }

    get effective_head() {
        return Math.max(0.0, this.water_level - this.spout_height);
    }

    get exit_velocity() {
        return this.discharge_coeff * Math.sqrt(2 * this.gravity * this.effective_head);
    }

    step(dt) {
        // 1. Tank Physics
        if (this.running && this.effective_head > 0) {
            let area_tank = Math.pow(this.tank_width, 2);
            let area_spout = Math.PI * Math.pow(this.spout_diameter / 2, 2);
            area_spout = Math.min(area_spout, area_tank * 0.99);

            let drain_rate = (area_spout / area_tank) * this.exit_velocity;
            this.water_level -= drain_rate * dt;
            this.t += dt;

            if (this.water_level <= this.spout_height) {
                this.water_level = this.spout_height;
                this.running = false;
                document.getElementById('btn-start').innerText = "▶ START SIMULATION";
                document.getElementById('btn-start').classList.remove('paused');
            }

            // Record Data
            this.history.push({t: this.t, h: this.water_level, v: this.exit_velocity});
            if (this.history.length > 1000) this.history.shift();
        }

        // 2. Emit Particles
        let v_exit = this.exit_velocity;
        if (this.running && v_exit > 0.1) {
            let num_particles = Math.floor((this.spout_diameter * v_exit * dt) * 50);
            num_particles = Math.max(1, Math.min(num_particles, 15));
            
            for (let i = 0; i < num_particles; i++) {
                let spread_y = (Math.random() - 0.5) * this.spout_diameter;
                let vx = v_exit * (0.95 + Math.random() * 0.1);
                let vy = (Math.random() - 0.5) * 0.2 * v_exit;
                let radius = (0.05 + Math.random() * 0.1) * this.spout_diameter;
                this.particles.push({x: 0, y: spread_y, vx, vy, radius});
            }
        }

        // 3. Update Particles (Euler Integration)
        let drag_k = (this.air_drag / Math.max(1.0, this.density)) * 50.0;
        let alive = [];

        for (let p of this.particles) {
            let v_mag = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
            let ax = -drag_k * p.vx * v_mag;
            let ay = this.gravity - drag_k * p.vy * v_mag;

            p.vx += ax * dt;
            p.vy += ay * dt;
            p.x += p.vx * dt;
            p.y += p.vy * dt;

            if (p.y < this.spout_height) alive.push(p);
        }
        this.particles = alive;
        this.wave_offset += dt * 5.0;
    }

    reset() {
        this.t = 0;
        this.history = [];
        this.particles = [];
    }
}

const promptState = {
    interactionCount: 0,
    lastText: "",
    indices: {}
};

function getPromptStage(step) {
    if (step <= 0) return 'engage';
    if (step <= 2) return 'explore';
    if (step <= 4) return 'explain';
    if (step <= 6) return 'elaborate';
    if (step <= 8) return 'evaluate';
    const cycle = ['explore', 'explain', 'elaborate', 'evaluate'];
    return cycle[(step - 9) % cycle.length];
}

function pickPrompt(stage, source) {
    const stageBank = promptBank[stage];
    const sourceKey = stageBank[source] ? source : 'default';
    const options = stageBank[sourceKey];
    const stateKey = `${stage}:${sourceKey}`;
    let index = promptState.indices[stateKey] || 0;
    let text = options[index % options.length];
    if (text === promptState.lastText && options.length > 1) {
        index += 1;
        text = options[index % options.length];
    }
    promptState.indices[stateKey] = index + 1;
    promptState.lastText = text;
    return text;
}

function showPrompt(stage, source) {
    promptStageEl.textContent = stage;
    promptTextEl.textContent = pickPrompt(stage, source);
}

function recordInteraction(source) {
    promptState.interactionCount += 1;
    showPrompt(getPromptStage(promptState.interactionCount), source);
}

function resetPromptCycle(source = 'reset') {
    promptState.interactionCount = 0;
    showPrompt('engage', source);
}

    phys.running = !phys.running;

        e.target.innerText = "⏸ PAUSE SIMULATION";
        e.target.classList.add('paused');
    } else {
        e.target.innerText = "▶ RESUME SIMULATION";
        e.target.classList.remove('paused');
    }
    recordInteraction(phys.running ? 'start' : 'pause');
});

document.getElementById('btn-reset').addEventListener('click', resetSim);

function resetSim() {
    phys.water_level = 17.0;

    document.getElementById('zoom-label').innerText = `Zoom: ${zoomFactor.toFixed(2)}x`;

const canvasA = document.getElementById('anim-canvas');

const canvasG = document.getElementById('graph-canvas');

function resizeCanvas() {
    const rectA = canvasA.parentElement.getBoundingClientRect();
    canvasA.width = rectA.width;
    canvasA.height = rectA.height;
    
    const rectG = canvasG.parentElement.getBoundingClientRect();
    canvasG.width = rectG.width;
    canvasG.height = rectG.height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let lastTime = performance.now();

function animate(currentTime) {
    let dt = (currentTime - lastTime) / 1000.0;
    lastTime = currentTime;
    
    // Hard cap dt to prevent explosions if tab is inactive
    if (dt > 0.1) dt = 0.1; 
    
    // Step physics (running at 5x speed for visual appeal, mirroring Python)
    phys.step(dt * 5.0);
    syncUI();

    drawTank(ctxA, canvasA.width, canvasA.height);
    drawGraph(ctxG, canvasG.width, canvasG.height);

    requestAnimationFrame(animate);
}

function drawTank(ctx, w, h) {
    // Background gradient
    let bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#0a0e17');
    bg.addColorStop(1, '#121826');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    let scale = 14.0 * zoomFactor;
    let ground_y = h * 0.85;
    let tank_center_x = w * 0.25;

    let tank_w_px = phys.tank_width * scale;
    let container_h_px = phys.container_height * scale;
    let water_level_px = phys.water_level * scale;
    let spout_y_px = phys.spout_height * scale;
    let spout_dia_px = Math.max(3.0, phys.spout_diameter * scale);

    // Ground
    ctx.fillStyle = '#14181e';
    ctx.fillRect(0, ground_y, w, h - ground_y);
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, ground_y);
    ctx.lineTo(w, ground_y);
    ctx.stroke();

    // Tank Wall
    ctx.fillStyle = 'rgba(25, 30, 45, 0.7)';
    ctx.strokeStyle = 'rgba(80, 90, 110, 0.6)';
    ctx.beginPath();
    ctx.roundRect(tank_center_x - tank_w_px/2, ground_y - container_h_px, tank_w_px, container_h_px, 6);
    ctx.fill();
    ctx.stroke();

    // Water Body
    if (phys.water_level > 0) {
        let waterGrad = ctx.createLinearGradient(0, ground_y - water_level_px, 0, ground_y);
        waterGrad.addColorStop(0, 'rgba(0, 200, 255, 0.8)');
        waterGrad.addColorStop(1, 'rgba(0, 100, 200, 0.9)');
        ctx.fillStyle = waterGrad;

        let start_x = tank_center_x - tank_w_px/2 + 2;
        let end_x = start_x + tank_w_px - 4;
        let base_y = ground_y - water_level_px;

        ctx.beginPath();
        ctx.moveTo(start_x, ground_y);
        ctx.lineTo(start_x, base_y);

        // Sine wave surface
        if (phys.running && phys.exit_velocity > 0) {
            for (let wx = start_x; wx <= end_x + 2; wx += 4) {
                let wy = base_y + Math.sin((wx * 0.1) + phys.wave_offset) * (3.0 * zoomFactor);
                ctx.lineTo(wx, wy);
            }
        } else {
            ctx.lineTo(end_x, base_y);
        }
        
        ctx.lineTo(end_x, ground_y);
        ctx.closePath();
        ctx.fill();
    }

    // Spout
    let spout_x = tank_center_x + tank_w_px/2;
    let spout_y_screen = ground_y - spout_y_px;
    let spout_length = Math.max(12, 1.2 * scale);
    
    let spoutGrad = ctx.createLinearGradient(spout_x, spout_y_screen - spout_dia_px/2, spout_x, spout_y_screen + spout_dia_px/2);
    spoutGrad.addColorStop(0, '#dcbe50');
    spoutGrad.addColorStop(0.5, '#a08228');
    spoutGrad.addColorStop(1, '#645014');
    
    ctx.fillStyle = spoutGrad;
    ctx.strokeStyle = '#32280a';
    ctx.beginPath();
    ctx.roundRect(spout_x, spout_y_screen - (spout_dia_px/2), spout_length, spout_dia_px, 2);
    ctx.fill();
    ctx.stroke();

   // Particles
    let p_start_x = spout_x + spout_length;
    let p_start_y = spout_y_screen;

    ctx.fillStyle = 'rgba(0, 220, 255, 0.6)';
    for(let drop of phys.particles) {
        let dx = p_start_x + drop.x * scale;
        // FIX: Add drop.y instead of subtracting it (Canvas Y increases downwards)
        let dy = p_start_y + drop.y * scale; 
        let r = Math.max(1.5, drop.radius * scale);
        
        let v_mag = Math.sqrt(drop.vx*drop.vx + drop.vy*drop.vy);
        let stretch = Math.max(1.0, v_mag * 0.1);
        // FIX: Remove the negative sign from drop.vy
        let angle = Math.atan2(drop.vy, drop.vx); 

        ctx.save();
        ctx.translate(dx, dy);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, r * stretch, r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    
    }

    // UI Dash Line
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(tank_center_x - tank_w_px, ground_y - water_level_px);
    ctx.lineTo(tank_center_x + tank_w_px*1.5, ground_y - water_level_px);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.font = 'bold 12px "Segoe UI"';
    ctx.fillText(`h = ${phys.water_level.toFixed(1)}m`, tank_center_x + tank_w_px*1.5 + 5, ground_y - water_level_px + 4);
}

function drawGraph(ctx, w, h) {
    ctx.fillStyle = '#0e121c';
    ctx.fillRect(0, 0, w, h);

    const margin_l = 55, margin_r = 20, margin_t = 15, margin_b = 15, gap = 20;
    const plot_w = w - margin_l - margin_r;
    const plot_h = (h - margin_t - margin_b - gap) / 2;

    if (plot_w < 30 || plot_h < 20) return;

    let t_min = phys.history.length ? phys.history[0].t : 0;
    let t_max = phys.history.length > 1 ? phys.history[phys.history.length-1].t : 10.0;
    if (t_max - t_min > 40.0) t_min = t_max - 40.0;

    let visible_hist = phys.history.filter(d => d.t >= t_min);

    // Plot 1: Water Level
    drawSubplot(ctx, margin_l, margin_t, plot_w, plot_h, visible_hist, 'h', t_min, t_max, '#00e5ff', 'Water Level (m)');
    
    // Plot 2: Velocity
    drawSubplot(ctx, margin_l, margin_t + plot_h + gap, plot_w, plot_h, visible_hist, 'v', t_min, t_max, '#ffb432', 'Exit Velocity (m/s)');
}

function drawSubplot(ctx, px, py, pw, ph, data, key, t_min, t_max, color, label) {
    // BG & Grid
    ctx.fillStyle = '#141923';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 4);
    ctx.fill();
    ctx.stroke();

    for(let i=1; i<4; i++) {
        let y = py + (i/4)*ph;
        ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px+pw, y); ctx.stroke();
    }

    // Label Y
    ctx.save();
    ctx.translate(px - 35, py + ph / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = color;
    ctx.font = 'bold 10px "Segoe UI"';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    if (data.length < 2) return;

    let max_val = Math.max(...data.map(d => d[key]));
    let y_max = max_val > 0 ? max_val * 1.1 : 1.0;
    let y_min = 0.0;

    // Y Axis Ticks
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.font = '9px "Segoe UI"';
    for(let i=0; i<3; i++) {
        let frac = i/2;
        let y = py + frac * ph;
        let val = y_max - frac*(y_max - y_min);
        ctx.fillText(val.toFixed(1), px - 5, y);
    }

    const mapX = (t) => px + ((t - t_min) / Math.max(1e-9, t_max - t_min)) * pw;
    const mapY = (v) => py + ph - ((v - y_min) / Math.max(1e-9, y_max - y_min)) * ph;

    // Plot Line
    ctx.save();
    ctx.beginPath();
    ctx.rect(px, py, pw, ph);
    ctx.clip();

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    
    ctx.moveTo(mapX(data[0].t), mapY(data[0][key]));
    for (let i = 1; i < data.length; i++) {
        ctx.lineTo(mapX(data[i].t), mapY(data[i][key]));
    }
    ctx.stroke();

    // Glow Point
    let last = data[data.length-1];
    let lx = mapX(last.t), ly = mapY(last[key]);
    ctx.beginPath();
    ctx.arc(lx, ly, 3, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    
    ctx.restore();
}

// Start loop
requestAnimationFrame(animate);

</script>
