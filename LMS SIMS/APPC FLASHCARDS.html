<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Physics C Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        body {
            background: #020617;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
        }

        .flashcard {
            perspective: 1200px;
            height: 520px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px;
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .flashcard-front {
            background: linear-gradient(155deg, #0f172a 0%, #1e1b4b 100%);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .flashcard-back {
            background: linear-gradient(155deg, #064e3b 0%, #0f172a 100%);
            border: 1px solid rgba(52, 211, 153, 0.25);
            transform: rotateY(180deg);
        }

        /* Shimmer border effect */
        .flashcard-front::after, .flashcard-back::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.4), rgba(168, 85, 247, 0.1), rgba(99, 102, 241, 0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.6;
        }
        .flashcard-back::after {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.4), rgba(16, 185, 129, 0.1), rgba(52, 211, 153, 0.4));
        }

        .nav-btn {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.35);
            border-color: rgba(99, 102, 241, 0.5);
        }
        .nav-btn:active { transform: scale(0.96); }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            border-color: #334155;
        }

        .progress-bar {
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.5);
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .fade-in {
            animation: fadeIn 0.35s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .flip-pulse {
            animation: pulseOpacity 2.5s ease-in-out infinite;
        }
        @keyframes pulseOpacity {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* MathJax color inheritance */
        mjx-container {
            color: inherit !important;
        }
        mjx-container svg {
            display: inline;
        }
    </style>

    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            chtml: {
                scale: 1.15,
                mtextInheritFont: true
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <!-- Header -->
    <div class="w-full max-w-5xl mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="text-center sm:text-left">
            <h1 class="text-3xl sm:text-4xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300">
                AP Physics C
            </h1>
            <p class="text-slate-400 text-sm mt-1 tracking-wide uppercase">Mechanics Flashcards</p>
        </div>
        <div class="flex gap-3">
            <div class="stat-card rounded-2xl px-5 py-3 text-center min-w-[90px]">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Card</p>
                <p class="text-2xl font-bold text-white mt-0.5"><span id="current-card">1</span><span class="text-slate-500 text-lg font-normal"> / <span id="total-cards">75</span></span></p>
            </div>
            <div class="stat-card rounded-2xl px-5 py-3 text-center min-w-[90px]">
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Reviewed</p>
                <p class="text-2xl font-bold text-emerald-400 mt-0.5" id="reviewed-count">0</p>
            </div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="w-full max-w-5xl mb-8">
        <div class="flex justify-between text-[11px] text-slate-400 mb-2 font-medium uppercase tracking-wider">
            <span>Progress</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="w-full h-1.5 bg-slate-800/80 rounded-full overflow-hidden">
            <div id="progress-bar" class="progress-bar h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
    </div>

    <!-- Main Card Area -->
    <div class="w-full max-w-5xl flex items-center justify-center gap-5 sm:gap-8">
        <button id="prev-btn" class="nav-btn w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center text-slate-200 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <div id="flashcard" class="flashcard w-full max-w-3xl cursor-pointer select-none">
            <div class="flashcard-inner">
                <!-- Front -->
                <div class="flashcard-front">
                    <div class="absolute top-7 left-8">
                        <span class="text-[10px] text-indigo-300 font-bold uppercase tracking-[0.2em]">Question</span>
                    </div>
                    <div class="absolute top-7 right-8">
                        <span class="text-xs text-slate-500 font-mono">#<span id="card-number-front">1</span></span>
                    </div>
                    <div class="w-full flex items-center justify-center px-2">
                        <div id="question-text" class="text-xl sm:text-2xl md:text-[1.65rem] text-indigo-50 font-medium leading-relaxed text-center"></div>
                    </div>
                    <div class="absolute bottom-7 flip-pulse">
                        <span class="text-[11px] text-slate-500 flex items-center gap-2 font-medium">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            Click or Space to flip
                        </span>
                    </div>
                </div>

                <!-- Back -->
                <div class="flashcard-back">
                    <div class="absolute top-7 left-8">
                        <span class="text-[10px] text-emerald-300 font-bold uppercase tracking-[0.2em]">Answer</span>
                    </div>
                    <div class="absolute top-7 right-8">
                        <span class="text-xs text-slate-500 font-mono">#<span id="card-number-back">1</span></span>
                    </div>
                    <div class="w-full flex items-center justify-center px-2">
                        <div id="answer-text" class="text-xl sm:text-2xl md:text-[1.65rem] text-emerald-50 font-medium leading-relaxed text-center"></div>
                    </div>
                    <div class="absolute bottom-7">
                        <span class="text-[11px] text-slate-500 flex items-center gap-2 font-medium">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            Click or Space to flip back
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <button id="next-btn" class="nav-btn w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center text-slate-200 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>

    <!-- Keyboard Hints -->
    <div class="mt-8 flex flex-wrap justify-center gap-2 sm:gap-3">
        <div class="flex items-center gap-2 bg-slate-800/60 border border-slate-700/60 rounded-lg px-3 py-2">
            <kbd class="bg-slate-900 text-slate-300 px-2 py-0.5 rounded text-[11px] font-mono border border-slate-700">←</kbd>
            <span class="text-[11px] text-slate-400">Prev</span>
        </div>
        <div class="flex items-center gap-2 bg-slate-800/60 border border-slate-700/60 rounded-lg px-3 py-2">
            <kbd class="bg-slate-900 text-slate-300 px-2 py-0.5 rounded text-[11px] font-mono border border-slate-700">→</kbd>
            <span class="text-[11px] text-slate-400">Next</span>
        </div>
        <div class="flex items-center gap-2 bg-slate-800/60 border border-slate-700/60 rounded-lg px-3 py-2">
            <kbd class="bg-slate-900 text-slate-300 px-2 py-0.5 rounded text-[11px] font-mono border border-slate-700">Space</kbd>
            <span class="text-[11px] text-slate-400">Flip</span>
        </div>
    </div>

    <script>
        const flashcards = [
            { q: String.raw`In calculus-based mechanics, how is instantaneous velocity $\vec{v}$ defined in terms of the position vector $\vec{r}$?`, a: String.raw`$\vec{v} = \frac{d\vec{r}}{dt}$` },
            { q: String.raw`Define instantaneous acceleration $\vec{a}$ as a derivative of velocity.`, a: String.raw`$\vec{a} = \frac{d\vec{v}}{dt}$` },
            { q: String.raw`How is the displacement $\Delta x$ determined from a time-dependent velocity function $v_x(t)$?`, a: String.raw`$\Delta x = \int_{t_1}^{t_2} v_x(t)\,dt$` },
            { q: String.raw`How is the change in velocity $\Delta v$ determined from a time-dependent acceleration function $a_x(t)$?`, a: String.raw`$\Delta v = \int_{t_1}^{t_2} a_x(t)\,dt$` },
            { q: String.raw`Newton's Second Law relates the net force to the rate of change of which quantity?`, a: String.raw`Linear momentum $\vec{p}$ (where $\vec{F}_{\text{net}} = \frac{d\vec{p}}{dt}$)` },
            { q: String.raw`Write the integral expression for impulse $\vec{J}$ delivered by a time-varying force $\vec{F}(t)$.`, a: String.raw`$\vec{J} = \int \vec{F}\,dt$` },
            { q: String.raw`According to the Impulse-Momentum Theorem, the impulse delivered to a system is equal to the change in _____.`, a: String.raw`Linear momentum $\Delta \vec{p}$` },
            { q: String.raw`The Work-Energy Theorem states that the net work done on an object is equal to its change in _____.`, a: String.raw`Kinetic energy $\Delta K$` },
            { q: String.raw`Express the work $W$ done by a variable force $\vec{F}$ over a path from $a$ to $b$ as an integral.`, a: String.raw`$W = \int_{a}^{b} \vec{F} \cdot d\vec{r}$` },
            { q: String.raw`What mathematical relationship defines a conservative force $F_x$ in terms of its associated potential energy $U(x)$?`, a: String.raw`$F_x = -\frac{dU}{dx}$` },
            { q: String.raw`In a potential energy graph $U(x)$, what physical feature represents a position of stable equilibrium?`, a: String.raw`A local minimum of the potential energy function` },
            { q: String.raw`In a potential energy graph $U(x)$, what physical feature represents a position of unstable equilibrium?`, a: String.raw`A local maximum of the potential energy function` },
            { q: String.raw`Under what condition is the total linear momentum of a system conserved?`, a: String.raw`When the net external force exerted on the system is zero` },
            { q: String.raw`What is the general integral formula for the center of mass position $\vec{r}_{\text{cm}}$ of a continuous object?`, a: String.raw`$\vec{r}_{\text{cm}} = \frac{\int \vec{r}\,dm}{\int dm}$` },
            { q: String.raw`For a thin rod of length $L$, how is the differential mass element $dm$ expressed using linear mass density $\lambda$?`, a: String.raw`$dm = \lambda\,dx$` },
            { q: String.raw`What is the rotational analog of mass $m$ that measures resistance to angular acceleration?`, a: String.raw`Rotational inertia (or moment of inertia) $I$` },
            { q: String.raw`Define the rotational inertia $I$ of a continuous mass distribution as an integral.`, a: String.raw`$I = \int r^2\,dm$` },
            { q: String.raw`State the Parallel Axis Theorem formula for calculating the rotational inertia $I$ about an arbitrary axis.`, a: String.raw`$I = I_{\text{cm}} + Md^2$` },
            { q: String.raw`How is the magnitude of torque $\tau$ calculated using the position vector $\vec{r}$ and force vector $\vec{F}$?`, a: String.raw`$\tau = rF \sin \theta$ (or the magnitude of $\vec{r} \times \vec{F}$)` },
            { q: String.raw`Write Newton's Second Law in rotational form for a rigid system with constant rotational inertia.`, a: String.raw`$\sum \vec{\tau} = I\vec{\alpha}$` },
            { q: String.raw`How is angular momentum $\vec{L}$ defined for a rigid body rotating about a fixed axis?`, a: String.raw`$\vec{L} = I\vec{\omega}$` },
            { q: String.raw`How is the angular momentum $\vec{L}$ of a point mass defined relative to an origin?`, a: String.raw`$\vec{L} = \vec{r} \times \vec{p}$` },
            { q: String.raw`What is the rotational version of the Impulse-Momentum Theorem?`, a: String.raw`$\int \vec{\tau}\,dt = \Delta \vec{L}$` },
            { q: String.raw`Under what condition is the total angular momentum of a system constant?`, a: String.raw`When the net external torque exerted on the system is zero` },
            { q: String.raw`In the "Mirror World" of rotation, what translational quantity corresponds to the rotational kinetic energy $K_{\text{rot}} = \frac{1}{2}I\omega^2$?`, a: String.raw`Translational kinetic energy $K_{\text{trans}} = \frac{1}{2}mv^2$` },
            { q: String.raw`What formula describes the total kinetic energy of an object rolling without slipping?`, a: String.raw`$K_{\text{tot}} = \frac{1}{2}mv_{\text{cm}}^2 + \frac{1}{2}I_{\text{cm}}\omega^2$` },
            { q: String.raw`For an object of radius $R$ rolling without slipping, what is the kinematic constraint relating $v_{\text{cm}}$ and $\omega$?`, a: String.raw`$v_{\text{cm}} = R\omega$` },
            { q: String.raw`Identify the second-order differential equation that defines Simple Harmonic Motion (SHM) for position $x$.`, a: String.raw`$\frac{d^2x}{dt^2} = -\omega^2 x$` },
            { q: String.raw`For a mass-spring system, what is the relationship between the angular frequency $\omega$, spring constant $k$, and mass $m$?`, a: String.raw`$\omega = \sqrt{\frac{k}{m}}$` },
            { q: String.raw`Express the period $T$ of a simple pendulum in terms of its length $L$ and gravitational acceleration $g$.`, a: String.raw`$T = 2\pi \sqrt{\frac{L}{g}}$` },
            { q: String.raw`What is the angular frequency $\omega$ for a physical pendulum with rotational inertia $I$ and distance $d$ from the pivot to the center of mass?`, a: String.raw`$\omega = \sqrt{\frac{mgd}{I}}$` },
            { q: String.raw`Which calculus technique is typically used to solve the differential equation $m\frac{dv}{dt} = -kv$ for a resistive force?`, a: String.raw`Separation of variables` },
            { q: String.raw`In the presence of a velocity-dependent resistive force, what happens to an object's acceleration when it reaches terminal velocity?`, a: String.raw`The acceleration becomes zero` },
            { q: String.raw`What does the slope of a momentum vs. time graph represent?`, a: String.raw`The net force $\vec{F}_{\text{net}}$` },
            { q: String.raw`What physical quantity is represented by the area under a torque vs. time graph?`, a: String.raw`Angular impulse (or change in angular momentum $\Delta \vec{L}$)` },
            { q: String.raw`State the general equation for gravitational potential energy $U_g$ between two spherical masses $m_1$ and $m_2$ at distance $r$.`, a: String.raw`$U_g = -\frac{Gm_1m_2}{r}$` },
            { q: String.raw`How is the escape speed $v_{\text{esc}}$ from a planet of mass $M$ and radius $R$ derived using energy conservation?`, a: String.raw`By setting total mechanical energy ($K + U$) to zero ($v_{\text{esc}} = \sqrt{\frac{2GM}{R}}$)` },
            { q: String.raw`What is the magnitude of the gravitational field $g$ at a distance $r$ from the center of a planet of mass $M$?`, a: String.raw`$g = \frac{GM}{r^2}$` },
            { q: String.raw`For a satellite in a circular orbit, which force provides the necessary centripetal acceleration?`, a: String.raw`The gravitational force ($F_g = \frac{mv^2}{r}$)` },
            { q: String.raw`How is power $P$ expressed in terms of force $\vec{F}$ and velocity $\vec{v}$?`, a: String.raw`$P = \vec{F} \cdot \vec{v}$` },
            { q: String.raw`What is the maximum velocity $v_{\text{max}}$ of an object in SHM with amplitude $A$ and angular frequency $\omega$?`, a: String.raw`$v_{\text{max}} = A\omega$` },
            { q: String.raw`What is the maximum acceleration $a_{\text{max}}$ of an object in SHM with amplitude $A$ and angular frequency $\omega$?`, a: String.raw`$a_{\text{max}} = A\omega^2$` },
            { q: String.raw`According to Kepler's Third Law, how does the square of the orbital period $T$ relate to the cube of the orbital radius $r$?`, a: String.raw`$T^2 \propto r^3$` },
            { q: String.raw`In a perfectly inelastic collision, what is the primary characteristic regarding the objects' final state?`, a: String.raw`The objects stick together and move with a common final velocity` },
            { q: String.raw`What quantity is conserved in an elastic collision but not in an inelastic collision?`, a: String.raw`Total kinetic energy $K$` },
            { q: String.raw`How is the work done by a constant torque $\tau$ calculated as it rotates a system through an angle $\Delta \theta$?`, a: String.raw`$W = \tau \, \Delta \theta$` },
            { q: String.raw`Define the relationship between angular velocity $\omega$ and the time-period $T$.`, a: String.raw`$\omega = \frac{2\pi}{T}$` },
            { q: String.raw`In a system consisting only of a falling object (excluding Earth), is mechanical energy constant?`, a: String.raw`No, because the external force of gravity does work on the object` },
            { q: String.raw`In a box-Earth system, what happens to the total mechanical energy as the box falls?`, a: String.raw`It remains constant (gravitational potential energy converts to kinetic energy)` },
            { q: String.raw`The parallel component of a force $F_{\parallel}$ relative to displacement $d$ does work equal to _____.`, a: String.raw`$W = Fd\cos\theta$` },
            { q: String.raw`What is the value of the centripetal acceleration $a_c$ for an object moving in a circle of radius $r$ at speed $v$?`, a: String.raw`$a_c = \frac{v^2}{r}$` },
            { q: String.raw`How does the rotational inertia of a hoop compare to a solid disk of the same mass and radius?`, a: String.raw`The hoop has greater rotational inertia because its mass is farther from the axis` },
            { q: String.raw`Write the formula for the elastic potential energy $U_s$ stored in a spring stretched by $\Delta x$.`, a: String.raw`$U_s = \frac{1}{2}k(\Delta x)^2$` },
            { q: String.raw`What integral allows for the calculation of the total mass $M$ from a volume mass density function $\rho(r)$?`, a: String.raw`$M = \int \rho(r)\,dV$` },
            { q: String.raw`Which law states that the torque exerted by Object A on Object B is equal and opposite to the torque exerted by B on A?`, a: String.raw`Newton's Third Law (Rotational form)` },
            { q: String.raw`What is the relationship between linear speed $v$ and angular speed $\omega$ for a point at distance $r$ from the axis?`, a: String.raw`$v = r\omega$` },
            { q: String.raw`What is the relationship between tangential acceleration $a_t$ and angular acceleration $\alpha$ for a point at distance $r$ from the axis?`, a: String.raw`$a_t = r\alpha$` },
            { q: String.raw`In the absence of air resistance, how does the horizontal component of velocity behave in projectile motion?`, a: String.raw`It remains constant` },
            { q: String.raw`The area under a force vs. position graph represents the _____.`, a: String.raw`Work done by the force` },
            { q: String.raw`Identify the vector operation used to determine the direction of torque.`, a: String.raw`The cross product (specifically $\vec{r} \times \vec{F}$ using the right-hand rule)` },
            { q: String.raw`What represents the "stiffness" of a spring in Hooke's Law ($F_s = -k\Delta x$)?`, a: String.raw`The spring constant $k$` },
            { q: String.raw`If a system is in rotational equilibrium, what is the value of the net torque?`, a: String.raw`Zero` },
            { q: String.raw`How is the angular impulse delivered to a system related to its angular momentum?`, a: String.raw`Angular Impulse $= \Delta \vec{L}$` },
            { q: String.raw`For a nonuniform solid, the center of mass is the "weighted average" of position. What serves as the weighting factor in the integral?`, a: String.raw`The differential mass element $dm$` },
            { q: String.raw`In SHM, at which position is the magnitude of the restoring force at its maximum?`, a: String.raw`At the maximum displacement (amplitude $A$)` },
            { q: String.raw`In SHM, at which position is the kinetic energy of the oscillator at its maximum?`, a: String.raw`At the equilibrium position ($x=0$)` },
            { q: String.raw`Define the dot product $\vec{A} \cdot \vec{B}$ in terms of magnitudes and the angle $\theta$ between them.`, a: String.raw`$\vec{A} \cdot \vec{B} = AB\cos\theta$` },
            { q: String.raw`Define the magnitude of the cross product $|\vec{A} \times \vec{B}|$ in terms of magnitudes and the angle $\theta$ between them.`, a: String.raw`$AB\sin\theta$` },
            { q: String.raw`What is the rotational analog of Newton's First Law?`, a: String.raw`An object will maintain constant angular velocity if the net torque is zero` },
            { q: String.raw`Which conservation law explains why a spinning ice skater speeds up when pulling their arms in?`, a: String.raw`Conservation of Angular Momentum` },
            { q: String.raw`How does rotational kinetic energy $K_{\text{rot}}$ change if the angular velocity is doubled for a fixed rotational inertia?`, a: String.raw`It quadruples (since $K_{\text{rot}} \propto \omega^2$)` },
            { q: String.raw`What is the "Force Derivative Bridge" relating force to potential energy in one dimension?`, a: String.raw`$F(x) = -\frac{dU(x)}{dx}$` },
            { q: String.raw`Scenario: A ball is thrown upward. Describe the sign of the work done by gravity while the ball is ascending.`, a: String.raw`Negative (force is down, displacement is up)` },
            { q: String.raw`What does the area under an acceleration vs. time graph represent?`, a: String.raw`Change in velocity $\Delta v$` },
            { q: String.raw`How is instantaneous power $P$ related to work $W$ in calculus?`, a: String.raw`$P = \frac{dW}{dt}$` }
        ];

        let currentIndex = 0;
        const reviewedCards = new Set();
        let isFlipped = false;

        const flashcard = document.getElementById('flashcard');
        const questionText = document.getElementById('question-text');
        const answerText = document.getElementById('answer-text');
        const currentCardEl = document.getElementById('current-card');
        const totalCardsEl = document.getElementById('total-cards');
        const reviewedCountEl = document.getElementById('reviewed-count');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const cardNumberFront = document.getElementById('card-number-front');
        const cardNumberBack = document.getElementById('card-number-back');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function typeset(elements) {
            if (window.MathJax && window.MathJax.typesetPromise) {
                return window.MathJax.typesetPromise(elements).catch(err => console.error('MathJax typeset error:', err));
            }
            return Promise.resolve();
        }

        function clearMath(elements) {
            if (window.MathJax && window.MathJax.typesetClear) {
                window.MathJax.typesetClear(elements);
            }
        }

        function updateNavButtons() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === flashcards.length - 1;
        }

        function updateCard() {
            // Remove old rendered math before DOM changes
            clearMath([questionText, answerText]);

            const card = flashcards[currentIndex];
            questionText.textContent = card.q;
            answerText.textContent = card.a;

            currentCardEl.textContent = currentIndex + 1;
            cardNumberFront.textContent = currentIndex + 1;
            cardNumberBack.textContent = currentIndex + 1;

            isFlipped = false;
            flashcard.classList.remove('flipped');

            // Trigger fade animation
            flashcard.classList.remove('fade-in');
            void flashcard.offsetWidth;
            flashcard.classList.add('fade-in');

            updateNavButtons();
            typeset([questionText, answerText]);
        }

        function flipCard() {
            isFlipped = !isFlipped;
            flashcard.classList.toggle('flipped', isFlipped);

            if (isFlipped) {
                reviewedCards.add(currentIndex);
                reviewedCountEl.textContent = reviewedCards.size;
                updateProgress();
            }
        }

        function updateProgress() {
            const pct = (reviewedCards.size / flashcards.length) * 100;
            progressBar.style.width = pct + '%';
            progressPercent.textContent = Math.round(pct) + '%';
        }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        // Event listeners
        flashcard.addEventListener('click', flipCard);

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            nextCard();
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            prevCard();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                flipCard();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextCard();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        // Initialize
        totalCardsEl.textContent = flashcards.length;
        updateCard();
    </script>
</body>
</html>
