<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Physics 1 - Final Exam Review Flashcards</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady().then(() => {
                        renderCurrentCard();
                    });
                }
            }
        };
    </script>
    <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            margin-bottom: 15px;
        }
        .header h1 {
            color: #e94560;
            font-size: 2.2rem;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            margin-bottom: 8px;
        }
        .header p {
            color: #a0a0a0;
            font-size: 1rem;
        }
        .stats {
            color: #4ecca3;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .progress-bar {
            width: 100%;
            max-width: 600px;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #4ecca3);
            width: 0%;
            transition: width 0.3s ease;
        }
        .card-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 700px;
            padding: 10px;
        }
        .flashcard {
            background: linear-gradient(145deg, #1f2937, #111827);
            border-radius: 20px;
            padding: 40px 35px;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid transparent;
            width: 100%;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .flashcard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #e94560, #4ecca3);
        }
        .flashcard:hover {
            border-color: #e94560;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .flashcard .card-number {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #4ecca3;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .flashcard .question {
            color: #ffffff;
            font-size: 1.25rem;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        .flashcard .answer {
            color: #4ecca3;
            font-size: 1.25rem;
            line-height: 1.7;
            padding-top: 20px;
            border-top: 1px solid #374151;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease, padding-top 0.3s ease;
            padding-top: 0;
        }
        .flashcard.flipped .answer {
            max-height: 300px;
            opacity: 1;
            padding-top: 20px;
        }
        .flashcard .hint {
            color: #6b7280;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            font-style: italic;
            transition: opacity 0.3s ease;
        }
        .flashcard.flipped .hint {
            opacity: 0;
        }
        .nav-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 700px;
        }
        .nav-btn {
            background: linear-gradient(145deg, #374151, #1f2937);
            color: #ffffff;
            border: 2px solid #4ecca3;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            background: linear-gradient(145deg, #4ecca3, #3db892);
            color: #1a1a2e;
            transform: scale(1.1);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .nav-btn:disabled:hover {
            background: linear-gradient(145deg, #374151, #1f2937);
            color: #ffffff;
            transform: none;
        }
        .card-counter {
            color: #ffffff;
            font-size: 1.1rem;
            min-width: 80px;
            text-align: center;
        }
        .card-counter span {
            color: #4ecca3;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(145deg, #e94560, #c73e54);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn.secondary {
            background: linear-gradient(145deg, #4ecca3, #3db892);
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }
        .btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(78, 204, 163, 0.5);
        }
        mjx-container {
            color: inherit !important;
        }
        .answer mjx-container {
            color: #4ecca3 !important;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.6rem;
            }
            .flashcard {
                padding: 30px 25px;
                min-height: 280px;
            }
            .flashcard .question,
            .flashcard .answer {
                font-size: 1.1rem;
            }
            .nav-btn {
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AP Physics 1 - Final Exam Review</h1>
        <p>Click the card to reveal the answer</p>
    </div>
    <div class="stats">
        <span id="viewedCount">0</span> / <span id="totalCount">75</span> cards viewed
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="card-area">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <span class="card-number" id="cardNumber"></span>
            <div class="question" id="question"></div>
            <div class="answer" id="answer"></div>
            <div class="hint">Click to reveal answer</div>
        </div>
    </div>

    <div class="nav-area">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">&#9664;</button>
        <div class="card-counter"><span id="currentIdx">1</span> / <span id="totalIdx">75</span></div>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">&#9654;</button>
    </div>

    <div class="controls">
        <button class="btn" onclick="shuffleCards()">Shuffle</button>
        <button class="btn secondary" onclick="resetCard()">Reset Card</button>
        <button class="btn" onclick="resetAll()">Reset All</button>
    </div>

    <script>
        const flashcardsData = [
            { q: "In one-dimensional motion, how is the relative velocity of object \\(A\\) with respect to object \\(C\\) determined from their velocities relative to object \\(B\\)?", a: "By the vector sum \\(v_{A/C} = v_{A/B} + v_{B/C}\\)." },
            { q: "What is the relationship between the slope of a velocity vs. time graph and physical motion?", a: "The slope represents the instantaneous acceleration of the object." },
            { q: "How is the change in position (displacement) determined from a velocity vs. time graph?", a: "It is calculated as the area under the curve between two points in time." },
            { q: "Which physical quantity does the area under an acceleration vs. time graph represent?", a: "The area represents the change in velocity \\(\\Delta v\\)." },
            { q: "What condition must be met for a system to be modeled as a single point-like object?", a: "All parts of the system must move with the same velocity and acceleration." },
            { q: "How do internal forces between objects within a system affect the motion of the system's center of mass?", a: "Internal forces do not influence the motion or acceleration of the center of mass." },
            { q: "State the formula for the acceleration of a system's center of mass in terms of external forces.", a: "\\(\\vec{a}_{sys} = \\frac{\\sum \\vec{F}_{ext}}{m_{sys}}\\)." },
            { q: "Under what condition is the magnitude of the static friction force equal to \\(\\mu_s |\\vec{F}_n|\\)?", a: "Only when the object is at the threshold of slipping (maximum static friction)." },
            { q: "What is the qualitative relationship between tension and height in a hanging chain with significant mass?", a: "The tension is greater toward the top of the chain to support the weight below it." },
            { q: "According to Newton's Third Law, how do the magnitudes of forces in an interaction pair compare?", a: "The magnitudes are always equal, regardless of the masses or motion of the objects." },
            { q: "In the absence of a net external force, what happens to the velocity of a system's center of mass?", a: "The velocity of the center of mass remains constant." },
            { q: "How is the net work done on an object related to its translational kinetic energy?", a: "The net work is equal to the change in the object's kinetic energy (Work-Energy Theorem)." },
            { q: "Define a 'conservative force' in terms of path dependence.", a: "A force whose work done on a system is independent of the path taken between configurations." },
            { q: "What happens to the total mechanical energy of a system if only conservative internal forces do work?", a: "The total mechanical energy of the system remains constant." },
            { q: "How is the work done by a force calculated when the force and displacement are at an angle \\(\\theta\\)?", a: "\\(W = F d \\cos \\theta\\)." },
            { q: "What is the physical effect of a force component that is perpendicular to an object's displacement?", a: "It changes the direction of the object's motion without changing its kinetic energy." },
            { q: "Formula: Translational Kinetic Energy", a: "\\(K = \\frac{1}{2} m v^2\\)." },
            { q: "Formula: Gravitational Potential Energy for two spherical masses (planets/stars)", a: "\\(U_g = -\\frac{G m_1 m_2}{r}\\)." },
            { q: "How is instantaneous power delivered by a constant force related to velocity?", a: "\\(P = F v \\cos \\theta\\), where \\(\\theta\\) is the angle between force and velocity." },
            { q: "The area under a Force vs. Position graph represents the _____.", a: "Work done on the system (or change in kinetic energy)." },
            { q: "Define 'linear momentum' for an object of mass \\(m\\) and velocity \\(v\\).", a: "It is the vector quantity defined by \\(\\vec{p} = m\\vec{v}\\)." },
            { q: "How is the net external force related to the momentum of a system over time?", a: "The net external force is equal to the rate of change of momentum: \\(\\vec{F}_{net} = \\frac{\\Delta \\vec{p}}{\\Delta t}\\)." },
            { q: "What does the area under a Net Force vs. Time graph represent?", a: "The impulse delivered to the system, which equals the change in momentum." },
            { q: "Under what condition is the total linear momentum of a system constant?", a: "When the net external force exerted on the system is zero." },
            { q: "Compare the impulse exerted by object \\(A\\) on object \\(B\\) to the impulse exerted by \\(B\\) on \\(A\\) during a collision.", a: "The impulses are equal in magnitude and opposite in direction." },
            { q: "In an inelastic collision, which quantity is conserved and which is not?", a: "Momentum is conserved, but kinetic energy is not." },
            { q: "How is the angular displacement \\(\\Delta \\theta\\) related to linear distance \\(s\\) for a point at radius \\(r\\)?", a: "\\(\\Delta \\theta = \\frac{\\Delta s}{r}\\)." },
            { q: "What is the rotational analog of mass (inertia) in Newton's Second Law?", a: "Rotational inertia (or moment of inertia), denoted by \\(I\\)." },
            { q: "Formula: Rotational Inertia of a collection of point masses", a: "\\(I = \\sum m_i r_i^2\\)." },
            { q: "Define 'Torque' in terms of force, lever arm distance, and angle.", a: "\\(\\tau = r F \\sin \\theta\\)." },
            { q: "State the rotational form of Newton's Second Law for a rigid system.", a: "\\(\\alpha = \\frac{\\sum \\tau}{I}\\)." },
            { q: "What is the condition for a system to be in rotational equilibrium?", a: "The net torque exerted on the system must be zero." },
            { q: "Formula: Rotational Kinetic Energy", a: "\\(K_{rot} = \\frac{1}{2} I \\omega^2\\)." },
            { q: "How is the total kinetic energy of a rolling object (without slipping) calculated?", a: "It is the sum of translational kinetic energy \\(\\frac{1}{2} M v_{cm}^2\\) and rotational kinetic energy \\(\\frac{1}{2} I_{cm} \\omega^2\\)." },
            { q: "How is the angular momentum of a point mass moving in a straight line relative to a reference point calculated?", a: "\\(L = m v r \\sin \\theta\\)." },
            { q: "The area under a Torque vs. Time graph represents _____.", a: "The angular impulse delivered to the system (change in angular momentum)." },
            { q: "Under what condition is the angular momentum of a system conserved?", a: "When the net external torque exerted on the system is zero." },
            { q: "How can the angular speed of a non-rigid system change if the net external torque is zero?", a: "By changing its shape to move mass closer to or further from the rotational axis, which changes \\(I\\)." },
            { q: "What defines Simple Harmonic Motion (SHM) regarding the restoring force?", a: "The restoring force must be directly proportional to the displacement from equilibrium." },
            { q: "Formula: Period of a mass-spring oscillator", a: "\\(T_s = 2\\pi \\sqrt{\\frac{m}{k}}\\)." },
            { q: "Formula: Period of a simple pendulum (small angles)", a: "\\(T_p = 2\\pi \\sqrt{\\frac{L}{g}}\\)." },
            { q: "How does changing the amplitude of an oscillator affect its period in SHM?", a: "The period of an object in SHM is independent of the amplitude." },
            { q: "At what position in SHM is the magnitude of the velocity at its maximum?", a: "At the equilibrium position (where displacement is zero)." },
            { q: "Define 'density' \\(\\rho\\) of a fluid.", a: "The ratio of mass to volume: \\(\\rho = \\frac{m}{V}\\)." },
            { q: "What is the difference between absolute pressure and gauge pressure?", a: "Absolute pressure includes atmospheric pressure \\(P_{abs} = P_{atm} + P_{gauge}\\)." },
            { q: "How is the pressure change \\(\\Delta P\\) in a static fluid related to the depth \\(h\\)?", a: "\\(\\Delta P = \\rho g h\\)." },
            { q: "State Archimedes' Principle regarding the buoyant force.", a: "The buoyant force equals the weight of the fluid displaced by the object." },
            { q: "Formula: Continuity Equation for an incompressible fluid in a pipe", a: "\\(A_1 v_1 = A_2 v_2\\)." },
            { q: "Which conservation law forms the basis of Bernoulli's Equation?", a: "The conservation of mechanical energy for a fluid system." },
            { q: "Formula: Bernoulli's Equation", a: "\\(P_1 + \\rho g y_1 + \\frac{1}{2} \\rho v_1^2 = P_2 + \\rho g y_2 + \\frac{1}{2} \\rho v_2^2\\)." },
            { q: "What is the derived speed of a fluid exiting a small hole at depth \\(h\\) (Torricelli's theorem)?", a: "\\(v = \\sqrt{2 g h}\\)." },
            { q: "How is average angular velocity defined?", a: "\\(\\omega_{avg} = \\frac{\\Delta \\theta}{\\Delta t}\\)." },
            { q: "What is the relationship between the tangential acceleration \\(a_T\\) and angular acceleration \\(\\alpha\\)?", a: "\\(a_T = r \\alpha\\)." },
            { q: "Which rotational inertia represents the minimum value for a rigid system in a given plane?", a: "The rotational inertia about an axis passing through the system's center of mass." },
            { q: "In a banked curve with no friction, what force component provides the centripetal acceleration?", a: "The horizontal component of the normal force." },
            { q: "How is work done related to torque and angular displacement?", a: "\\(W = \\tau \\Delta \\theta\\)." },
            { q: "The slope of an Angular Momentum vs. Time graph represents _____.", a: "The net external torque exerted on the system." },
            { q: "What happens to the orbital speed of a satellite if its orbital radius decreases?", a: "The orbital speed increases to conserve angular momentum (or satisfy gravity requirements)." },
            { q: "Concept: Inertial Frame of Reference", a: "Definition: A coordinate system that is not accelerating, where Newton's laws are valid." },
            { q: "In a collision modeled as an isolated system, why is the center of mass velocity constant?", a: "Because the internal collision forces cancel out, leaving zero net external force." },
            { q: "What is the 'Work-Energy Theorem' formula for net work?", a: "\\(\\Delta K = \\sum W\\)." },
            { q: "How does the period of a mass-spring system change if it is moved from Earth to a planet with higher gravity?", a: "The period remains the same, as it does not depend on \\(g\\)." },
            { q: "Under what condition is the restoring torque of a pendulum proportional to angular displacement?", a: "Only for small angular displacements (small-angle approximation)." },
            { q: "What is the 'buoyant force' formula for an object submerged in a fluid of density \\(\\rho\\)?", a: "\\(F_b = \\rho V_{displaced} g\\)." },
            { q: "List the two requirements for a fluid to be considered 'ideal'.", a: "It must be incompressible and have zero viscosity." },
            { q: "How is the potential energy of an ideal spring calculated?", a: "\\(U_s = \\frac{1}{2} k (\\Delta x)^2\\)." },
            { q: "What kinematic quantity is represented by the area under a Force vs. Time graph divided by mass?", a: "The change in velocity \\(\\Delta v\\)." },
            { q: "If a disk and a hoop of equal mass and radius roll down a ramp, why does the disk reach the bottom first?", a: "The disk has a smaller rotational inertia, requiring less energy to go into rotation." },
            { q: "How is the frequency \\(f\\) of an oscillator related to its period \\(T\\)?", a: "\\(f = \\frac{1}{T}\\)." },
            { q: "What is the units for pressure in the SI system?", a: "Pascals (Pa), where \\(1\\text{ Pa} = 1\\text{ N/m}^2\\)." },
            { q: "Explain why work is a scalar quantity even though force and displacement are vectors.", a: "It is defined by the dot product of force and displacement, which yields a magnitude only." },
            { q: "In a perfectly elastic collision between two identical masses where one is initially at rest, what happens to their velocities?", a: "The masses exchange velocities; the moving mass stops and the stationary mass moves with the initial speed." },
            { q: "How is the average power related to work and time?", a: "\\(P_{avg} = \\frac{W}{\\Delta t}\\)." },
            { q: "What is the physical significance of the 'equilibrium position' in SHM?", a: "It is the location where the net force on the oscillator is zero." },
            { q: "Formula: Hooke's Law for spring force", a: "\\(\\vec{F}_s = -k \\Delta \\vec{x}\\)." }
        ];

        let viewedCards = new Set();
        let currentCards = [...flashcardsData];
        let currentIndex = 0;

        function updateProgress() {
            const percent = (viewedCards.size / currentCards.length) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('viewedCount').textContent = viewedCards.size;
            document.getElementById('totalCount').textContent = currentCards.length;
        }

        function updateNav() {
            document.getElementById('currentIdx').textContent = currentIndex + 1;
            document.getElementById('totalIdx').textContent = currentCards.length;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === currentCards.length - 1;
        }

        function renderCurrentCard() {
            const card = currentCards[currentIndex];
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');
            document.getElementById('cardNumber').textContent = '#' + (currentIndex + 1);
            document.getElementById('question').innerHTML = card.q;
            document.getElementById('answer').innerHTML = card.a;
            updateNav();
            updateProgress();
            MathJax.typesetPromise();
        }

        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');
            if (flashcard.classList.contains('flipped')) {
                viewedCards.add(currentIndex);
                updateProgress();
            }
            MathJax.typesetPromise();
        }

        function nextCard() {
            if (currentIndex < currentCards.length - 1) {
                currentIndex++;
                renderCurrentCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentCard();
            }
        }

        function shuffleCards() {
            for (let i = currentCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
            }
            viewedCards.clear();
            currentIndex = 0;
            renderCurrentCard();
        }

        function resetCard() {
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function resetAll() {
            viewedCards.clear();
            currentIndex = 0;
            renderCurrentCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextCard();
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevCard();
            else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
        });

        document.getElementById('totalCount').textContent = flashcardsData.length;
    </script>
</body>
</html>
