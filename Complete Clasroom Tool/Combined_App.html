<style>
  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;

    color: #f8fafc;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .app-header-container {
    max-height: 260px;
    overflow: hidden;
    transition: max-height 0.28s ease;
  }
  body.header-collapsed .app-header-container {
    max-height: 0;
  }
  body.header-collapsed.header-hover-open .app-header-container {
    max-height: 260px;
  }
  .app-header {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.5);
    padding: 12px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 10;
    flex-wrap: wrap;
    gap: 12px;
  }
  .top-hover-zone {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 14px;
    z-index: 30;
    pointer-events: none;
  }
  body.header-collapsed .top-hover-zone {
    pointer-events: auto;
  }
  .header-toggle-btn {
    position: fixed;
    top: 6px;
    right: 12px;
    z-index: 40;
    width: 34px;
    height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(15, 23, 42, 0.84);
    color: #e2e8f0;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }
  .header-toggle-btn:hover {
    background: rgba(30, 41, 59, 0.95);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .header-toggle-btn:active {
    transform: translateY(1px);
  }
  .app-title {
    font-size: 18px;
    font-weight: 700;
    margin-right: 32px;
    background: linear-gradient(to right, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .tab-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #e2e8f0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .tab-btn:hover {
    background: rgba(255, 255, 255, 0.15);
  }
  .tab-btn.active {
    background: #8b5cf6;
    border-color: #a78bfa;
    color: #ffffff;
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
  }
  .iframe-container {
    flex: 1;
    position: relative;
    background: #000;
  }
  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  iframe.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 5;
  }
</style>
</head>

&lt;style&gt;
/* CSS Resets &amp; Base Variables */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: &#x27;Segoe UI&#x27;, system-ui, sans-serif; }
:root { --mid-height: 560px; --tile-gap: 10px; --tile-height: 128px; --ring-size: 500px; }
body { background: #0a0e1a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 8px 20px; overflow-x: hidden; }

/* Typography */
.title { font-size: 24px; font-weight: 800; color: rgba(255,255,255,0.8); letter-spacing: 6px; text-align: center; margin-bottom: 6px; }

/* Cards &amp; Layout */
.glass-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; box-shadow: 0 4px 30px rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
.settings-row { display: flex; gap: 24px; padding: 14px 20px; width: 100%; max-width: 1400px; margin-bottom: 8px; justify-content: space-between; flex-wrap: wrap; }
.setting-group { flex: 1; min-width: 200px; }
.setting-group h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.v-divider { width: 1px; background: rgba(255,255,255,0.1); margin: 0 12px; }

/* Inputs */
.input-grid { display: grid; grid-template-columns: auto 1fr; gap: 12px 16px; align-items: center; }
.input-grid label { font-size: 12px; color: rgba(255,255,255,0.5); }
.input-grid input[type=&quot;number&quot;] { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; color: #fff; font-size: 14px; width: 100px; outline: none; transition: 0.2s; }
.input-grid input[type=&quot;number&quot;]:focus { border-color: rgba(100,180,255,0.5); }

/* Checkboxes */
.checkbox-group { display: flex; flex-direction: column; gap: 12px; }
.checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #b0b0b0; cursor: pointer; }
.checkbox-label input { accent-color: #7c4dff; width: 16px; height: 16px; cursor: pointer; }

/* Buttons */
.btn-row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
.btn { padding: 12px 30px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; letter-spacing: 1px; cursor: pointer; color: #fff; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

.btn-start { background: #1b5e20; } .btn-start:hover:not(:disabled) { background: #2e7d32; }
.btn-pause { background: #e65100; } .btn-pause:hover:not(:disabled) { background: #f57c00; }
.btn-reset { background: #b71c1c; } .btn-reset:hover:not(:disabled) { background: #d32f2f; }
.btn-frq { background: #6a1b9a; display: none; } .btn-frq:hover:not(:disabled) { background: #8e24aa; }

/* Middle Layout */
.mid-layout { display: flex; gap: 18px; width: 100%; max-width: 1400px; flex-wrap: nowrap; justify-content: center; align-items: stretch; height: var(--mid-height); margin-bottom: 10px; }
.ring-container { flex: 1 1 auto; min-width: 320px; min-height: 0; display: flex; justify-content: center; align-items: center; position: relative; }
.canvas-ring { width: var(--ring-size); height: var(--ring-size); }

/* Right Column */
.info-col { flex: 0 0 clamp(220px, 25%, 300px); min-width: 210px; height: 100%; display: grid; grid-template-rows: repeat(4, minmax(0, 1fr)); gap: var(--tile-gap); }
.info-card { height: 100%; min-height: var(--tile-height); padding: 12px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.info-card .lbl { font-size: clamp(22px, calc(var(--tile-height) * 0.27), 38px); font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 5px; line-height: 1; }
.info-card .val { font-size: clamp(32px, calc(var(--tile-height) * 0.42), 64px); font-weight: 700; color: #fff; line-height: 1; }

.q-card { height: 100%; min-height: var(--tile-height); padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
.q-card .sec-name { font-size: clamp(20px, calc(var(--tile-height) * 0.20), 34px); font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 2px; line-height: 0.98; }
.q-card .q-main { font-size: clamp(40px, calc(var(--tile-height) * 0.43), 76px); font-weight: 800; color: #00e676; position: relative; z-index: 2; text-shadow: 0 0 24px rgba(0,230,118,0.45); line-height: 0.94; }
.q-card .q-sub { font-size: clamp(14px, calc(var(--tile-height) * 0.14), 26px); color: rgba(255,255,255,0.7); margin-top: 2px; z-index: 2; line-height: 0.95; }
.q-glow { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(0,230,118,0.2) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; }

/* Progress Bar */
.prog-container { width: 100%; max-width: 1400px; height: 26px; background: rgba(255,255,255,0.05); border-radius: 13px; margin-bottom: 10px; position: relative; overflow: hidden; }
.prog-fill { height: 100%; width: 0%; border-radius: 13px; background: linear-gradient(90deg, rgba(0,230,118,0.7), #00e676); transition: width 0.3s; position: relative; }
.prog-glow { position: absolute; right: 0; top: 0; bottom: 0; width: 40px; background: radial-gradient(circle, rgba(255,255,255,0.8), transparent); filter: blur(5px); opacity: 0.5; }
.prog-text { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); }

/* Overview Bar */
.overview-bar { width: 100%; max-width: 1400px; height: 38px; display: flex; gap: 4px; margin-bottom: 0; }
.ov-seg { height: 100%; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8); position: relative; overflow: hidden; }
.ov-seg.finished { opacity: 0.3; }
.ov-seg.active { border: 1.5px solid rgba(255,255,255,0.3); opacity: 1; }
.ov-seg.inactive { opacity: 0.3; }
.ov-seg-fill { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,0.2); }
.ov-text { position: relative; z-index: 2; }

/* Pause Overlay */
.pause-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
.pause-overlay.active { display: flex; }
.pause-icon { display: flex; gap: 16px; margin-bottom: 24px; position: relative; }
.pause-icon::before { content:&#x27;&#x27;; position: absolute; inset: -40px; background: radial-gradient(circle, rgba(255,193,7,0.3) 0%, transparent 70%); border-radius: 50%; z-index: -1; }
.pause-bar { width: 18px; height: 60px; background: #ffc107; border-radius: 4px; box-shadow: 0 0 15px rgba(255,193,7,0.5); }
.pause-text { font-size: 24px; font-weight: 800; color: #ffc107; letter-spacing: 4px; }
.pause-resume-btn { margin-top: 20px; }
@media (max-width: 1020px) {
  .mid-layout { height: auto; flex-wrap: wrap; }
  .ring-container { width: 100%; }
  .canvas-ring { width: min(86vw, 620px); height: min(86vw, 620px); }
  .info-col { flex: 1 1 100%; height: auto; grid-template-columns: repeat(2, minmax(0, 1fr)); grid-template-rows: none; }
  .info-card, .q-card { min-height: 170px; }
}
&lt;/style&gt;

&lt;script&gt;
// --- Utils ---
function lerpColor(c1, c2, t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
  const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
  const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
  return [r, g, b];
}

function hexToRgb(h) {
  h = h.replace(&#x27;#&#x27;,&#x27;&#x27;);
  if(h.length === 3) h = h.split(&#x27;&#x27;).map(c=&gt;c+c).join(&#x27;&#x27;);
  return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
}

function urgencyColor(frac) {
  const cGreen = hexToRgb(&#x27;#00e676&#x27;);
  const cYellow = hexToRgb(&#x27;#ffeb3b&#x27;);
  const cOrange = hexToRgb(&#x27;#ff9800&#x27;);
  const cRed = hexToRgb(&#x27;#ff1744&#x27;);
  
  if(frac &lt; 0.5) return lerpColor(cGreen, cYellow, frac / 0.5);
  else if(frac &lt; 0.8) return lerpColor(cYellow, cOrange, (frac - 0.5) / 0.3);
  else return lerpColor(cOrange, cRed, (frac - 0.8) / 0.2);
}

function rgbToStr(rgb, a=1) { return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`; }
function fmtTime(sec) {
  const s = Math.max(0, Math.floor(sec));
  const m = Math.floor(s / 60);
  const rm = s % 60;
  return `${m.toString().padStart(2,&#x27;0&#x27;)}:${rm.toString().padStart(2,&#x27;0&#x27;)}`;
}

// --- State ---
let state = {
  running: false,
  paused: false,
  waitingForFrq: false,
  sections: [],
  currentSectionIdx: -1,
  lastTick: 0,
  lastQNum: -1,
  pulsePhase: 0
};
const EXAM_TIMER_STATE_KEY = &#x27;examTimerStateV1&#x27;;
let lastPersistAt = 0;

// DOM
const cvs = document.getElementById(&#x27;ring-canvas&#x27;);
const ctx = cvs.getContext(&#x27;2d&#x27;);
const btnStart = document.getElementById(&#x27;btn-start&#x27;);
const btnPause = document.getElementById(&#x27;btn-pause&#x27;);
const btnReset = document.getElementById(&#x27;btn-reset&#x27;);
const btnFrq = document.getElementById(&#x27;btn-frq&#x27;);
const btnPauseResumeOverlay = document.getElementById(&#x27;pause-resume-btn&#x27;);

const elQVal = document.getElementById(&#x27;q-val&#x27;);
const elQSub = document.getElementById(&#x27;q-sub&#x27;);
const elQSecName = document.getElementById(&#x27;q-sec-name&#x27;);
const elQGlow = document.getElementById(&#x27;q-glow&#x27;);

const elValQLeft = document.getElementById(&#x27;val-q-left&#x27;);
const elValSecQ = document.getElementById(&#x27;val-sec-q&#x27;);
const elValElapsed = document.getElementById(&#x27;val-elapsed&#x27;);

const elProgFill = document.getElementById(&#x27;prog-fill&#x27;);
const elProgText = document.getElementById(&#x27;prog-text&#x27;);
const elOverview = document.getElementById(&#x27;overview-bar&#x27;);

const elPauseOv = document.getElementById(&#x27;pause-overlay&#x27;);

function getOuterHeight(el) {
  if (!el) return 0;
  const style = window.getComputedStyle(el);
  return el.offsetHeight + parseFloat(style.marginTop || 0) + parseFloat(style.marginBottom || 0);
}

function applyResponsiveLayoutSizing() {
  const root = document.documentElement;
  const wideLayout = window.matchMedia(&#x27;(min-width: 1021px)&#x27;).matches;
  if (!wideLayout) {
    root.style.setProperty(&#x27;--mid-height&#x27;, &#x27;auto&#x27;);
    root.style.setProperty(&#x27;--ring-size&#x27;, `${Math.min(window.innerWidth * 0.96, 760)}px`);
    return;
  }
  const bodyStyle = window.getComputedStyle(document.body);
  const bodyPaddingY = parseFloat(bodyStyle.paddingTop || 0) + parseFloat(bodyStyle.paddingBottom || 0);
  const reservedHeight =
    getOuterHeight(document.querySelector(&#x27;.title&#x27;)) +
    getOuterHeight(document.querySelector(&#x27;.settings-row&#x27;)) +
    getOuterHeight(document.querySelector(&#x27;.btn-row&#x27;)) +
    getOuterHeight(document.querySelector(&#x27;.prog-container&#x27;)) +
    getOuterHeight(document.querySelector(&#x27;.overview-bar&#x27;));
  const midHeight = Math.max(420, window.innerHeight - bodyPaddingY - reservedHeight - 10);
  root.style.setProperty(&#x27;--mid-height&#x27;, `${midHeight}px`);
  const tileGap = 12;
  const tileHeight = Math.max(90, (midHeight - tileGap * 3) / 4);
  root.style.setProperty(&#x27;--tile-height&#x27;, `${tileHeight}px`);
  const midWidth = document.querySelector(&#x27;.mid-layout&#x27;)?.getBoundingClientRect().width || 1000;
  const infoWidth = document.querySelector(&#x27;.info-col&#x27;)?.getBoundingClientRect().width || 330;
  const ringByTiles = tileHeight * 4.4;
  const ringMaxByWidth = Math.max(380, midWidth - infoWidth - 18);
  const ringSize = Math.max(360, Math.min(ringByTiles, midHeight, ringMaxByWidth));
  root.style.setProperty(&#x27;--ring-size&#x27;, `${ringSize}px`);
}

function serializeInputs() {
  return {
    mcqQ: document.getElementById(&#x27;mcq-q&#x27;).value,
    mcqT: document.getElementById(&#x27;mcq-t&#x27;).value,
    frqQ: document.getElementById(&#x27;frq-q&#x27;).value,
    frqT: document.getElementById(&#x27;frq-t&#x27;).value,
    breakCb: document.getElementById(&#x27;break-cb&#x27;).checked,
    slowCb: document.getElementById(&#x27;slow-cb&#x27;).checked
  };
}

function applyInputs(inputs = {}) {
  if (inputs.mcqQ !== undefined) document.getElementById(&#x27;mcq-q&#x27;).value = inputs.mcqQ;
  if (inputs.mcqT !== undefined) document.getElementById(&#x27;mcq-t&#x27;).value = inputs.mcqT;
  if (inputs.frqQ !== undefined) document.getElementById(&#x27;frq-q&#x27;).value = inputs.frqQ;
  if (inputs.frqT !== undefined) document.getElementById(&#x27;frq-t&#x27;).value = inputs.frqT;
  document.getElementById(&#x27;break-cb&#x27;).checked = !!inputs.breakCb;
  document.getElementById(&#x27;slow-cb&#x27;).checked = !!inputs.slowCb;
}

function persistExamState(force = false) {
  const now = Date.now();
  if (!force &amp;&amp; now - lastPersistAt &lt; 800) return;
  lastPersistAt = now;
  const snapshot = {
    inputs: serializeInputs(),
    state: {
      running: state.running,
      paused: state.paused,
      waitingForFrq: state.waitingForFrq,
      sections: state.sections.map(s =&gt; ({ ...s })),
      currentSectionIdx: state.currentSectionIdx,
      lastQNum: state.lastQNum,
      pulsePhase: state.pulsePhase
    }
  };
  localStorage.setItem(EXAM_TIMER_STATE_KEY, JSON.stringify(snapshot));
}

function syncControlsFromState() {
  if (!state.running) {
    btnStart.disabled = false;
    btnPause.disabled = true;
    btnPause.innerText = &quot;⏸ PAUSE&quot;;
    btnFrq.style.display = &#x27;none&#x27;;
    elPauseOv.classList.remove(&#x27;active&#x27;);
    return;
  }
  btnStart.disabled = true;
  btnPause.disabled = !!state.waitingForFrq;
  btnPause.innerText = state.paused ? &quot;▶ RESUME&quot; : &quot;⏸ PAUSE&quot;;
  btnFrq.style.display = state.waitingForFrq ? &#x27;block&#x27; : &#x27;none&#x27;;
  if (state.paused) elPauseOv.classList.add(&#x27;active&#x27;);
  else elPauseOv.classList.remove(&#x27;active&#x27;);
}

function loadExamState() {
  try {
    const raw = localStorage.getItem(EXAM_TIMER_STATE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== &#x27;object&#x27;) return;
    applyInputs(parsed.inputs || {});
    if (!parsed.state || typeof parsed.state !== &#x27;object&#x27;) return;
    state.running = !!parsed.state.running;
    state.paused = !!parsed.state.paused;
    state.waitingForFrq = !!parsed.state.waitingForFrq;
    state.sections = Array.isArray(parsed.state.sections) ? parsed.state.sections.map(s =&gt; ({ ...s })) : [];
    state.currentSectionIdx = Number.isInteger(parsed.state.currentSectionIdx) ? parsed.state.currentSectionIdx : -1;
    state.lastQNum = Number.isInteger(parsed.state.lastQNum) ? parsed.state.lastQNum : -1;
    state.pulsePhase = Number.isFinite(parsed.state.pulsePhase) ? parsed.state.pulsePhase : 0;
    state.lastTick = performance.now();
    syncControlsFromState();
    drawRing();
    updateUI();
    if (state.running &amp;&amp; !state.paused &amp;&amp; !state.waitingForFrq) requestAnimationFrame(tick);
  } catch(e) {}
}

// Canvas Render
function drawRing() {
  ctx.clearRect(0, 0, 1000, 1000);
  const w = 1000, h = 1000;
  const cx = w/2, cy = h/2;
  const side = Math.min(w, h);
  
  ctx.lineCap = &#x27;round&#x27;;
  
  // Total Exam (Outer)
  const outerR = side * 0.46;
  const outerW = side * 0.02;
  
  // Base outer arc
  ctx.strokeStyle = &#x27;rgba(255,255,255,0.05)&#x27;;
  ctx.lineWidth = outerW;
  ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2); ctx.stroke();
  
  const totElapsed = state.sections.reduce((a,b)=&gt;a+b.elapsed, 0);
  const totDur = state.sections.reduce((a,b)=&gt;a+b.totalSecs, 0);
  const totFrac = totDur &gt; 0 ? Math.min(1.0, totElapsed / totDur) : 0;
  
  const spanTot = -Math.max(0, 1.0 - totFrac) * Math.PI * 2;
  
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(-Math.PI/2);
  
  for(let i=0; i&lt;3; i++) {
    const ga = Math.max(0.01, 0.12 - i*0.04);
    ctx.lineWidth = outerW + (i+1)*6;
    ctx.strokeStyle = `rgba(255,255,255,${ga})`;
    ctx.beginPath(); ctx.arc(0, 0, outerR, 0, spanTot, true); ctx.stroke();
  }
  ctx.lineWidth = outerW;
  ctx.strokeStyle = &#x27;rgba(255,255,255,0.2)&#x27;;
  ctx.beginPath(); ctx.arc(0, 0, outerR, 0, spanTot, true); ctx.stroke();
  
  ctx.restore();
  
  // Section (Inner)
  const innerR = side * 0.38;
  const innerW = side * 0.04;
  
  ctx.strokeStyle = &#x27;rgba(255,255,255,0.06)&#x27;;
  ctx.lineWidth = innerW;
  ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI*2); ctx.stroke();
  
  let sec = state.currentSectionIdx &gt;= 0 &amp;&amp; state.currentSectionIdx &lt; state.sections.length ? state.sections[state.currentSectionIdx] : null;

  let colorRgb = [0,230,118]; // green default
  let frc = 0;
  let remainingSec = 0;
  let secName = &quot;&quot;;
  let secText = &quot;00:00&quot;;
  let pulse = 1.0;
  
  if (sec) {
    frc = sec.totalSecs &gt; 0 ? Math.min(1.0, sec.elapsed / sec.totalSecs) : 1;
    colorRgb = urgencyColor(frc);
    remainingSec = Math.max(0, sec.totalSecs - sec.elapsed);
    secName = sec.name.toUpperCase();
    secText = fmtTime(remainingSec);
    
    if(frc &gt; 0.8) {
      state.pulsePhase += 0.08;
      pulse = 1.0 + 0.15 * Math.sin(state.pulsePhase);
    }
  } else if(state.sections.length &gt; 0 &amp;&amp; state.currentSectionIdx &gt;= state.sections.length) {
    colorRgb = [255, 23, 68]; // red
    secName = &quot;FINISHED&quot;;
    secText = &quot;DONE&quot;;
    frc = 1;
  }
  
  const spanSec = -Math.max(0, 1.0 - frc) * Math.PI * 2;
  
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(-Math.PI/2);
  
  for(let i=0; i&lt;5; i++) {
    const ga = Math.max(0.01, (0.27 - i*0.05) * pulse);
    ctx.lineWidth = innerW + (i+1)*10;
    ctx.strokeStyle = rgbToStr(colorRgb, ga);
    ctx.beginPath(); ctx.arc(0, 0, innerR, 0, spanSec, true); ctx.stroke();
  }
  ctx.lineWidth = innerW;
  ctx.strokeStyle = rgbToStr(colorRgb, 1);
  ctx.beginPath(); ctx.arc(0, 0, innerR, 0, spanSec, true); ctx.stroke();
  
  // Bright tip
  if(spanSec &lt; -0.05) {
    const tipX = innerR * Math.cos(spanSec);
    const tipY = innerR * Math.sin(spanSec);
    const grd = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, innerW*2);
    grd.addColorStop(0, &#x27;rgba(255,255,255,0.8)&#x27;);
    grd.addColorStop(0.3, rgbToStr(colorRgb, 0.7));
    grd.addColorStop(1, &#x27;rgba(0,0,0,0)&#x27;);
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(tipX, tipY, innerW*2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  
  // Center Text Layout
  ctx.textAlign = &#x27;center&#x27;;
  ctx.textBaseline = &#x27;middle&#x27;;
  
  let y = cy - 250;
  
  ctx.font = &#x27;900 85px &quot;Segoe UI&quot;&#x27;;
  ctx.fillStyle = rgbToStr(colorRgb, 0.2);
  ctx.fillText(secName, cx, y+3);
  ctx.fillStyle = rgbToStr(colorRgb, 1);
  ctx.fillText(secName, cx, y);
  
  y += 115;
  ctx.font = &#x27;900 150px &quot;Segoe UI&quot;&#x27;;
  ctx.fillStyle = &#x27;rgba(0,0,0,0.5)&#x27;;
  ctx.fillText(secText, cx+6, y+6);
  ctx.fillStyle = &#x27;#fff&#x27;;
  ctx.fillText(secText, cx, y);
  
  y += 85;
  ctx.font = &#x27;700 42px &quot;Segoe UI&quot;&#x27;;
  ctx.fillStyle = rgbToStr(colorRgb, 0.8);
  ctx.fillText(`${Math.max(0, 1-frc)*100|0}% remaining`, cx, y);
  
  y += 50;
  ctx.strokeStyle = &#x27;rgba(255,255,255,0.15)&#x27;;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(cx - 90, y); ctx.lineTo(cx + 90, y); ctx.stroke();
  
  y += 65;
  ctx.font = &#x27;700 32px &quot;Segoe UI&quot;&#x27;;
  ctx.fillStyle = &#x27;rgba(255,255,255,0.4)&#x27;;
  ctx.fillText(&quot;TOTAL EXAM&quot;, cx, y);
  
  y += 85;
  ctx.font = &#x27;800 100px &quot;Segoe UI&quot;&#x27;;
  ctx.fillStyle = &#x27;rgba(0,0,0,0.4)&#x27;;
  const totText = fmtTime(Math.max(0, totDur - totElapsed));
  ctx.fillText(totText, cx+4, y+4);
  ctx.fillStyle = &#x27;rgba(255,255,255,0.85)&#x27;;
  ctx.fillText(totText, cx, y);
  
  y += 75;
  ctx.font = &#x27;700 42px &quot;Segoe UI&quot;&#x27;;
  ctx.fillStyle = &#x27;rgba(255,255,255,0.5)&#x27;;
  ctx.fillText(`${Math.max(0, 1-totFrac)*100|0}% of exam left`, cx, y);
}

// Draw initial empty frame
drawRing();

// Engine
function startSection() {
  state.sections = [];
  const mq = parseInt(document.getElementById(&#x27;mcq-q&#x27;).value) || 0;
  const mt = parseInt(document.getElementById(&#x27;mcq-t&#x27;).value) || 0;
  const fq = parseInt(document.getElementById(&#x27;frq-q&#x27;).value) || 0;
  const ft = parseInt(document.getElementById(&#x27;frq-t&#x27;).value) || 0;
  
  if (mq&gt;0 &amp;&amp; mt&gt;0) state.sections.push({name:&#x27;MCQ&#x27;, totalSecs:mt*60, qCount:mq, elapsed:0, qTimer:0, bg:&#x27;#42a5f5&#x27;});
  if (fq&gt;0 &amp;&amp; ft&gt;0) state.sections.push({name:&#x27;FRQ&#x27;, totalSecs:ft*60, qCount:fq, elapsed:0, qTimer:0, bg:&#x27;#ab47bc&#x27;});
  
  if(state.sections.length === 0) return;
  
  state.currentSectionIdx = 0;
  state.running = true;
  state.paused = false;
  state.waitingForFrq = false;
  state.lastQNum = -1;
  state.lastTick = performance.now();
  
  btnStart.disabled = true;
  btnPause.disabled = false;
  btnPause.innerText = &quot;⏸ PAUSE&quot;;
  btnFrq.style.display = &#x27;none&#x27;;
  elPauseOv.classList.remove(&#x27;active&#x27;);
  
  persistExamState(true);
  requestAnimationFrame(tick);
}

function pauseToggle() {
  if(!state.running) return;
  state.paused = !state.paused;
  if(!state.paused) {
    state.lastTick = performance.now();
    elPauseOv.classList.remove(&#x27;active&#x27;);
    btnPause.innerText = &quot;⏸ PAUSE&quot;;
    persistExamState(true);
    requestAnimationFrame(tick);
  } else {
    elPauseOv.classList.add(&#x27;active&#x27;);
    btnPause.innerText = &quot;▶ RESUME&quot;;
    persistExamState(true);
  }
}

function resetApp() {
  state.running = false;
  state.paused = false;
  state.sections = [];
  state.currentSectionIdx = -1;
  
  btnStart.disabled = false;
  btnPause.disabled = true;
  btnPause.innerText = &quot;⏸ PAUSE&quot;;
  btnFrq.style.display = &#x27;none&#x27;;
  elPauseOv.classList.remove(&#x27;active&#x27;);
  
  drawRing();
  updateUI();
  persistExamState(true);
}

function startFrq() {
  state.waitingForFrq = false;
  btnFrq.style.display = &#x27;none&#x27;;
  btnPause.disabled = false;
  state.lastQNum = -1;
  state.lastTick = performance.now();
  persistExamState(true);
  requestAnimationFrame(tick);
}

function tick(now) {
  if(!state.running) return;
  if(state.paused || state.waitingForFrq) { drawRing(); updateUI(); return; }
  
  let dt = (now - state.lastTick) / 1000.0;
  state.lastTick = now;
  
  if(document.getElementById(&#x27;slow-cb&#x27;).checked) dt *= 0.25;
  
  if(state.currentSectionIdx &gt;= state.sections.length) {
    finishExam();
    return;
  }
  
  let sec = state.sections[state.currentSectionIdx];
  sec.elapsed += dt;
  
  const frc = Math.min(1.0, sec.elapsed / sec.totalSecs);
  const qSec = sec.totalSecs / sec.qCount;
  const currQ = Math.min(sec.qCount, Math.max(1, Math.ceil(frc * sec.qCount)));
  
  if (currQ !== state.lastQNum) {
    sec.qTimer = 0;
    state.lastQNum = currQ;
  } else {
    sec.qTimer += dt;
  }
  
  if(sec.elapsed &gt;= sec.totalSecs) {
    sec.elapsed = sec.totalSecs;
    state.currentSectionIdx++;
    state.lastQNum = -1;
    
    if(state.currentSectionIdx &gt;= state.sections.length) {
      finishExam(); return;
    }
    
    if(document.getElementById(&#x27;break-cb&#x27;).checked) {
      if(state.sections[state.currentSectionIdx].name === &#x27;FRQ&#x27;) {
        state.waitingForFrq = true;
        btnFrq.style.display = &#x27;block&#x27;;
        btnPause.disabled = true;
      }
    }
  }
  
  drawRing();
  updateUI();
  persistExamState();
  requestAnimationFrame(tick);
}

function finishExam() {
  state.running = false;
  btnStart.disabled = false;
  btnPause.disabled = true;
  btnFrq.style.display = &#x27;none&#x27;;
  drawRing(); updateUI();
  persistExamState(true);
}

function updateUI() {
  if(state.currentSectionIdx &lt; 0) {
    elQVal.innerText = &quot;Q0&quot;; elQSub.innerText = &quot;out of 0&quot;; elQSecName.innerText = &quot;—&quot;;
    elValQLeft.innerText = &quot;—&quot;; elValSecQ.innerText = &quot;—&quot;; elValElapsed.innerText = &quot;—&quot;;
    elProgFill.style.width = &quot;0%&quot;; elProgText.innerText = `0%`;
    elOverview.innerHTML = &quot;&quot;;
    return;
  }
  
  if(state.currentSectionIdx &gt;= state.sections.length) {
    elQSecName.innerText = &quot;Exam Complete&quot;;
    elQVal.innerText = &quot;DONE&quot;; elQVal.style.color = &quot;#ff1744&quot;; elQSub.innerText = &quot;&quot;;
    elProgFill.style.width = &quot;100%&quot;; elProgFill.style.background = &quot;#ff1744&quot;;
    elOverview.innerHTML = state.sections.map(s =&gt; `&lt;div class=&#x27;ov-seg finished&#x27; style=&#x27;flex:1;background:${s.bg}&#x27;&gt;${s.name}&lt;/div&gt;`).join(&#x27;&#x27;);
    return;
  }
  
  let sec = state.sections[state.currentSectionIdx];
  const frc = sec.totalSecs &gt; 0 ? Math.min(1.0, sec.elapsed / sec.totalSecs) : 1.0;
  const col = urgencyColor(frc);
  const colStr = rgbToStr(col);
  
  if(state.waitingForFrq) {
    elQSecName.innerText = &quot;BREAK — Press START FRQ&quot;;
    elQSecName.style.color = &quot;#ffc107&quot;;
  } else {
    elQSecName.innerText = sec.name;
    elQSecName.style.color = colStr;
  }
  
  const currQ = Math.min(sec.qCount, Math.max(1, Math.ceil(frc * sec.qCount)));
  elQVal.innerText = `Q${currQ}`;
  elQVal.style.color = colStr;
  elQGlow.style.background = `radial-gradient(circle, ${rgbToStr(col, 0.2)} 0%, transparent 70%)`;
  elQSub.innerText = `out of ${sec.qCount}`;
  
  elValQLeft.innerText = Math.max(0, sec.qCount - currQ);
  elValQLeft.style.color = colStr;
  
  const qBudget = sec.totalSecs / sec.qCount;
  const qRem = Math.max(0, qBudget - sec.qTimer);
  const qFrc = Math.min(1.0, sec.qTimer / qBudget);
  elValSecQ.innerText = `${qRem.toFixed(1)}s`;
  elValSecQ.style.color = rgbToStr(urgencyColor(qFrc));
  
  elValElapsed.innerText = fmtTime(sec.elapsed);
  
  elProgFill.style.width = `${frc * 100}%`;
  elProgFill.style.background = `linear-gradient(90deg, ${rgbToStr(col, 0.7)}, ${colStr})`;
  elProgText.innerText = `${frc * 100 | 0}%`;
  
  const totDur = state.sections.reduce((a,b)=&gt;a+b.totalSecs, 0);
  elOverview.innerHTML = state.sections.map((s, i) =&gt; {
    let cl = &#x27;ov-seg &#x27;;
    let fl = 0;
    if(i &lt; state.currentSectionIdx) { cl += &#x27;finished&#x27;; fl = 1; }
    else if(i === state.currentSectionIdx) { cl += &#x27;active&#x27;; fl = frc; }
    else { cl += &#x27;inactive&#x27;; }
    
    const flexW = s.totalSecs / totDur;
    return `
      &lt;div class=&#x27;${cl}&#x27; style=&#x27;flex: ${flexW}; background: ${s.bg}44;&#x27;&gt;
        &lt;div class=&#x27;ov-seg-fill&#x27; style=&#x27;width: ${fl*100}%; background: ${s.bg}CC;&#x27;&gt;&lt;/div&gt;
        &lt;div class=&#x27;ov-text&#x27;&gt;${s.name}&lt;/div&gt;
      &lt;/div&gt;
    `;
  }).join(&#x27;&#x27;);
}

btnStart.onclick = startSection;
btnPause.onclick = pauseToggle;
btnReset.onclick = resetApp;
btnFrq.onclick = startFrq;
btnPauseResumeOverlay.onclick = pauseToggle;
[&#x27;mcq-q&#x27;,&#x27;mcq-t&#x27;,&#x27;frq-q&#x27;,&#x27;frq-t&#x27;,&#x27;break-cb&#x27;,&#x27;slow-cb&#x27;].forEach(id =&gt; {
  const el = document.getElementById(id);
  el.addEventListener(&#x27;change&#x27;, () =&gt; { persistExamState(true); applyResponsiveLayoutSizing(); });
  el.addEventListener(&#x27;input&#x27;, () =&gt; { persistExamState(); applyResponsiveLayoutSizing(); });
});
window.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
  if (e.code !== &#x27;Space&#x27;) return;
  const target = e.target;
  const isTypingTarget = target &amp;&amp; (target.tagName === &#x27;INPUT&#x27; || target.tagName === &#x27;TEXTAREA&#x27; || target.isContentEditable);
  if (isTypingTarget) return;
  if (!state.running || state.waitingForFrq) return;
  e.preventDefault();
  pauseToggle();
});
window.addEventListener(&#x27;resize&#x27;, applyResponsiveLayoutSizing);
window.addEventListener(&#x27;beforeunload&#x27;, () =&gt; persistExamState(true));
loadExamState();
applyResponsiveLayoutSizing();

&lt;body&gt;

&lt;h1&gt;🎯 Randomizer Wheel&lt;/h1&gt;

&lt;div class=&quot;controls&quot;&gt;
  &lt;select id=&quot;classSelect&quot;&gt;&lt;/select&gt;
  &lt;button class=&quot;btn&quot; id=&quot;spinBtn&quot;&gt;SPIN WHEEL!&lt;/button&gt;
&lt;/div&gt;

&lt;div class=&quot;wheel-container&quot;&gt;
  &lt;div class=&quot;pointer&quot;&gt;&lt;/div&gt;
  &lt;canvas id=&quot;wheel&quot; width=&quot;800&quot; height=&quot;800&quot;&gt;&lt;/canvas&gt;
&lt;/div&gt;

&lt;div class=&quot;winner-toast&quot; id=&quot;winnerToast&quot;&gt;
  &lt;div id=&quot;winnerText&quot;&gt;Name&lt;/div&gt;
  &lt;div class=&quot;sub&quot;&gt;has been selected!&lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
let appData = { classes: {} };
let students = [];
let colors = [];
const RANDOMIZER_STATE_KEY = &#x27;randomizerStateV1&#x27;;

const classSelect = document.getElementById(&#x27;classSelect&#x27;);
const btnSpin = document.getElementById(&#x27;spinBtn&#x27;);
const cvs = document.getElementById(&#x27;wheel&#x27;);
const ctx = cvs.getContext(&#x27;2d&#x27;);
const toast = document.getElementById(&#x27;winnerToast&#x27;);
const toastText = document.getElementById(&#x27;winnerText&#x27;);

const PALETTE = [&#x27;#e74c3c&#x27;,&#x27;#3498db&#x27;,&#x27;#2ecc71&#x27;,&#x27;#f39c12&#x27;,&#x27;#9b59b6&#x27;,&#x27;#1abc9c&#x27;,&#x27;#e67e22&#x27;,&#x27;#e84393&#x27;,&#x27;#00b894&#x27;,&#x27;#6c5ce7&#x27;,&#x27;#fd79a8&#x27;,&#x27;#0984e3&#x27;,&#x27;#d63031&#x27;,&#x27;#55efc4&#x27;,&#x27;#fab1a0&#x27;,&#x27;#74b9ff&#x27;];

// Angle logic
let currentRot = 0;
let isSpinning = false;

function readSavedState() {
  try {
    const raw = localStorage.getItem(RANDOMIZER_STATE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed &amp;&amp; typeof parsed === &#x27;object&#x27; ? parsed : {};
  } catch(e) {
    return {};
  }
}

function saveState(patch = {}) {
  const prev = readSavedState();
  const next = { ...prev, ...patch };
  localStorage.setItem(RANDOMIZER_STATE_KEY, JSON.stringify(next));
}

function init() {
  try {
    const d = localStorage.getItem(&#x27;classRotatorData&#x27;);
    if (d) appData = JSON.parse(d);
    if (!appData.classes) appData.classes = {};
  } catch(e) {}
  
  classSelect.innerHTML = &#x27;&#x27;;
  const names = Object.keys(appData.classes);
  
  if(names.length === 0) {
    const opt = document.createElement(&#x27;option&#x27;);
    opt.text = &quot;No classes found&quot;;
    classSelect.add(opt);
    btnSpin.disabled = true;
    drawEmpty();
    return;
  }
  
  names.forEach(n =&gt; {
    const opt = document.createElement(&#x27;option&#x27;);
    opt.value = n; opt.text = n;
    classSelect.add(opt);
  });
  
  const savedState = readSavedState();
  const savedClass = savedState.selectedClass;
  const initialClass = savedClass &amp;&amp; appData.classes[savedClass] ? savedClass : names[0];
  classSelect.value = initialClass;
  loadClass(initialClass);
}

classSelect.addEventListener(&#x27;change&#x27;, (e) =&gt; {
  const selected = e.target.value;
  saveState({ selectedClass: selected });
  loadClass(selected);
});

function loadClass(name) {
  if (isSpinning) return;
  saveState({ selectedClass: name });
  const list = appData.classes[name] || [];
  students = list.map(s =&gt; typeof s === &#x27;string&#x27; ? s : s.name);
  if(students.length === 0) {
    btnSpin.disabled = true; drawEmpty(); return;
  }
  btnSpin.disabled = false;
  
  colors = students.map((_, i) =&gt; PALETTE[i % PALETTE.length]);
  currentRot = 0;
  drawWheel(0);
}

function drawEmpty() {
  ctx.clearRect(0, 0, 800, 800);
  ctx.beginPath();
  ctx.arc(400, 400, 390, 0, Math.PI*2);
  ctx.fillStyle = &#x27;rgba(255,255,255,0.05)&#x27;;
  ctx.fill();
  ctx.lineWidth = 4;
  ctx.strokeStyle = &#x27;rgba(255,255,255,0.1)&#x27;;
  ctx.stroke();
  
  ctx.fillStyle = &#x27;rgba(255,255,255,0.4)&#x27;;
  ctx.font = &#x27;600 30px &quot;Segoe UI&quot;&#x27;;
  ctx.textAlign = &#x27;center&#x27;;
  ctx.textBaseline = &#x27;middle&#x27;;
  ctx.fillText(&quot;Add a class first&quot;, 400, 400);
}

function drawWheel(angleOffset) {
  ctx.clearRect(0, 0, 800, 800);
  const cx = 400, cy = 400, r = 390;
  
  const total = students.length;
  if(total === 0) return;
  
  const arcLen = (Math.PI * 2) / total;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleOffset);
  
  for(let i=0; i&lt;total; i++) {
    const start = i * arcLen;
    const end = start + arcLen;
    
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0, 0, r, start, end);
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = &#x27;rgba(0,0,0,0.3)&#x27;;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Draw Text
    ctx.save();
    ctx.rotate(start + arcLen / 2);
    ctx.textAlign = &#x27;right&#x27;;
    ctx.textBaseline = &#x27;middle&#x27;;
    ctx.fillStyle = &#x27;#fff&#x27;;
    ctx.font = &#x27;700 26px &quot;Segoe UI&quot;&#x27;;
    
    // Truncate name if too long
    let n = students[i];
    if(n.length &gt; 20) n = n.substring(0, 18) + &#x27;...&#x27;;
    
    // add drop shadow to text for contrast
    ctx.shadowColor = &#x27;rgba(0,0,0,0.6)&#x27;;
    ctx.shadowBlur = 4;
    ctx.fillText(n, r - 30, 0);
    ctx.restore();
  }
  
  // Center peg
  ctx.beginPath();
  ctx.arc(0,0, 20, 0, Math.PI*2);
  ctx.fillStyle = &#x27;#fff&#x27;;
  ctx.fill();
  ctx.shadowBlur = 10;
  ctx.shadowColor = &#x27;rgba(0,0,0,0.5)&#x27;;
  ctx.beginPath();
  ctx.arc(0,0, 12, 0, Math.PI*2);
  ctx.fillStyle = &#x27;#1e130c&#x27;;
  ctx.fill();
  
  ctx.restore();
}

btnSpin.addEventListener(&#x27;click&#x27;, () =&gt; {
  if(isSpinning || students.length === 0) return;
  toast.classList.remove(&#x27;show&#x27;);
  isSpinning = true;
  classSelect.disabled = true;
  btnSpin.disabled = true;
  
  const totalItems = students.length;
  
  // Random spins between 5 and 10 full rotations + random slice
  const spinRotations = (Math.random() * 5 + 5) * Math.PI * 2;
  const extraAngle = Math.random() * Math.PI * 2; 
  const targetRot = currentRot + spinRotations + extraAngle;
  
  const dur = 4000 + Math.random() * 2000; // 4 to 6 seconds
  let start = null;
  
  // Easing function: easeOutQuart
  const easeOut = (t) =&gt; 1 - Math.pow(1 - t, 4);
  
  function animate(timestamp) {
    if(!start) start = timestamp;
    const p = Math.min((timestamp - start) / dur, 1.0);
    const ease = easeOut(p);
    
    const r = currentRot + (targetRot - currentRot) * ease;
    drawWheel(r);
    
    if(p &lt; 1.0) {
      requestAnimationFrame(animate);
    } else {
      currentRot = r % (Math.PI * 2); 
      isSpinning = false;
      classSelect.disabled = false;
      btnSpin.disabled = false;
      showWinner();
    }
  }
  
  requestAnimationFrame(animate);
});

function showWinner() {
  const total = students.length;
  // Wheel draws clockwise based on unit circle where 0 is right.
  // The pointer is at the top (-PI/2).
  // Calculate which slice ended up at rotation coordinate corresponding to the top.
  const arcLen = (Math.PI * 2) / total;
  
  // Normalize currentRot to positive range equivalent
  let normalizedRot = currentRot % (Math.PI * 2);
  if (normalizedRot &lt; 0) normalizedRot += Math.PI * 2;
  
  // The wedge that spans -PI/2 (top) when rotated by normalizedRot:
  // pointer is at 270 degrees (3PI/2 rad in standard coords going bottom up, but canvas top is -PI/2 == 3PI/2).
  let pointerAngle = (Math.PI * 1.5 - normalizedRot) % (Math.PI * 2);
  if(pointerAngle &lt; 0) pointerAngle += Math.PI * 2;
  
  const winnerIdx = Math.floor(pointerAngle / arcLen);
  toastText.textContent = students[winnerIdx];
  toast.classList.add(&#x27;show&#x27;);
  
  confetti({ particleCount: 100, spread: 80, origin: { y: 0.6 }});
  
  setTimeout(() =&gt; toast.classList.remove(&#x27;show&#x27;), 3500);
}

// Window init
window.addEventListener(&#x27;storage&#x27;, () =&gt; init()); // listen for JSON updates
init();

&lt;/script&gt;

&lt;script&gt;
const COLORS = [&#x27;#e74c3c&#x27;,&#x27;#3498db&#x27;,&#x27;#2ecc71&#x27;,&#x27;#f39c12&#x27;,&#x27;#9b59b6&#x27;,&#x27;#1abc9c&#x27;,&#x27;#e67e22&#x27;,&#x27;#e84393&#x27;,&#x27;#00b894&#x27;,&#x27;#6c5ce7&#x27;,&#x27;#fd79a8&#x27;,&#x27;#0984e3&#x27;,&#x27;#d63031&#x27;,&#x27;#55efc4&#x27;,&#x27;#fab1a0&#x27;,&#x27;#74b9ff&#x27;];

let appData = { classes: {} };
let students = [];
let groups = [];
let unassigned = [];
let currentClass = &#x27;&#x27;;
const RANDOM_GROUP_STATE_KEY = &#x27;randomGroupStateV1&#x27;;

const classSelect = document.getElementById(&#x27;classSelect&#x27;);
const groupSizeInput = document.getElementById(&#x27;groupSize&#x27;);
const groupCountInput = document.getElementById(&#x27;groupCount&#x27;);

const unassignedList = document.getElementById(&#x27;unassignedList&#x27;);
const groupsContainer = document.getElementById(&#x27;groupsContainer&#x27;);
const unassignedCard = document.getElementById(&#x27;unassignedCard&#x27;);
const alertMsg = document.getElementById(&#x27;alertMsg&#x27;);

let dragSrcGroupIdx = -1; // -1 for unassigned
let dragSrcStudentIdx = -1;

function readState() {
  try {
    const raw = localStorage.getItem(RANDOM_GROUP_STATE_KEY);
    if (!raw) return { selectedClass: &#x27;&#x27;, groupSize: 4, groupCount: &#x27;&#x27;, classLayouts: {} };
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== &#x27;object&#x27;) return { selectedClass: &#x27;&#x27;, groupSize: 4, groupCount: &#x27;&#x27;, classLayouts: {} };
    if (!parsed.classLayouts || typeof parsed.classLayouts !== &#x27;object&#x27;) parsed.classLayouts = {};
    return parsed;
  } catch(e) {
    return { selectedClass: &#x27;&#x27;, groupSize: 4, groupCount: &#x27;&#x27;, classLayouts: {} };
  }
}

function saveState(next) {
  localStorage.setItem(RANDOM_GROUP_STATE_KEY, JSON.stringify(next));
}

function persistCurrentClassLayout() {
  const next = readState();
  const size = parseInt(groupSizeInput.value, 10);
  const groupCount = parseInt(groupCountInput.value, 10);
  next.groupSize = Number.isFinite(size) ? Math.max(2, Math.min(20, size)) : 4;
  next.groupCount = Number.isFinite(groupCount) ? Math.max(1, Math.min(50, groupCount)) : &#x27;&#x27;;
  if (!next.classLayouts || typeof next.classLayouts !== &#x27;object&#x27;) next.classLayouts = {};
  if (!currentClass) {
    saveState(next);
    return;
  }
  next.selectedClass = currentClass;
  next.classLayouts[currentClass] = {
    groups: groups.map(g =&gt; [...g]),
    unassigned: [...unassigned]
  };
  saveState(next);
}

function restoreClassLayout(name) {
  const saved = readState();
  const source = saved.classLayouts &amp;&amp; saved.classLayouts[name] ? saved.classLayouts[name] : null;
  if (!source) {
    groups = [];
    unassigned = [];
    return;
  }
  const valid = new Set(students);
  const used = new Set();
  const restoredGroups = [];
  (Array.isArray(source.groups) ? source.groups : []).forEach(group =&gt; {
    const filtered = [];
    (Array.isArray(group) ? group : []).forEach(studentName =&gt; {
      if (typeof studentName !== &#x27;string&#x27;) return;
      if (!valid.has(studentName) || used.has(studentName)) return;
      filtered.push(studentName);
      used.add(studentName);
    });
    if (filtered.length &gt; 0) restoredGroups.push(filtered);
  });
  const restoredUnassigned = [];
  (Array.isArray(source.unassigned) ? source.unassigned : []).forEach(studentName =&gt; {
    if (typeof studentName !== &#x27;string&#x27;) return;
    if (!valid.has(studentName) || used.has(studentName)) return;
    restoredUnassigned.push(studentName);
    used.add(studentName);
  });
  students.forEach(studentName =&gt; {
    if (!used.has(studentName)) restoredUnassigned.push(studentName);
  });
  groups = restoredGroups;
  unassigned = restoredUnassigned;
}

function init() {
  const savedState = readState();
  const size = parseInt(savedState.groupSize, 10);
  const groupCount = parseInt(savedState.groupCount, 10);
  if (Number.isFinite(size)) {
    groupSizeInput.value = Math.max(2, Math.min(20, size));
  }
  groupCountInput.value = Number.isFinite(groupCount) ? Math.max(1, Math.min(50, groupCount)) : &#x27;&#x27;;
  try {
    const d = localStorage.getItem(&#x27;classRotatorData&#x27;);
    if (d) appData = JSON.parse(d);
    if (!appData.classes) appData.classes = {};
  } catch(e) {}
  
  classSelect.innerHTML = &#x27;&#x27;;
  const names = Object.keys(appData.classes);
  
  if(names.length === 0) {
    const opt = document.createElement(&#x27;option&#x27;);
    opt.text = &quot;No classes found&quot;;
    classSelect.add(opt);
    generateBtn.disabled = true;
    showAlert(&quot;Create a class in &#x27;Class Rotation&#x27; app first.&quot;);
    return;
  }
  
  names.forEach(n =&gt; {
    const opt = document.createElement(&#x27;option&#x27;);
    opt.value = n; opt.text = n;
    classSelect.add(opt);
  });
  
  const initialClass = savedState.selectedClass &amp;&amp; appData.classes[savedState.selectedClass] ? savedState.selectedClass : names[0];
  classSelect.value = initialClass;
  loadClass(initialClass);
}

function showAlert(msg) {
  alertMsg.textContent = msg;
  alertMsg.style.display = &#x27;block&#x27;;
}

function hideAlert() {
  alertMsg.style.display = &#x27;none&#x27;;
}

classSelect.addEventListener(&#x27;change&#x27;, (e) =&gt; {
  persistCurrentClassLayout();
  loadClass(e.target.value);
});

groupSizeInput.addEventListener(&#x27;change&#x27;, () =&gt; {
  persistCurrentClassLayout();
});

groupCountInput.addEventListener(&#x27;change&#x27;, () =&gt; {
  persistCurrentClassLayout();
});

function loadClass(name) {
  currentClass = name;
  const list = appData.classes[name] || [];
  students = list.map(s =&gt; typeof s === &#x27;string&#x27; ? s : s.name);
  if(students.length &lt; 2) {
    generateBtn.disabled = true; 
    showAlert(&quot;Need at least 2 students in class.&quot;);
  } else {
    generateBtn.disabled = false;
    hideAlert();
  }
  restoreClassLayout(name);
  render();
}

function shuffle(array) {
  let a = [...array];
  for(let i=a.length-1; i&gt;0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

generateBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
  if (students.length === 0) return;
  
  const sz = parseInt(groupSizeInput.value) || 4;
  const requestedGroups = parseInt(groupCountInput.value, 10);
  const shuffled = shuffle(students);
  
  groups = [];
  unassigned = [];
  
  const numGroups = Number.isFinite(requestedGroups)
    ? Math.max(1, Math.min(shuffled.length, requestedGroups))
    : Math.ceil(shuffled.length / sz);
  for(let i=0; i&lt;numGroups; i++) {
    groups.push([]);
  }
  
  // Distribute cleanly
  shuffled.forEach((name, idx) =&gt; {
    groups[idx % numGroups].push(name);
  });
  
  render();
  persistCurrentClassLayout();
  confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }});
});

function createStudentItem(name, groupIdx, studentIdx) {
  const li = document.createElement(&#x27;li&#x27;);
  li.className = &#x27;student-item&#x27;;
  li.draggable = true;
  
  const col = COLORS[name.charCodeAt(0) % COLORS.length];
  
  li.innerHTML = `
    &lt;div class=&quot;student-avatar&quot; style=&quot;background:${col}&quot;&gt;${name.charAt(0)}&lt;/div&gt;
    &lt;div class=&quot;student-name&quot;&gt;${name}&lt;/div&gt;
    &lt;div class=&quot;remove-btn&quot; title=&quot;Remove student&quot;&gt;✕&lt;/div&gt;
  `;
  
  // Drag start
  li.addEventListener(&#x27;dragstart&#x27;, (e) =&gt; {
    dragSrcGroupIdx = groupIdx;
    dragSrcStudentIdx = studentIdx;
    li.classList.add(&#x27;dragging&#x27;);
    e.dataTransfer.effectAllowed = &#x27;move&#x27;;
    e.dataTransfer.setData(&#x27;text/plain&#x27;, name);
  });
  
  li.addEventListener(&#x27;dragend&#x27;, () =&gt; {
    li.classList.remove(&#x27;dragging&#x27;);
    document.querySelectorAll(&#x27;.group-card, .unassigned&#x27;).forEach(el =&gt; el.classList.remove(&#x27;drag-over&#x27;));
  });
  
  // Remove btn handler (moves to unassigned)
  li.querySelector(&#x27;.remove-btn&#x27;).addEventListener(&#x27;click&#x27;, (e) =&gt; {
    e.stopPropagation();
    if(groupIdx === -1) {
      unassigned.splice(studentIdx, 1);
    } else {
      groups[groupIdx].splice(studentIdx, 1);
    }
    if(groupIdx !== -1) {
      unassigned.push(name);
    }
    render();
    persistCurrentClassLayout();
  });
  
  return li;
}

function attachDropZone(el, targetGroupIdx) {
  el.addEventListener(&#x27;dragover&#x27;, (e) =&gt; {
    e.preventDefault();
    if(dragSrcGroupIdx !== targetGroupIdx) {
      el.classList.add(&#x27;drag-over&#x27;);
    }
  });

  el.addEventListener(&#x27;dragleave&#x27;, () =&gt; {
    el.classList.remove(&#x27;drag-over&#x27;);
  });

  el.addEventListener(&#x27;drop&#x27;, (e) =&gt; {
    e.preventDefault();
    el.classList.remove(&#x27;drag-over&#x27;);
    
    if(dragSrcGroupIdx === targetGroupIdx) return;
    
    // remove from source
    let draggedName = &#x27;&#x27;;
    if(dragSrcGroupIdx === -1) {
      draggedName = unassigned.splice(dragSrcStudentIdx, 1)[0];
    } else {
      draggedName = groups[dragSrcGroupIdx].splice(dragSrcStudentIdx, 1)[0];
    }
    
    // add to target
    if(targetGroupIdx === -1) {
      unassigned.push(draggedName);
    } else {
      groups[targetGroupIdx].push(draggedName);
    }
    
    render();
    persistCurrentClassLayout();
  });
}

function render() {
  // Render Unassigned
  unassignedList.innerHTML = &#x27;&#x27;;
  unassigned.forEach((name, idx) =&gt; {
    unassignedList.appendChild(createStudentItem(name, -1, idx));
  });
  
  // unassigned drop attached globally
  
  if(unassigned.length &gt; 0) {
    unassignedCard.style.display = &#x27;block&#x27;;
  } else {
    // Show if there are any dropped out but still let it be droppable?
    // Let&#x27;s always show it so teachers can drag people out.
    unassignedCard.style.display = &#x27;block&#x27;; 
  }

  // Render Groups
  groupsContainer.innerHTML = &#x27;&#x27;;
  groups.forEach((g, idx) =&gt; {
    const card = document.createElement(&#x27;div&#x27;);
    card.className = &#x27;group-card&#x27;;
    card.style.borderTopColor = COLORS[idx % COLORS.length];
    
    const header = document.createElement(&#x27;div&#x27;);
    header.className = &#x27;group-header&#x27;;
    header.innerHTML = `&lt;h3&gt;Group ${idx+1}&lt;/h3&gt; &lt;span class=&quot;group-count&quot;&gt;${g.length}&lt;/span&gt;`;
    card.appendChild(header);
    
    const ul = document.createElement(&#x27;ul&#x27;);
    ul.className = &#x27;student-list&#x27;;
    
    g.forEach((name, stdIdx) =&gt; {
      ul.appendChild(createStudentItem(name, idx, stdIdx));
    });
    
    card.appendChild(ul);
    attachDropZone(card, idx);
    groupsContainer.appendChild(card);
  });
  persistCurrentClassLayout();
}

// global unassigned drop listener
attachDropZone(unassignedCard, -1);
window.addEventListener(&#x27;storage&#x27;, () =&gt; init());
init();

&lt;/script&gt;

function getSaved() {
  try {
    const data = JSON.parse(localStorage.getItem(&#x27;classRotatorData&#x27;));
    if (!data || !data.classes) return {};
    const jigsawFormat = {};
    for (let c in data.classes) {
      jigsawFormat[c] = data.classes[c].map(s =&gt; typeof s === &#x27;string&#x27; ? s : s.name);
    }
    return jigsawFormat;
  } catch(e) { return {}; }
}

function setSaved(jigsawFormat) {
  try {
    let data = JSON.parse(localStorage.getItem(&#x27;classRotatorData&#x27;)) || { classes: {}, last_rotation: {} };
    if (!data.classes) data.classes = {};
    
    // Update existing classes or create new ones
    for (let c in jigsawFormat) {
      if (!data.classes[c]) {
        data.classes[c] = jigsawFormat[c].map(name =&gt; ({name, row: 0, pair_position: 0}));
      } else {
        let existingMap = {};
        data.classes[c].forEach(obj =&gt; {
          if (typeof obj === &#x27;object&#x27; &amp;&amp; obj.name) {
             existingMap[obj.name] = obj;
          } else if (typeof obj === &#x27;string&#x27;) {
             existingMap[obj] = {name: obj, row: 0, pair_position: 0};
          }
        });
        let r = 1, p = 1, cnt = 0;
        data.classes[c] = jigsawFormat[c].map(name =&gt; {
          if (existingMap[name]) {
             return existingMap[name];
          }
          let obj = {name: name, row: r, pair_position: p};
          cnt++;
          if (cnt % 2 === 0) { 
             p++; 
             if (p &gt; 3) { p = 1; r++; }
             if (r &gt; 3) { r = 1; }
          }
          return obj;
        });
      }
    }
    
    // Delete classes that are removed
    for (let c in data.classes) {
      if (!jigsawFormat[c]) {
        delete data.classes[c];
        if (data.last_rotation &amp;&amp; data.last_rotation[c]) {
          delete data.last_rotation[c];
        }
      }
    }
    
    localStorage.setItem(&#x27;classRotatorData&#x27;, JSON.stringify(data));
  } catch(e) {}
}

/* ============================================================
   IMAGE PREPROCESSING — remove table borders, binarize
   ============================================================ */
function preprocessImage(img){
  return new Promise(resolve=&gt;{
    const canvas=document.getElementById(&#x27;prepCanvas&#x27;);
    const scale=Math.max(2, Math.min(4, 2000/Math.max(img.width,img.height)));
    const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext(&#x27;2d&#x27;,{willReadFrequently:true});
    ctx.drawImage(img,0,0,w,h);
    let id=ctx.getImageData(0,0,w,h), d=id.data;

    // Grayscale
    for(let i=0;i&lt;d.length;i+=4){
      const g=Math.round(d[i]*.299+d[i+1]*.587+d[i+2]*.114);
      d[i]=d[i+1]=d[i+2]=g;
    }

    // Binary mask for line detection
    const bin=new Uint8Array(w*h);
    for(let i=0;i&lt;w*h;i++) bin[i]=d[i*4]&lt;160?1:0;

    const lineMask=new Uint8Array(w*h);
    const hThresh=Math.round(w*.25), vThresh=Math.round(h*.15);

    // Horizontal lines
    for(let y=0;y&lt;h;y++){
      let run=0, start=0;
      for(let x=0;x&lt;=w;x++){
        if(x&lt;w &amp;&amp; bin[y*w+x]){if(!run)start=x;run++;}
        else{if(run&gt;hThresh)for(let xx=start;xx&lt;start+run;xx++)lineMask[y*w+xx]=1;run=0;}
      }
    }
    // Vertical lines
    for(let x=0;x&lt;w;x++){
      let run=0, start=0;
      for(let y=0;y&lt;=h;y++){
        if(y&lt;h &amp;&amp; bin[y*w+x]){if(!run)start=y;run++;}
        else{if(run&gt;vThresh)for(let yy=start;yy&lt;start+run;yy++)lineMask[yy*w+x]=1;run=0;}
      }
    }

    // Dilate lineMask by 2px and paint white; binarize text
    for(let y=0;y&lt;h;y++){
      for(let x=0;x&lt;w;x++){
        let isLine=false;
        for(let dy=-2;dy&lt;=2&amp;&amp;!isLine;dy++)for(let dx=-2;dx&lt;=2&amp;&amp;!isLine;dx++){
          const ny=y+dy,nx=x+dx;
          if(ny&gt;=0&amp;&amp;ny&lt;h&amp;&amp;nx&gt;=0&amp;&amp;nx&lt;w&amp;&amp;lineMask[ny*w+nx])isLine=true;
        }
        const i=(y*w+x)*4;
        if(isLine){d[i]=d[i+1]=d[i+2]=255;}
        else{const v=d[i]&lt;180?0:255;d[i]=d[i+1]=d[i+2]=v;}
        d[i+3]=255;
      }
    }
    ctx.putImageData(id,0,0);

    // show processed preview
    const pr=document.getElementById(&#x27;previewRow&#x27;);
    const c2=document.createElement(&#x27;canvas&#x27;); c2.width=w; c2.height=h; c2.style.maxWidth=&#x27;260px&#x27;; c2.style.maxHeight=&#x27;180px&#x27;; c2.style.borderRadius=&#x27;10px&#x27;; c2.style.border=&#x27;2px solid rgba(255,255,255,.15)&#x27;;
    c2.getContext(&#x27;2d&#x27;).putImageData(id,0,0);
    pr.appendChild(c2);

    resolve(canvas.toDataURL(&#x27;image/png&#x27;));
  });
}

/* ============================================================
   OCR
   ============================================================ */
async function runOCR(img){
  const pw=document.getElementById(&#x27;progressWrap&#x27;); pw.style.display=&#x27;block&#x27;;
  const pf=document.getElementById(&#x27;progressFill&#x27;);
  const pt=document.getElementById(&#x27;progressText&#x27;);
  pf.style.width=&#x27;0%&#x27;; pt.textContent=&#x27;Preprocessing image…&#x27;;

  const dataUrl=await preprocessImage(img);
  pt.textContent=&#x27;Loading OCR engine…&#x27;; pf.style.width=&#x27;10%&#x27;;

  try{
    const worker=await Tesseract.createWorker(&#x27;eng&#x27;,1,{
      logger:m=&gt;{
        if(m.status===&#x27;recognizing text&#x27;){
          const pct=Math.round(10+m.progress*85);
          pf.style.width=pct+&#x27;%&#x27;;
          pt.textContent=&#x27;Recognizing text… &#x27;+Math.round(m.progress*100)+&#x27;%&#x27;;
        }
      }
    });
    await worker.setParameters({tessedit_pageseg_mode:&#x27;6&#x27;, preserve_interword_spaces:&#x27;1&#x27;});

    pt.textContent=&#x27;Recognizing text…&#x27;; pf.style.width=&#x27;20%&#x27;;
    const {data}=await worker.recognize(dataUrl);
    await worker.terminate();

    pf.style.width=&#x27;100%&#x27;; pt.textContent=&#x27;Done!&#x27;;

    const raw=data.text;
    // Debug panel
    const dp=document.getElementById(&#x27;debugPanel&#x27;);
    dp.innerHTML=&#x27;&lt;strong&gt;Raw OCR Output:&lt;/strong&gt;&lt;br&gt;&#x27;+raw.split(&#x27;\n&#x27;).map(l=&gt;&#x27;&lt;div&gt;&#x27;+l.replace(/&lt;/g,&#x27;&amp;lt;&#x27;)+&#x27;&lt;/div&gt;&#x27;).join(&#x27;&#x27;);

    students=extractNames(raw);
    renderStudentList();

    if(students.length===0) pt.textContent=&#x27;No names found. Try a clearer image or add names manually.&#x27;;
    else pt.textContent=&#x27;Extracted &#x27;+students.length+&#x27; students!&#x27;;

    setTimeout(()=&gt;{pw.style.display=&#x27;none&#x27;;},3000);
  }catch(err){
    pt.textContent=&#x27;OCR Error: &#x27;+err.message;
    console.error(err);
  }
}

function extractNames(text){
  const lines=text.split(/\n/).map(l=&gt;l.trim()).filter(l=&gt;l.length&gt;0);
  const names=[];
  const skip=new Set([&#x27;name&#x27;,&#x27;student&#x27;,&#x27;class&#x27;,&#x27;period&#x27;,&#x27;roster&#x27;,&#x27;number&#x27;,&#x27;no&#x27;,&#x27;date&#x27;,&#x27;teacher&#x27;,&#x27;grade&#x27;,&#x27;total&#x27;,&#x27;list&#x27;,&#x27;group&#x27;,&#x27;room&#x27;,&#x27;id&#x27;,&#x27;absent&#x27;,&#x27;present&#x27;,&#x27;attendance&#x27;,&#x27;roll&#x27;]);
  for(const line of lines){
    // Try splitting by common delimiters (multiple names per line)
    const parts=line.split(/[,;|\/\\]+/).map(p=&gt;p.trim()).filter(Boolean);
    for(let part of parts){
      // Strip leading numbers, bullets
      part=part.replace(/^[\d]+[\.\)\:\-\s]+/,&#x27;&#x27;).replace(/^[\•\-\–\—\*\&gt;\#]+\s*/,&#x27;&#x27;).trim();
      // Keep only Latin-range characters + basic punctuation
      let cleaned=&#x27;&#x27;;
      for(const c of part){
        const code=c.charCodeAt(0);
        if((code&gt;=65&amp;&amp;code&lt;=90)||(code&gt;=97&amp;&amp;code&lt;=122)||(code&gt;=192&amp;&amp;code&lt;=255)
          ||c===&#x27;,&#x27;||c===&#x27;.&#x27;||c===&#x27;(&#x27;||c===&#x27;)&#x27;||c===&#x27;-&#x27;||c===&quot;&#x27;&quot;||c===&#x27; &#x27;) cleaned+=c;
      }
      cleaned=cleaned.replace(/\s+/g,&#x27; &#x27;).replace(/^[,.\-\s]+|[,.\-\s]+$/g,&#x27;&#x27;).trim();
      if(cleaned.length&lt;2||!/[A-Za-z]/.test(cleaned)) continue;
      if(skip.has(cleaned.toLowerCase())) continue;
      // Capitalize each word
      cleaned=cleaned.split(&#x27; &#x27;).map(w=&gt;w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(&#x27; &#x27;);
      if(!names.includes(cleaned)) names.push(cleaned);
    }
  }
  return names;
}

let activeClassName = &quot;&quot;;

function loadClass(name){

function saveCurrentClass(){

function deleteClass(name){

/* ============================================================
   GROUP GENERATION
   ============================================================ */
function shuffleArray(arr){
  const a=[...arr]; for(let i=a.length-1;i&gt;0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

function generateGroups(){
  const n=parseInt(document.getElementById(&#x27;numGroups&#x27;).value)||4;
  if(students.length&lt;n){showToast(&#x27;⚠ Need at least &#x27;+n+&#x27; students!&#x27;);return;}
  absentSet.clear();
  buildGroupsFrom(students,n);
  goExpert();
  confetti({particleCount:100,spread:70,origin:{y:.6}});
}

function buildGroupsFrom(list,n){
  const shuffled=shuffleArray(list);
  const ng=Math.min(n,shuffled.length);
  expertGroups=Array.from({length:ng},()=&gt;[]);
  shuffled.forEach((s,i)=&gt;expertGroups[i%ng].push(s));
  buildHomeFromExpert();
}

function buildHomeFromExpert(){
  // Home groups: column-wise extraction
  const maxLen=Math.max(...expertGroups.map(g=&gt;g.length));
  homeGroups=[];
  for(let i=0;i&lt;maxLen;i++){
    const hg=[];
    for(let g=0;g&lt;expertGroups.length;g++){
      if(i&lt;expertGroups[g].length) hg.push({name:expertGroups[g][i],expert:g});
    }
    if(hg.length) homeGroups.push(hg);
  }
}

function reshuffleGroups(){
  const present=students.filter(s=&gt;!absentSet.has(s));
  const n=expertGroups.length;
  buildGroupsFrom(present,n);
  renderEG(); renderHG();
  showToast(&#x27;🔀 Groups reshuffled!&#x27;);
  confetti({particleCount:60,spread:50,origin:{y:.6}});
}

/* ============================================================
   ABSENT MANAGEMENT
   ============================================================ */
function toggleAbsent(name){
  if(absentSet.has(name)) absentSet.delete(name);
  else absentSet.add(name);
  rebuildFromPresent();
}
function restoreAll(){
  absentSet.clear();
  rebuildFromPresent();
  showToast(&#x27;↩ All students restored!&#x27;);
}
function rebuildFromPresent(){
  const present=students.filter(s=&gt;!absentSet.has(s));
  const n=Math.min(expertGroups.length, present.length||1);
  buildGroupsFrom(present,n);
  // Re-add absent students so they still show
  renderEG(); renderHG(); updAbsBanners();
}
function updAbsBanners(){
  const arr=[...absentSet];
  for(const id of [&#x27;absBannerE&#x27;,&#x27;absBannerH&#x27;]){
    const el=document.getElementById(id);
    if(arr.length){el.style.display=&#x27;block&#x27;;el.textContent=&#x27;🚫 Absent (&#x27;+arr.length+&#x27;): &#x27;+arr.join(&#x27;, &#x27;);}
    else el.style.display=&#x27;none&#x27;;
  }
}

/* ============================================================
   RENDER EXPERT GROUPS
   ============================================================ */
function renderEG(){
  const grid=document.getElementById(&#x27;expertGrid&#x27;); grid.innerHTML=&#x27;&#x27;;
  const absentCard=document.getElementById(&#x27;absentCardE&#x27;); absentCard.innerHTML=&#x27;&#x27;;

  // Absent card
  if(absentSet.size){
    const ac=document.createElement(&#x27;div&#x27;); ac.className=&#x27;absent-card&#x27;;
    ac.innerHTML=&#x27;&lt;strong&gt;🚫 Absent Students&lt;/strong&gt;&lt;br&gt;&#x27;;
    absentSet.forEach(name=&gt;{
      ac.innerHTML+=`&lt;span class=&quot;aname&quot;&gt;${name} &lt;span class=&quot;restore&quot; onclick=&quot;toggleAbsent(&#x27;${name.replace(/&#x27;/g,&quot;\\&#x27;&quot;)}&#x27;)&quot; title=&quot;Restore&quot;&gt;↩&lt;/span&gt;&lt;/span&gt;`;
    });
    absentCard.appendChild(ac);
  }

  const maxPG=parseInt(document.getElementById(&#x27;maxPerGroup&#x27;).value)||5;

  expertGroups.forEach((group,gi)=&gt;{
    const card=document.createElement(&#x27;div&#x27;); card.className=&#x27;group-card&#x27;;
    card.style.borderColor=GRP_COLORS[gi%GRP_COLORS.length]+&#x27;44&#x27;;

    // Drag over listeners for individual student drops
    card.addEventListener(&#x27;dragover&#x27;,e=&gt;{e.preventDefault();
      if(dragSrcGroup===gi) return;
      card.classList.toggle(&#x27;drag-over-ok&#x27;, group.length&lt;maxPG);
      card.classList.toggle(&#x27;drag-over-full&#x27;, group.length&gt;=maxPG);
    });
    card.addEventListener(&#x27;dragleave&#x27;,()=&gt;{card.classList.remove(&#x27;drag-over-ok&#x27;,&#x27;drag-over-full&#x27;);});
    card.addEventListener(&#x27;drop&#x27;,e=&gt;{e.preventDefault();card.classList.remove(&#x27;drag-over-ok&#x27;,&#x27;drag-over-full&#x27;);
      if(dragSrcGroup===gi||dragSrcGroup&lt;0) return;
      handleStudentDrop(gi, maxPG);
    });

    const color=GRP_COLORS[gi%GRP_COLORS.length];

    // Header with swap arrows
    const h=document.createElement(&#x27;h3&#x27;);
    h.innerHTML=`&lt;span class=&quot;gbadge&quot; style=&quot;background:${color}&quot;&gt;${gi+1}&lt;/span&gt; Expert Group ${gi+1}
      &lt;div class=&quot;swap-arrows&quot;&gt;
        &lt;button class=&quot;swap-arrow&quot; ${gi===0?&#x27;disabled&#x27;:&#x27;&#x27;} onclick=&quot;swapGroupLeft(${gi})&quot; title=&quot;Move group left&quot;&gt;◀&lt;/button&gt;
        &lt;button class=&quot;swap-arrow&quot; ${gi===expertGroups.length-1?&#x27;disabled&#x27;:&#x27;&#x27;} onclick=&quot;swapGroupRight(${gi})&quot; title=&quot;Move group right&quot;&gt;▶&lt;/button&gt;
      &lt;/div&gt;`;
    card.appendChild(h);

    const ul=document.createElement(&#x27;ul&#x27;);
    group.forEach((name,mi)=&gt;{
      const li=document.createElement(&#x27;li&#x27;);
      li.className=&#x27;gmi&#x27;;
      li.draggable=true;
      li.addEventListener(&#x27;dragstart&#x27;,e=&gt;onDragStart(e,gi,mi,name));
      li.addEventListener(&#x27;dragend&#x27;,onDragEnd);
      li.innerHTML=`
        &lt;span class=&quot;drag-handle&quot; title=&quot;Drag to move&quot;&gt;≡&lt;/span&gt;
        &lt;span class=&quot;avatar&quot; style=&quot;background:${color}&quot;&gt;${name.charAt(0)}&lt;/span&gt;
        &lt;span class=&quot;sname&quot;&gt;${name}&lt;/span&gt;
        &lt;span class=&quot;absent-btn&quot; onclick=&quot;toggleAbsent(&#x27;${name.replace(/&#x27;/g,&quot;\\&#x27;&quot;)}&#x27;)&quot; title=&quot;Mark absent&quot;&gt;✕&lt;/span&gt;`;

}

/* ============================================================
   RENDER HOME GROUPS
   ============================================================ */
function renderHG(){
  const grid=document.getElementById(&#x27;homeGrid&#x27;); grid.innerHTML=&#x27;&#x27;;
  homeGroups.forEach((group,gi)=&gt;{
    const card=document.createElement(&#x27;div&#x27;); card.className=&#x27;group-card&#x27;;
    const baseColor=GRP_COLORS[gi%GRP_COLORS.length];
    card.style.borderColor=baseColor+&#x27;44&#x27;;

    card.addEventListener(&#x27;dragover&#x27;, e =&gt; {
      e.preventDefault();
      if (dragSrcGroupHG === gi) return;
      card.classList.add(&#x27;drag-over-ok&#x27;);
    });
    card.addEventListener(&#x27;dragleave&#x27;, () =&gt; card.classList.remove(&#x27;drag-over-ok&#x27;));
    card.addEventListener(&#x27;drop&#x27;, e =&gt; {
      e.preventDefault();
      card.classList.remove(&#x27;drag-over-ok&#x27;);
      if (dragSrcGroupHG === gi || dragSrcGroupHG &lt; 0) return;
      handleStudentDropHome(gi);
    });

    const h=document.createElement(&#x27;h3&#x27;);
    h.innerHTML=`&lt;span class=&quot;gbadge&quot; style=&quot;background:${baseColor}&quot;&gt;${gi+1}&lt;/span&gt; Home Group ${gi+1}`;
    card.appendChild(h);

    const ul=document.createElement(&#x27;ul&#x27;);
    group.forEach((obj, mi)=&gt;{
      const {name, expert} = obj;
      const ec=GRP_COLORS[expert%GRP_COLORS.length];
      const li=document.createElement(&#x27;li&#x27;); li.className=&#x27;gmi&#x27;;
      li.draggable = true;
      li.addEventListener(&#x27;dragstart&#x27;, e =&gt; {
        dragSrcGroupHG = gi;
        dragSrcIndexHG = mi;
        dragObjHG = obj;
        e.target.classList.add(&#x27;dragging&#x27;);
        e.dataTransfer.effectAllowed = &#x27;move&#x27;;
        e.dataTransfer.setData(&#x27;text/plain&#x27;, name);
      });
      li.addEventListener(&#x27;dragend&#x27;, e =&gt; {
        e.target.classList.remove(&#x27;dragging&#x27;);
        dragSrcGroupHG = -1; dragSrcIndexHG = -1; dragObjHG = null;
        document.querySelectorAll(&#x27;.group-card&#x27;).forEach(c =&gt; c.classList.remove(&#x27;drag-over-ok&#x27;));
      });
      li.innerHTML=`
        &lt;span class=&quot;drag-handle&quot; title=&quot;Drag to move&quot;&gt;≡&lt;/span&gt;
        &lt;span class=&quot;avatar&quot; style=&quot;background:${ec}&quot;&gt;${name.charAt(0)}&lt;/span&gt;
        &lt;span class=&quot;sname&quot;&gt;${name}&lt;/span&gt;
        &lt;span class=&quot;expert-badge&quot; style=&quot;background:${ec}33;color:${ec}&quot;&gt;Expert ${expert+1}&lt;/span&gt;`;
      ul.appendChild(li);
    });
    card.appendChild(ul);
    grid.appendChild(card);
  });
  updAbsBanners();
}

/* ============================================================
   DRAG &amp; DROP — INDIVIDUAL STUDENTS
   ============================================================ */
function onDragStart(e,gi,mi,name){
  dragSrcGroup=gi; dragSrcIndex=mi; dragName=name;
  e.target.classList.add(&#x27;dragging&#x27;);
  e.dataTransfer.effectAllowed=&#x27;move&#x27;;
  e.dataTransfer.setData(&#x27;text/plain&#x27;,name);
}
function onDragEnd(e){
  e.target.classList.remove(&#x27;dragging&#x27;);
  dragSrcGroup=-1; dragSrcIndex=-1; dragName=&#x27;&#x27;;
  document.querySelectorAll(&#x27;.group-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;drag-over-ok&#x27;,&#x27;drag-over-full&#x27;));
}
function handleStudentDrop(targetGi, maxPG){
  if(dragSrcGroup&lt;0||dragSrcGroup===targetGi) return;
  const srcG=expertGroups[dragSrcGroup];
  const tgtG=expertGroups[targetGi];
  const name=dragName;

  if(tgtG.length&gt;=maxPG){
    // Auto-swap: swap dragged student with last member of target group
    const swapName=tgtG[tgtG.length-1];
    // Remove from source
    srcG.splice(dragSrcIndex,1);
    // Remove swapName from target
    tgtG.splice(tgtG.length-1,1);
    // Add dragged student to target
    tgtG.push(name);
    // Add swapped student to source
    srcG.push(swapName);
    showToast(&#x27;🔄 Swapped: &#x27;+name+&#x27; ↔ &#x27;+swapName);
  } else {
    // Simply move
    srcG.splice(dragSrcIndex,1);
    tgtG.push(name);
    showToast(&#x27;✅ Moved &#x27;+name+&#x27; → Expert Group &#x27;+(targetGi+1));
  }
  buildHomeFromExpert();
  renderEG(); renderHG();
}

/* ============================================================
   DRAG &amp; DROP — HOME GROUPS
   ============================================================ */
function handleStudentDropHome(targetGi) {
  if (dragSrcGroupHG &lt; 0 || dragSrcGroupHG === targetGi) return;
  const srcG = homeGroups[dragSrcGroupHG];
  const tgtG = homeGroups[targetGi];
  const obj = dragObjHG;

  // Move
  srcG.splice(dragSrcIndexHG, 1);
  tgtG.push(obj);

  // Dissolve empty groups
  homeGroups = homeGroups.filter(g =&gt; g.length &gt; 0);
  
  showToast(&#x27;✅ Moved &#x27;+obj.name+&#x27; → Home Group &#x27;+(targetGi+1));
  renderHG();
}

/* ============================================================
   SWAP ENTIRE GROUPS LEFT / RIGHT
   ============================================================ */
function swapGroupLeft(gi){
  if(gi&lt;=0) return;
  [expertGroups[gi-1], expertGroups[gi]] = [expertGroups[gi], expertGroups[gi-1]];
  buildHomeFromExpert();
  renderEG(); renderHG();
  showToast(&#x27;◀ Swapped Group &#x27;+(gi)+&#x27; ↔ Group &#x27;+(gi+1));
}
function swapGroupRight(gi){
  if(gi&gt;=expertGroups.length-1) return;
  [expertGroups[gi], expertGroups[gi+1]] = [expertGroups[gi+1], expertGroups[gi]];
  buildHomeFromExpert();
  renderEG(); renderHG();
  showToast(&#x27;▶ Swapped Group &#x27;+(gi+1)+&#x27; ↔ Group &#x27;+(gi+2));
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function showScreen(id){
  document.querySelectorAll(&#x27;.screen&#x27;).forEach(s=&gt;s.classList.remove(&#x27;active&#x27;));
  document.getElementById(&#x27;screen-&#x27;+id).classList.add(&#x27;active&#x27;);
  window.scrollTo(0,0);
}
function goSetup(){ showScreen(&#x27;setup&#x27;); }
function goExpert(){
  showScreen(&#x27;expert&#x27;);
  renderEG();
  resetTimer(&#x27;E&#x27;);
  const mins=parseInt(document.getElementById(&#x27;expertMin&#x27;).value)||10;
  timerSeconds.E=mins*60; timerTotal.E=mins*60; updateTimerDisplay(&#x27;E&#x27;);
}
function goHome(){
  showScreen(&#x27;home&#x27;);
  renderHG();
  resetTimer(&#x27;H&#x27;);
  const mins=parseInt(document.getElementById(&#x27;homeMin&#x27;).value)||10;
  timerSeconds.H=mins*60; timerTotal.H=mins*60; updateTimerDisplay(&#x27;H&#x27;);
}

/* ============================================================
   TIMERS
   ============================================================ */
const CIRCUMFERENCE=2*Math.PI*44; // ~276.46
const timerSeconds={E:600,H:600};
const timerTotal={E:600,H:600};
const timerIntervals={E:null,H:null};

function updateTimerDisplay(key){
  const s=timerSeconds[key];
  const m=Math.floor(s/60); const sec=s%60;
  document.getElementById(&#x27;timerText&#x27;+key).textContent=String(m).padStart(2,&#x27;0&#x27;)+&#x27;:&#x27;+String(sec).padStart(2,&#x27;0&#x27;);
  const pct=timerTotal[key]&gt;0?s/timerTotal[key]:1;
  document.getElementById(&#x27;ring&#x27;+key).style.strokeDashoffset=CIRCUMFERENCE*(1-pct);
  const disp=document.getElementById(&#x27;timerDisp&#x27;+key);
  disp.classList.toggle(&#x27;timer-warn&#x27;, s&lt;=60&amp;&amp;s&gt;10);
  disp.classList.toggle(&#x27;timer-danger&#x27;, s&lt;=10);
}
function startTimer(key){
  if(timerIntervals[key]) return;
  timerIntervals[key]=setInterval(()=&gt;{
    timerSeconds[key]--;
    updateTimerDisplay(key);
    if(timerSeconds[key]&lt;=0){
      clearInterval(timerIntervals[key]); timerIntervals[key]=null;
      showTimesup();
    }
  },1000);
}
function pauseTimer(key){
  if(timerIntervals[key]){clearInterval(timerIntervals[key]);timerIntervals[key]=null;}
}
function resetTimer(key){
  pauseTimer(key);
  const inputId=key===&#x27;E&#x27;?&#x27;expertMin&#x27;:&#x27;homeMin&#x27;;
  const mins=parseInt(document.getElementById(inputId).value)||10;
  timerSeconds[key]=mins*60; timerTotal[key]=mins*60;
  updateTimerDisplay(key);
  const disp=document.getElementById(&#x27;timerDisp&#x27;+key);
  disp.classList.remove(&#x27;timer-warn&#x27;,&#x27;timer-danger&#x27;);
}
function showTimesup(){
  document.getElementById(&#x27;timesupOverlay&#x27;).classList.add(&#x27;show&#x27;);
  confetti({particleCount:200,spread:120,origin:{y:.5}});
  // Beep
  try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=880;g.gain.value=.3;o.start();setTimeout(()=&gt;{o.stop();ac.close();},1500);}catch(e){}
}
function dismissTimesup(){document.getElementById(&#x27;timesupOverlay&#x27;).classList.remove(&#x27;show&#x27;);}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg){
  const t=document.getElementById(&#x27;swapToast&#x27;); t.textContent=msg; t.classList.add(&#x27;show&#x27;);
  setTimeout(()=&gt;t.classList.remove(&#x27;show&#x27;),2500);
}

/* ============================================================
   PRINT
   ============================================================ */
function printGroups(which){
  const screens={setup:&#x27;screen-setup&#x27;,expert:&#x27;screen-expert&#x27;,home:&#x27;screen-home&#x27;};
  Object.values(screens).forEach(id=&gt;document.getElementById(id).style.display=&#x27;none&#x27;);
  document.getElementById(&#x27;screen-&#x27;+which).style.display=&#x27;block&#x27;;
  window.print();
  Object.values(screens).forEach(id=&gt;document.getElementById(id).style.display=&#x27;&#x27;);
  document.querySelectorAll(&#x27;.screen&#x27;).forEach(s=&gt;s.classList.remove(&#x27;active&#x27;));
  document.getElementById(&#x27;screen-&#x27;+which).classList.add(&#x27;active&#x27;);
}

        }

        .student {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 0.8rem;
            text-align: center;
            cursor: grab;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 120px;
            word-break: break-word;
            user-select: none;
        }

        .student:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            border-color: var(--accent);
        }

        .student:active {
            cursor: grabbing;
        }

        .student-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.1);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid transparent;

            flex-shrink: 0;

        .student-img:hover {

        .student-name {

        .student.empty {

        .student.empty:hover {

        .student-name input {
            width: 100%;
            background: rgba(0,0,0,0.5);

            font-size: 1.1rem;

        .student-name input::selection {

        /* File Input hidden */
        #fileInput {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        /* Animation classes */
        .rotating .row {
            opacity: 0.5;
            transform: scale(0.95);
        }

    &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

    &lt;div class=&quot;sidebar&quot;&gt;
        &lt;div class=&quot;title&quot;&gt;✨ Rotator Pro&lt;/div&gt;
        
        &lt;div class=&quot;control-group&quot;&gt;

                &lt;button class=&quot;btn-secondary&quot; id=&quot;btnRenameClass&quot; title=&quot;Rename Class&quot; style=&quot;padding: 0.5rem;&quot;&gt;✏️&lt;/button&gt;

                &lt;div class=&quot;seat-action-row&quot;&gt;

                    &lt;button class=&quot;btn-secondary seat-adjust-btn&quot; data-pair=&quot;1&quot; data-delta=&quot;1&quot;&gt;+ Seat&lt;/button&gt;
                &lt;/div&gt;
                &lt;div class=&quot;seat-action-row&quot;&gt;
                    &lt;span&gt;Middle&lt;/span&gt;
                    &lt;button class=&quot;btn-secondary seat-adjust-btn&quot; data-pair=&quot;2&quot; data-delta=&quot;-1&quot;&gt;- Seat&lt;/button&gt;
                    &lt;button class=&quot;btn-secondary seat-adjust-btn&quot; data-pair=&quot;2&quot; data-delta=&quot;1&quot;&gt;+ Seat&lt;/button&gt;
                &lt;/div&gt;
                &lt;div class=&quot;seat-action-row&quot;&gt;
                    &lt;span&gt;Right&lt;/span&gt;
                    &lt;button class=&quot;btn-secondary seat-adjust-btn&quot; data-pair=&quot;3&quot; data-delta=&quot;-1&quot;&gt;- Seat&lt;/button&gt;
                    &lt;button class=&quot;btn-secondary seat-adjust-btn&quot; data-pair=&quot;3&quot; data-delta=&quot;1&quot;&gt;+ Seat&lt;/button&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div style=&quot;flex: 1;&quot;&gt;&lt;/div&gt;

        &lt;div class=&quot;control-group&quot;&gt;
            &lt;label&gt;Data Management&lt;/label&gt;
            &lt;button class=&quot;btn-secondary&quot; id=&quot;btnImport&quot;&gt;📥 Import JSON&lt;/button&gt;
            &lt;button class=&quot;btn-secondary&quot; id=&quot;btnExport&quot;&gt;📤 Export JSON&lt;/button&gt;
            &lt;input type=&quot;file&quot; id=&quot;fileInput&quot; accept=&quot;.json&quot;&gt;
        &lt;/div&gt;

        &lt;button class=&quot;btn-rotate&quot; id=&quot;btnRotate&quot;&gt;🔄 Rotate Classroom&lt;/button&gt;
