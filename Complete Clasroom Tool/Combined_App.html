    &lt;div class=&quot;main-content&quot;&gt;
        &lt;div class=&quot;front-board&quot;&gt;FRONT OF CLASSROOM&lt;/div&gt;
        
        &lt;div class=&quot;classroom&quot; id=&quot;classroom&quot;&gt;
            &lt;!-- Rows injected by JS --&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;toast&quot; id=&quot;toast&quot;&gt;Message&lt;/div&gt;

    &lt;script&gt;
        // State Management
        let appData = {
            classes: {},
            last_rotation: {},
            layouts: {},
            layout_selection: {}
        };
        let currentClass = null;
        let dragSrcEl = null;

        const classSelect = document.getElementById(&#x27;classSelect&#x27;);
        const classroomEl = document.getElementById(&#x27;classroom&#x27;);
        const fileInput = document.getElementById(&#x27;fileInput&#x27;);
        const layoutRowSelect = document.getElementById(&#x27;layoutRowSelect&#x27;);
        const btnAddRow = document.getElementById(&#x27;btnAddRow&#x27;);
        const btnDeleteRow = document.getElementById(&#x27;btnDeleteRow&#x27;);
        const seatAdjustButtons = document.querySelectorAll(&#x27;.seat-adjust-btn&#x27;);

        function createDefaultLayout() {
            return [
                { row: 1, pairs: [2, 2, 2] },
                { row: 2, pairs: [2, 2, 2] },
                { row: 3, pairs: [2, 2, 2] }
            ];
        }

        function normalizeLayout(layout) {
            if (!Array.isArray(layout) || layout.length === 0) return createDefaultLayout();
            const cleaned = layout
                .map(item =&gt; ({
                    row: parseInt(item.row, 10),
                    pairs: Array.isArray(item.pairs) ? item.pairs.slice(0, 3).map(v =&gt; Math.max(0, Math.min(2, parseInt(v, 10) || 0))) : [2, 2, 2]
                }))
                .filter(item =&gt; Number.isInteger(item.row) &amp;&amp; item.row &gt; 0);
            cleaned.forEach(item =&gt; {
                while (item.pairs.length &lt; 3) item.pairs.push(0);
            });
            cleaned.sort((a, b) =&gt; a.row - b.row);
            return cleaned.length ? cleaned : createDefaultLayout();
        }

        function inferLayoutFromStudents(students) {
            if (!Array.isArray(students) || students.length === 0) return createDefaultLayout();
            const rowSet = new Set(students.map(s =&gt; parseInt(s.row, 10)).filter(v =&gt; Number.isInteger(v) &amp;&amp; v &gt; 0));
            if (rowSet.size === 0) return createDefaultLayout();
            const rows = Array.from(rowSet).sort((a, b) =&gt; a - b);
            return rows.map(rowNum =&gt; {
                const pairs = [1, 2, 3].map(pairNum =&gt; {
                    const count = students.filter(s =&gt; s.row === rowNum &amp;&amp; s.pair_position === pairNum).length;
                    if (count &gt; 0) return Math.min(2, count);
                    return rowNum &lt;= 3 ? 2 : 0;
                });
                return { row: rowNum, pairs };
            });
        }

        function ensureLayoutSchema() {
            if (!appData.layouts || typeof appData.layouts !== &#x27;object&#x27;) appData.layouts = {};
            if (!appData.layout_selection || typeof appData.layout_selection !== &#x27;object&#x27;) appData.layout_selection = {};
            Object.keys(appData.classes).forEach(className =&gt; {
                if (!appData.layouts[className]) {
                    appData.layouts[className] = inferLayoutFromStudents(appData.classes[className]);
                } else {
                    appData.layouts[className] = normalizeLayout(appData.layouts[className]);
                }
                if (!appData.layout_selection[className]) {
                    appData.layout_selection[className] = appData.layouts[className][0].row;
                }
            });
        }

        function getClassLayout(className) {
            if (!appData.layouts[className]) appData.layouts[className] = createDefaultLayout();
            appData.layouts[className] = normalizeLayout(appData.layouts[className]);
            return appData.layouts[className];
        }

        function getSelectedLayoutRow(className) {
            if (!appData.layout_selection || !appData.layout_selection[className]) return null;
            const parsed = parseInt(appData.layout_selection[className], 10);
            return Number.isInteger(parsed) ? parsed : null;
        }

        function setSelectedLayoutRow(className, rowNum) {
            if (!appData.layout_selection || typeof appData.layout_selection !== &#x27;object&#x27;) appData.layout_selection = {};
            appData.layout_selection[className] = rowNum;
        }

        function getTotalCapacity(layout) {
            return layout.reduce((sum, rowCfg) =&gt; sum + rowCfg.pairs.reduce((rowSum, c) =&gt; rowSum + c, 0), 0);
        }

        function normalizeStudentSeats(className) {
            const students = appData.classes[className];
            const layout = getClassLayout(className);
            const seatCapacity = new Map();
            layout.forEach(rowCfg =&gt; {
                [1, 2, 3].forEach(pairNum =&gt; {
                    seatCapacity.set(`${rowCfg.row}-${pairNum}`, rowCfg.pairs[pairNum - 1]);
                });
            });

            const grouped = new Map();
            students.forEach(student =&gt; {
                const key = `${student.row}-${student.pair_position}`;
                if (!grouped.has(key)) grouped.set(key, []);
                grouped.get(key).push(student);
            });

            const keptCount = new Map();
            const overflow = [];
            grouped.forEach((arr, key) =&gt; {
                const cap = seatCapacity.get(key) || 0;
                const keep = arr.slice(0, cap);
                const extras = arr.slice(cap);
                keptCount.set(key, keep.length);
                overflow.push(...extras);
            });

            const availableSlots = [];
            seatCapacity.forEach((cap, key) =&gt; {
                const used = keptCount.get(key) || 0;
                const remaining = Math.max(0, cap - used);
                const [row, pair] = key.split(&#x27;-&#x27;).map(Number);
                for (let i = 0; i &lt; remaining; i++) {
                    availableSlots.push({ row, pair });
                }
            });

            overflow.forEach((student, idx) =&gt; {
                const slot = availableSlots[idx];
                if (slot) {
                    student.row = slot.row;
                    student.pair_position = slot.pair;
                }
            });
        }

        function updateLayoutRowDropdown(preferredRow = null) {
            const existingSelected = preferredRow ?? getSelectedLayoutRow(currentClass) ?? parseInt(layoutRowSelect.value, 10);
            layoutRowSelect.innerHTML = &#x27;&#x27;;
            if (!currentClass || !appData.classes[currentClass]) {
                layoutRowSelect.disabled = true;
                btnAddRow.disabled = true;
                btnDeleteRow.disabled = true;
                seatAdjustButtons.forEach(btn =&gt; btn.disabled = true);
                return;
            }
            btnAddRow.disabled = false;
            seatAdjustButtons.forEach(btn =&gt; btn.disabled = false);
            const layout = getClassLayout(currentClass);
            layout.forEach(rowCfg =&gt; {
                const opt = document.createElement(&#x27;option&#x27;);
                opt.value = String(rowCfg.row);
                opt.text = `Row ${rowCfg.row}`;
                layoutRowSelect.add(opt);
            });
            layoutRowSelect.disabled = false;
            const matched = Number.isInteger(existingSelected) &amp;&amp; layout.some(r =&gt; r.row === existingSelected);
            const selectedRow = matched ? existingSelected : layout[0].row;
            layoutRowSelect.value = String(selectedRow);
            setSelectedLayoutRow(currentClass, selectedRow);
            btnDeleteRow.disabled = layout.length &lt;= 1;
        }

        function initApp() {
            const savedData = localStorage.getItem(&#x27;classRotatorData&#x27;);
            if (savedData) {
                try {
                    appData = JSON.parse(savedData);
                } catch (e) {
                    console.error(&quot;Error parsing local storage&quot;, e);
                }
            }
            ensureLayoutSchema();
            updateClassDropdown();
            updateLayoutRowDropdown();
            
            if (Object.keys(appData.classes).length &gt; 0) {
                currentClass = classSelect.value;
                normalizeStudentSeats(currentClass);
                renderClassroom();
            } else {
                classroomEl.innerHTML = `&lt;div style=&quot;text-align:center; color: var(--text-muted); margin-top: 5rem;&quot;&gt;No class selected. Create or import a class to begin.&lt;/div&gt;`;
            }
        }

        function saveData() {
            localStorage.setItem(&#x27;classRotatorData&#x27;, JSON.stringify(appData));
        }

        function showToast(msg) {
            const toast = document.getElementById(&#x27;toast&#x27;);
            toast.innerText = msg;
            toast.classList.add(&#x27;show&#x27;);
            setTimeout(() =&gt; toast.classList.remove(&#x27;show&#x27;), 3000);
        }

        function updateClassDropdown() {
            classSelect.innerHTML = &#x27;&#x27;;
            const classNames = Object.keys(appData.classes);
            if (classNames.length === 0) {
                const opt = document.createElement(&#x27;option&#x27;);
                opt.text = &quot;No Classes&quot;;
                classSelect.add(opt);
                classSelect.disabled = true;
                return;
            }
            classSelect.disabled = false;
            classNames.forEach(name =&gt; {
                const opt = document.createElement(&#x27;option&#x27;);
                opt.value = name;
                opt.text = name;
                classSelect.add(opt);
            });
            if (currentClass &amp;&amp; appData.classes[currentClass]) {
                classSelect.value = currentClass;
            } else {
                currentClass = classNames[0];
                classSelect.value = currentClass;
            }
        }

        // Render Classroom
        function renderClassroom() {
            if (!currentClass || !appData.classes[currentClass]) {
                classroomEl.innerHTML = &#x27;&#x27;;
                return;
            }

            const students = appData.classes[currentClass];
            const layout = getClassLayout(currentClass);
            normalizeStudentSeats(currentClass);
            classroomEl.innerHTML = &#x27;&#x27;;

            for (const rowCfg of layout) {
                const r = rowCfg.row;
                const rowDiv = document.createElement(&#x27;div&#x27;);
                rowDiv.className = &#x27;row&#x27;;
                rowDiv.setAttribute(&#x27;data-row&#x27;, r);
                
                const label = document.createElement(&#x27;div&#x27;);
                label.className = &#x27;row-label&#x27;;
                label.innerText = `ROW ${r}`;
                rowDiv.appendChild(label);

                const pairsContainer = document.createElement(&#x27;div&#x27;);
                pairsContainer.className = &#x27;pairs-container&#x27;;

                for (let p = 1; p &lt;= 3; p++) {
                    const pairDiv = document.createElement(&#x27;div&#x27;);
                    pairDiv.className = &#x27;pair&#x27;;
                    const seatCount = Math.max(0, Math.min(2, rowCfg.pairs[p - 1] || 0));
                    let seatStudents = students.filter(s =&gt; s.row === r &amp;&amp; s.pair_position === p);
                    if (seatCount === 0) {
                        pairDiv.classList.add(&#x27;no-seats&#x27;);
                        pairDiv.innerText = &#x27;No Seats&#x27;;
                        pairsContainer.appendChild(pairDiv);
                        continue;
                    }
                    for (let seatIdx = 0; seatIdx &lt; seatCount; seatIdx++) {
                        const studentDiv = document.createElement(&#x27;div&#x27;);
                        studentDiv.className = &#x27;student&#x27;;
                        let studentObj = seatStudents[seatIdx];
                        let realIndex = studentObj ? students.indexOf(studentObj) : -1;

                        if (studentObj) {
                            studentDiv.setAttribute(&#x27;draggable&#x27;, true);
                            studentDiv.dataset.index = realIndex;
                            
                            let imgDiv = document.createElement(&#x27;div&#x27;);
                            imgDiv.className = &#x27;student-img&#x27;;
                            if (studentObj.image) {
                                imgDiv.style.backgroundImage = `url(${studentObj.image})`;
                                imgDiv.innerHTML = &#x27;&#x27;;
                            } else {
                                imgDiv.innerHTML = &#x27;👤&#x27;;
                            }
                            imgDiv.title = &quot;Click to set picture&quot;;
                            
                            imgDiv.addEventListener(&#x27;click&#x27;, (e) =&gt; {
                                e.stopPropagation();
                                let input = document.createElement(&#x27;input&#x27;);
                                input.type = &#x27;file&#x27;;
                                input.accept = &#x27;image/*&#x27;;
                                input.onchange = (ev) =&gt; {
                                    let file = ev.target.files[0];
                                    if(!file) return;
                                    let reader = new FileReader();
                                    reader.onload = (re) =&gt; {
                                        let imgObj = new Image();
                                        imgObj.onload = () =&gt; {
                                            let canvas = document.createElement(&#x27;canvas&#x27;);
                                            let ctx = canvas.getContext(&#x27;2d&#x27;);
                                            canvas.width = 120; canvas.height = 120;
                                            let size = Math.min(imgObj.width, imgObj.height);
                                            let sx = (imgObj.width - size) / 2;
                                            let sy = (imgObj.height - size) / 2;
                                            ctx.drawImage(imgObj, sx, sy, size, size, 0, 0, 120, 120);
                                            let dataURL = canvas.toDataURL(&#x27;image/jpeg&#x27;, 0.8);
                                            
                                            appData.classes[currentClass][realIndex].image = dataURL;
                                            saveData();
                                            renderClassroom();
                                        };
                                        imgObj.src = re.target.result;
                                    };
                                    reader.readAsDataURL(file);
                                };
                                input.click();
                            });
                            studentDiv.appendChild(imgDiv);

                            let nameSpan = document.createElement(&#x27;span&#x27;);
                            nameSpan.className = &#x27;student-name&#x27;;
                            nameSpan.innerText = studentObj.name;
                            studentDiv.appendChild(nameSpan);

                            setupDragAndDrop(studentDiv);
                            setupNameEdit(nameSpan, realIndex, studentDiv);
                        } else {
                            studentDiv.innerText = &quot;Empty&quot;;
                            studentDiv.classList.add(&#x27;empty&#x27;);
                            studentDiv.dataset.targetRow = r;
                            studentDiv.dataset.targetPair = p;
                            setupDragAndDropEmpty(studentDiv);
                        }
                        
                        pairDiv.appendChild(studentDiv);
                    }
                    pairsContainer.appendChild(pairDiv);
                }
                rowDiv.appendChild(pairsContainer);
                classroomEl.appendChild(rowDiv);
            }
        }

        // Drag and Drop implementation
        function setupDragAndDrop(el) {
            el.addEventListener(&#x27;dragstart&#x27;, function(e) {
                dragSrcEl = this;
                e.dataTransfer.effectAllowed = &#x27;move&#x27;;
                e.dataTransfer.setData(&#x27;text/plain&#x27;, this.dataset.index);
                this.style.opacity = &#x27;0.4&#x27;;
            });

            el.addEventListener(&#x27;dragend&#x27;, function(e) {
                this.style.opacity = &#x27;1&#x27;;
                document.querySelectorAll(&#x27;.student&#x27;).forEach(s =&gt; s.classList.remove(&#x27;drag-over&#x27;));
            });

            el.addEventListener(&#x27;dragover&#x27;, function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = &#x27;move&#x27;;
                return false;
            });

            el.addEventListener(&#x27;dragenter&#x27;, function(e) {
                this.classList.add(&#x27;drag-over&#x27;);
            });

            el.addEventListener(&#x27;dragleave&#x27;, function(e) {
                this.classList.remove(&#x27;drag-over&#x27;);
            });

            el.addEventListener(&#x27;drop&#x27;, handleDrop);
        }

        function setupDragAndDropEmpty(el) {
            el.addEventListener(&#x27;dragover&#x27;, function(e) { e.preventDefault(); e.dataTransfer.dropEffect = &#x27;move&#x27;; return false; });
            el.addEventListener(&#x27;dragenter&#x27;, function(e) { this.classList.add(&#x27;drag-over&#x27;); });
            el.addEventListener(&#x27;dragleave&#x27;, function(e) { this.classList.remove(&#x27;drag-over&#x27;); });
            el.addEventListener(&#x27;drop&#x27;, handleDropEmpty);
        }

        function handleDrop(e) {
            e.stopPropagation();
            this.classList.remove(&#x27;drag-over&#x27;);

            if (dragSrcEl !== this) {
                let srcIndex = dragSrcEl.dataset.index;
                let targetIndex = this.dataset.index;
                
                // Swap names and positions structurally
                let students = appData.classes[currentClass];
                
                // Keep the structural coordinates (row/pair), swap the names
                let tempName = students[srcIndex].name;
                students[srcIndex].name = students[targetIndex].name;
                students[targetIndex].name = tempName;

                saveData();
                renderClassroom();
                showToast(&quot;Seats Swapped!&quot;);
            }
            return false;
        }

        function handleDropEmpty(e) {
            e.stopPropagation();
            this.classList.remove(&#x27;drag-over&#x27;);
            
            let srcIndex = dragSrcEl.dataset.index;
            let targetRow = parseInt(this.dataset.targetRow);
            let targetPair = parseInt(this.dataset.targetPair);
            
            let students = appData.classes[currentClass];
            // Move student to new row/pair
            students[srcIndex].row = targetRow;
            students[srcIndex].pair_position = targetPair;
            
            saveData();
            renderClassroom();
            showToast(&quot;Student Moved!&quot;);
        }

        // Edit Name Implementation
        function setupNameEdit(spanEl, index, parentCard) {
            parentCard.addEventListener(&#x27;dblclick&#x27;, function(e) {
                // Prevent creating multiple inputs
                if(spanEl.querySelector(&#x27;input&#x27;)) return;
                
                let currentName = spanEl.innerText;
                spanEl.innerText = &#x27;&#x27;;
                let input = document.createElement(&#x27;input&#x27;);
                input.type = &#x27;text&#x27;;
                input.value = currentName;
                spanEl.appendChild(input);
                input.focus();
                
                // Highlight text
                input.setSelectionRange(0, input.value.length);
                
                // Prevent drag while editing
                parentCard.setAttribute(&#x27;draggable&#x27;, false);

                let finishEdit = () =&gt; {
                    let newName = input.value.trim();
                    if(newName === &#x27;&#x27;) newName = currentName; // revert if empty
                    
                    appData.classes[currentClass][index].name = newName;
                    spanEl.innerHTML = newName;
                    parentCard.setAttribute(&#x27;draggable&#x27;, true);
                    saveData();
                };

                input.addEventListener(&#x27;blur&#x27;, finishEdit);
                input.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
                    if (e.key === &#x27;Enter&#x27;) finishEdit();
                    if (e.key === &#x27;Escape&#x27;) {
                        input.value = currentName;
                        finishEdit();
                    }
                });
            });
        }

        function changeSeatCountForSelectedRow(pairNum, delta) {
            if (!currentClass || !appData.classes[currentClass]) return;
            const selectedRow = parseInt(layoutRowSelect.value, 10);
            if (!Number.isInteger(selectedRow)) return;
            const currentLayout = getClassLayout(currentClass);
            const targetRow = currentLayout.find(r =&gt; r.row === selectedRow);
            if (!targetRow) return;
            const idx = pairNum - 1;
            const nextVal = Math.max(0, Math.min(2, targetRow.pairs[idx] + delta));
            if (nextVal === targetRow.pairs[idx]) return;
            const nextLayout = currentLayout.map(r =&gt; ({ row: r.row, pairs: [...r.pairs] }));
            const changedRow = nextLayout.find(r =&gt; r.row === selectedRow);
            changedRow.pairs[idx] = nextVal;
            if (getTotalCapacity(nextLayout) &lt; appData.classes[currentClass].length) {
                showToast(&quot;Not enough seats for current students&quot;);
                return;
            }
            appData.layouts[currentClass] = nextLayout;
            normalizeStudentSeats(currentClass);
            saveData();
            updateLayoutRowDropdown();
            renderClassroom();
        }

        function addRowToCurrentClass() {
            if (!currentClass || !appData.classes[currentClass]) return;
            const layout = getClassLayout(currentClass);
            const nextRowNumber = layout.length ? Math.max(...layout.map(r =&gt; r.row)) + 1 : 1;
            layout.push({ row: nextRowNumber, pairs: [2, 2, 2] });
            appData.layouts[currentClass] = normalizeLayout(layout);
            setSelectedLayoutRow(currentClass, nextRowNumber);
            saveData();
            updateLayoutRowDropdown(nextRowNumber);
            renderClassroom();
            showToast(`Row ${nextRowNumber} added`);
        }

        function deleteSelectedRowFromCurrentClass() {
            if (!currentClass || !appData.classes[currentClass]) return;
            const selectedRow = parseInt(layoutRowSelect.value, 10);
            if (!Number.isInteger(selectedRow)) return;
            const currentLayout = getClassLayout(currentClass);
            if (currentLayout.length &lt;= 1) {
                showToast(&quot;At least one row is required&quot;);
                return;
            }
            const nextLayout = currentLayout.filter(r =&gt; r.row !== selectedRow);
            if (getTotalCapacity(nextLayout) &lt; appData.classes[currentClass].length) {
                showToast(&quot;Not enough seats after deleting this row&quot;);
                return;
            }
            appData.layouts[currentClass] = nextLayout;
            const fallbackRow = nextLayout.length ? nextLayout[0].row : null;
            if (fallbackRow !== null) setSelectedLayoutRow(currentClass, fallbackRow);
            normalizeStudentSeats(currentClass);
            saveData();
            updateLayoutRowDropdown(fallbackRow);
            renderClassroom();
            showToast(`Row ${selectedRow} deleted`);
        }

        // Event Listeners
        document.getElementById(&#x27;btnCreate&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
            const nameInput = document.getElementById(&#x27;newClassName&#x27;);
            const name = nameInput.value.trim();
            if (!name) {
                showToast(&quot;Class name cannot be empty&quot;);
                return;
            }
            if (appData.classes[name]) {
                showToast(&quot;Class already exists&quot;);
                return;
            }

            let newStudents = [];
            for (let r = 1; r &lt;= 3; r++) {
                for (let p = 1; p &lt;= 3; p++) {
                    newStudents.push({ name: `${name}_R${r}P${p}A`, row: r, pair_position: p });
                    newStudents.push({ name: `${name}_R${r}P${p}B`, row: r, pair_position: p });
                }
            }

            appData.classes[name] = newStudents;
            appData.layouts[name] = createDefaultLayout();
            setSelectedLayoutRow(name, 1);
            appData.last_rotation[name] = new Date().toISOString().split(&#x27;T&#x27;)[0];
            currentClass = name;
            
            nameInput.value = &#x27;&#x27;;
            saveData();
            updateClassDropdown();
            updateLayoutRowDropdown();
            renderClassroom();
            showToast(`Class ${name} created!`);
        });

        document.getElementById(&#x27;btnRenameClass&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
            if (!currentClass) return;
            let newName = prompt(&quot;Enter new name for class:&quot;, currentClass);
            if (newName &amp;&amp; newName.trim() !== &#x27;&#x27; &amp;&amp; newName !== currentClass) {
                newName = newName.trim();
                if (appData.classes[newName]) {
                    showToast(&quot;A class with that name already exists!&quot;);
                    return;
                }
                
                appData.classes[newName] = appData.classes[currentClass];
                delete appData.classes[currentClass];
                appData.layouts[newName] = appData.layouts[currentClass] ? normalizeLayout(appData.layouts[currentClass]) : createDefaultLayout();
                delete appData.layouts[currentClass];
                setSelectedLayoutRow(newName, getSelectedLayoutRow(currentClass) || appData.layouts[newName][0].row);
                delete appData.layout_selection[currentClass];
                
                if (appData.last_rotation[currentClass]) {
                    appData.last_rotation[newName] = appData.last_rotation[currentClass];
                    delete appData.last_rotation[currentClass];
                }
                
                currentClass = newName;
                saveData();
                updateClassDropdown();
                updateLayoutRowDropdown();
                showToast(&quot;Class Renamed!&quot;);
            }
        });

        classSelect.addEventListener(&#x27;change&#x27;, (e) =&gt; {
            currentClass = e.target.value;
            updateLayoutRowDropdown();
            renderClassroom();
        });

        layoutRowSelect.addEventListener(&#x27;change&#x27;, () =&gt; {
            const selectedRow = parseInt(layoutRowSelect.value, 10);
            if (Number.isInteger(selectedRow) &amp;&amp; currentClass) {
                setSelectedLayoutRow(currentClass, selectedRow);
                saveData();
            }
        });

        btnAddRow.addEventListener(&#x27;click&#x27;, addRowToCurrentClass);
        btnDeleteRow.addEventListener(&#x27;click&#x27;, deleteSelectedRowFromCurrentClass);
        seatAdjustButtons.forEach(btn =&gt; {
            btn.addEventListener(&#x27;click&#x27;, () =&gt; {
                const pairNum = parseInt(btn.dataset.pair, 10);
                const delta = parseInt(btn.dataset.delta, 10);
                changeSeatCountForSelectedRow(pairNum, delta);
            });
        });

        document.getElementById(&#x27;btnRotate&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
            if (!currentClass || !appData.classes[currentClass]) return;

            // Visual Animation
            classroomEl.classList.add(&#x27;rotating&#x27;);
            
            document.getElementById(&#x27;btnRotate&#x27;).disabled = true;
            document.getElementById(&#x27;btnRotate&#x27;).innerText = &quot;Rotating...&quot;;

            setTimeout(() =&gt; {
                let students = appData.classes[currentClass];
                const rowOrder = getClassLayout(currentClass).map(r =&gt; r.row).sort((a, b) =&gt; a - b);
                const rowMap = new Map();
                rowOrder.forEach((rowNum, idx) =&gt; {
                    const targetIndex = idx === 0 ? rowOrder.length - 1 : idx - 1;
                    rowMap.set(rowNum, rowOrder[targetIndex]);
                });
                students.forEach(student =&gt; {
                    if (rowMap.has(student.row)) student.row = rowMap.get(student.row);
                });
                normalizeStudentSeats(currentClass);

                appData.last_rotation[currentClass] = new Date().toISOString().split(&#x27;T&#x27;)[0];
                saveData();
                renderClassroom();
                
                classroomEl.classList.remove(&#x27;rotating&#x27;);
                document.getElementById(&#x27;btnRotate&#x27;).disabled = false;
                document.getElementById(&#x27;btnRotate&#x27;).innerText = &quot;🔄 Rotate Classroom&quot;;
                showToast(&quot;Rotation Complete!&quot;);
                
            }, 600); // Wait for transition
        });

        document.getElementById(&#x27;btnExport&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: &quot;application/json&quot; });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement(&#x27;a&#x27;);
            a.href = url;
            a.download = `classes_data.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(&quot;Exported effectively!&quot;);
        });

        document.getElementById(&#x27;btnImport&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
            fileInput.click();
        });

        fileInput.addEventListener(&#x27;change&#x27;, (e) =&gt; {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (importedData.classes) {
                        appData = importedData;
                        ensureLayoutSchema();
                        saveData();
                        updateClassDropdown();
                        updateLayoutRowDropdown();
                        if (Object.keys(appData.classes).length &gt; 0) {
                            currentClass = Object.keys(appData.classes)[0];
                            classSelect.value = currentClass;
                            normalizeStudentSeats(currentClass);
                            renderClassroom();
                        }
                        showToast(&quot;Data Imported Successfully!&quot;);
                    } else {
                        showToast(&quot;Invalid JSON format&quot;);
                    }
                } catch (err) {
                    showToast(&quot;Error parsing JSON&quot;);
                }
            };
            reader.readAsText(file);
            fileInput.value = &#x27;&#x27;; // reset
        });

        // Start
        initApp();
    &lt;/script&gt;

    });

  function getRotatorClasses() {
    try {

      if (!parsed || typeof parsed !== &#x27;object&#x27; || !parsed.classes || typeof parsed.classes !== &#x27;object&#x27;) return {};
      return parsed.classes;

  function toStudentRecord(item) {
    if (typeof item === &#x27;string&#x27;) {
      const name = item.trim();
      if (!name) return null;
      return { id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; };
    }
    if (item &amp;&amp; typeof item === &#x27;object&#x27; &amp;&amp; typeof item.name === &#x27;string&#x27;) {
      const name = item.name.trim();

      return { id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; };
    }
    return null;
  }

  function makeClassId(name) {
    const normalized = String(name).toLowerCase().replace(/[^a-z0-9]+/g, &#x27;_&#x27;).replace(/^_+|_+$/g, &#x27;&#x27;);
    return `rot_${normalized || generateId().slice(0, 8)}`;
  }

  function syncFromRotatorData() {
    const classes = getRotatorClasses();
    const classNames = Object.keys(classes);
    if (!classNames.length) return;
    classNames.forEach(className =&gt; {
      const students = Array.isArray(classes[className]) ? classes[className].map(toStudentRecord).filter(Boolean) : [];
      let existingId = Object.keys(appData).find(id =&gt; appData[id].label === className || appData[id].sourceClassName === className);
      if (!existingId) {
        const baseId = makeClassId(className);
        let candidateId = baseId;
        let suffix = 2;
        while (appData[candidateId] &amp;&amp; appData[candidateId].sourceClassName !== className) {
          candidateId = `${baseId}_${suffix}`;
          suffix += 1;
        }
        existingId = candidateId;
        appData[existingId] = {
          label: className,
          sourceClassName: className,
          settings: { maxMcq: 40, scaledMcq: 52, maxFrq: 48, maxRaw: 100, assignmentName: &#x27;&#x27; },
          curveBands: JSON.parse(JSON.stringify(DEFAULT_CURVE_BANDS)),
          assignments: [],
          students
        };
        return;
      }
      appData[existingId].label = className;
      appData[existingId].sourceClassName = className;
      const hasManualGrades = appData[existingId].students.some(s =&gt; String(s.mcq).trim() !== &#x27;&#x27; || String(s.frq).trim() !== &#x27;&#x27;);
      if (!hasManualGrades) appData[existingId].students = students;
    });
    if (!appData[currentClass]) currentClass = Object.keys(appData)[0];
    saveData();
  }

  function hasAnyStudent(students) {
    if (!Array.isArray(students)) return false;
    return students.some(s =&gt; {
      if (!s) return false;
      if (typeof s === &#x27;string&#x27;) return s.trim().length &gt; 0;
      if (typeof s === &#x27;object&#x27; &amp;&amp; typeof s.name === &#x27;string&#x27;) return s.name.trim().length &gt; 0;
      return false;
    });
  }

  function pruneLegacyEmptyClasses() {
    const initialKeys = Object.keys(appData);
    if (initialKeys.length &lt;= 1) return;
    let changed = false;
    [&#x27;class1&#x27;, &#x27;class2&#x27;].forEach(key =&gt; {
      const cls = appData[key];
      if (!cls) return;
      const hasStudents = hasAnyStudent(cls.students);
      const hasAssignments = Array.isArray(cls.assignments) &amp;&amp; cls.assignments.length &gt; 0;
      const isLegacy = !cls.sourceClassName;
      if (isLegacy &amp;&amp; !hasStudents &amp;&amp; !hasAssignments &amp;&amp; Object.keys(appData).length &gt; 1) {
        delete appData[key];
        changed = true;
      }
    });
    if (!changed) return;
    if (!appData[currentClass]) currentClass = Object.keys(appData)[0];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));

  function loadData() {

          if (!Object.prototype.hasOwnProperty.call(appData[key], &#x27;sourceClassName&#x27;)) appData[key].sourceClassName = null;
          if (!Array.isArray(appData[key].curveBands)) appData[key].curveBands = JSON.parse(JSON.stringify(DEFAULT_CURVE_BANDS));

  function syncOrderToOtherApp(targetKey) {
    try {
      const saved = localStorage.getItem(targetKey);

      Object.keys(appData).forEach(classId =&gt; {

          const newOrder = [];
          const sourceStudents = appData[classId].students;
          const targetStudents = otherData[classId].students;
          sourceStudents.forEach(s =&gt; {
            const matched = targetStudents.find(ts =&gt; ts.id === s.id || ts.name === s.name);
            if (matched) newOrder.push(matched);
            else newOrder.push({ id: s.id, name: s.name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; });
          });
          if (JSON.stringify(targetStudents.map(ts=&gt;ts.name)) !== JSON.stringify(newOrder.map(n=&gt;n.name))) {
            otherData[classId].students = newOrder;
            changed = true;

  function generateId() {
    if (crypto &amp;&amp; crypto.randomUUID) return crypto.randomUUID();
    return &#x27;id_&#x27; + Math.random().toString(36).slice(2);
  }

  function toNumber(v) {
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : null;
  }

  function calculateCurve(rawPct) {
    if (rawPct === null || Number.isNaN(rawPct)) return { curve: null, ap: null };
    const bands = appData[currentClass].curveBands || [];
    let targetBand = bands[bands.length - 1] || { rawMin: 0, rawMax: 100, curveMin: 0, curveMax: 100, ap: 1 };
    for (const band of bands) {
      if (rawPct &gt;= band.rawMin &amp;&amp; rawPct &lt;= band.rawMax) {
        targetBand = band;
        break;
      }
    }
    if (rawPct &gt;= 100) return { curve: 100, ap: 5 };
    const widthRaw = targetBand.rawMax - targetBand.rawMin || 1;
    const widthCurve = targetBand.curveMax - targetBand.curveMin;
    const curvedScore = ((rawPct - targetBand.rawMin) / widthRaw) * widthCurve + targetBand.curveMin;
    return { curve: Math.max(0, Math.min(100, curvedScore)), ap: targetBand.ap };
  }

  function processStudentGrades(student) {
    const mcq = toNumber(String(student.mcq).trim());
    const frq = toNumber(String(student.frq).trim());
    const state = appData[currentClass];
    let scaledMcq = null;
    let rawScore = null;
    let rawPct = null;
    let curve = null;
    let ap = null;
    const hasMcq = mcq !== null;
    const hasFrq = frq !== null;
    if (hasMcq) {
      scaledMcq = (mcq / (state.settings.maxMcq || 40)) * (state.settings.scaledMcq || 52);
    }
    if (hasMcq || hasFrq) {
      rawScore = (scaledMcq || 0) + (hasFrq ? frq : 0);
      rawPct = (rawScore / (state.settings.maxRaw || 100)) * 100;
      const curved = calculateCurve(rawPct);
      curve = curved.curve;
      ap = curved.ap;
    }
    return { scaledMcq, rawScore, rawPct, curve, ap };
  }

  function restoreGradeInputFocus(focusInfo) {

  function setupEventListeners() {
    classSelector.addEventListener(&#x27;change&#x27;, (e) =&gt; {
      currentClass = e.target.value;

      }
    });
    curveLegendContainer.addEventListener(&#x27;input&#x27;, (e) =&gt; {
      const input = e.target.closest(&#x27;input[data-ap]&#x27;);
      if (!input) return;
      const ap = parseInt(input.dataset.ap, 10);
      const field = input.dataset.field;
      const val = parseFloat(input.value);
      if (!Number.isFinite(val)) return;

      if (!student) return;
      student[field] = e.target.value;
      saveData();
      updateRowDisplay(e.target.closest(&#x27;tr&#x27;), student);
    });
    studentListEl.addEventListener(&#x27;click&#x27;, (e) =&gt; {
      const nameTd = e.target.closest(&#x27;td.col-name&#x27;);
      if (nameTd) {
        const student = appData[currentClass].students.find(s =&gt; s.id === nameTd.dataset.studentId);
        if (student) startNameEdit(nameTd, student);
      }
      const deleteBtn = e.target.closest(&#x27;.delete-btn&#x27;);
      if (deleteBtn) {
        const id = deleteBtn.dataset.id;
        appData[currentClass].students = appData[currentClass].students.filter(s =&gt; s.id !== id);
        saveData();
        renderTable();
      }
    });
    [maxMcqInput, scaledMcqInput, maxFrqInput, maxRawScoreInput].forEach(input =&gt; {
      input.addEventListener(&#x27;change&#x27;, () =&gt; {
        saveData();
        renderTable();
      });
    });
    assignmentNameInput.addEventListener(&#x27;input&#x27;, () =&gt; saveData());
    saveAssignmentBtn.addEventListener(&#x27;click&#x27;, saveAssignmentSnapshot);
    resetDataBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
      if (confirm(&#x27;This will clear all entered grades and reset the student list for the current class. Continue?&#x27;)) {
        loadClassDefaults(currentClass);

  function startNameEdit(td, student) {
    if (td.querySelector(&#x27;input&#x27;)) return;

    input.type = &#x27;text&#x27;;
    input.value = prev;
    input.style.cssText = &#x27;width:100%;padding:0.35rem 0.5rem;font-size:inherit;font-weight:600;&#x27;;
    td.textContent = &#x27;&#x27;;
    td.appendChild(input);
    input.focus();
    input.select();
    const commit = () =&gt; {
      const val = input.value.trim();
      student.name = val || prev;
      saveData();
      td.textContent = student.name;
      td.title = &#x27;Click to edit name&#x27;;

    input.addEventListener(&#x27;blur&#x27;, commit);
    input.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
      if (e.key === &#x27;Enter&#x27;) input.blur();
      if (e.key === &#x27;Escape&#x27;) { input.value = prev; input.blur(); }
    });
  }

  function showModal() {
    modal.classList.add(&#x27;show&#x27;);
    newStudentNameInput.value = &#x27;&#x27;;
    setTimeout(() =&gt; newStudentNameInput.focus(), 40);
  }

  function hideModal() {
    modal.classList.remove(&#x27;show&#x27;);

  function handleAddStudent() {
    const name = newStudentNameInput.value.trim();
    if (!name) return;
    appData[currentClass].students.push({ id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; });
    saveData();
    renderTable();

  function escapeCsvField(val) {
    return `&quot;${String(val).replace(/&quot;/g, &#x27;&quot;&quot;&#x27;)}&quot;`;
  }

  function getClassLabel() {
    return appData[currentClass]?.label || currentClass;
  }

  function currentDateTimeIso() {
    return new Date().toISOString();

  function formatDateForFile(dateIso) {
    return String(dateIso || &#x27;&#x27;).replace(/[:.]/g, &#x27;-&#x27;);
  }

  function buildAssignmentRows(assignmentName, savedAtIso) {
    return appData[currentClass].students.map(student =&gt; {
      const r = processStudentGrades(student);
      return {
        classLabel: getClassLabel(),
        assignmentName,
        savedAtIso,
        studentName: student.name,
        mcq: student.mcq || &#x27;&#x27;,
        frq: student.frq || &#x27;&#x27;,
        scaledMcq: r.scaledMcq !== null ? r.scaledMcq.toFixed(1) : &#x27;&#x27;,
        rawScore: r.rawScore !== null ? r.rawScore.toFixed(1) : &#x27;&#x27;,
        rawPct: r.rawPct !== null ? r.rawPct.toFixed(1) : &#x27;&#x27;,
        curvedScore: r.curve !== null ? r.curve.toFixed(1) : &#x27;&#x27;,
        apScore: r.ap !== null ? r.ap : &#x27;&#x27;
      };
    });
  }

  function saveAssignmentSnapshot() {
    const assignmentName = assignmentNameInput.value.trim();
    if (!assignmentName) {
      saveStatus.textContent = &#x27;Enter assignment name first&#x27;;
      saveStatus.style.color = &#x27;#fda4af&#x27;;
      assignmentNameInput.focus();
      return;
    }
    const savedAtIso = currentDateTimeIso();
    const snapshotRows = buildAssignmentRows(assignmentName, savedAtIso);
    appData[currentClass].assignments.push({
      id: generateId(),
      assignmentName,
      savedAtIso,
      rows: snapshotRows
    });
    saveData();
    exportToCSV();
    saveStatus.textContent = `Saved &quot;${assignmentName}&quot; at ${new Date(savedAtIso).toLocaleString()}`;
    saveStatus.style.color = &#x27;#86efac&#x27;;
  }

  function exportToCSV() {
    const rows = [[&#x27;Class Name&#x27;, &#x27;Assignment Name&#x27;, &#x27;Saved At&#x27;, &#x27;Student Name&#x27;, &#x27;MCQ Score&#x27;, &#x27;FRQ Score&#x27;, &#x27;Scaled MCQ&#x27;, &#x27;Raw Score&#x27;, &#x27;Raw %&#x27;, &#x27;Curved Score (%)&#x27;, &#x27;AP Score&#x27;]];
    const assignments = Array.isArray(appData[currentClass].assignments) ? appData[currentClass].assignments : [];
    assignments.forEach(record =&gt; {
      (record.rows || []).forEach(row =&gt; {
        rows.push([
          row.classLabel || getClassLabel(),
          row.assignmentName || &#x27;&#x27;,
          row.savedAtIso || &#x27;&#x27;,
          row.studentName || &#x27;&#x27;,
          row.mcq || &#x27;&#x27;,
          row.frq || &#x27;&#x27;,
          row.scaledMcq || &#x27;&#x27;,
          row.rawScore || &#x27;&#x27;,
          row.rawPct || &#x27;&#x27;,
          row.curvedScore || &#x27;&#x27;,
          row.apScore || &#x27;&#x27;
        ]);
      });
    });
    if (rows.length === 1) {
      saveStatus.textContent = &#x27;No saved assignments yet. Click Save Assignment first.&#x27;;
      saveStatus.style.color = &#x27;#fda4af&#x27;;
      return;
    }
    const csvContent = rows.map(r =&gt; r.map(escapeCsvField).join(&#x27;,&#x27;)).join(&#x27;\n&#x27;);
    const blob = new Blob([csvContent], { type: &#x27;text/csv;charset=utf-8;&#x27; });
    const url = URL.createObjectURL(blob);
    const link = document.createElement(&#x27;a&#x27;);
    link.href = url;
    const latestDate = assignments.length ? assignments[assignments.length - 1].savedAtIso : currentDateTimeIso();
    link.download = `AP_Curves_${getClassLabel().replace(/[^\w-]+/g, &#x27;_&#x27;)}_${formatDateForFile(latestDate)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }
});

  function pruneRedundantClasses() {
    const keys = Object.keys(appData);
    const seenLabels = new Set();
    const toDelete = [];
    keys.forEach(k =&gt; {
      const lbl = appData[k].label;
      if (lbl === &#x27;APP1 (Class 1)&#x27; || lbl === &#x27;APPC-M (Class 2)&#x27;) {
        toDelete.push(k);
      } else if (seenLabels.has(lbl)) {
        toDelete.push(k);
      } else {
        seenLabels.add(lbl);
      }
    });
    if (toDelete.length &lt; keys.length) {
      toDelete.forEach(k =&gt; delete appData[k]);
    }
    if (!appData[currentClass]) {
      currentClass = Object.keys(appData)[0];

  function getRotatorClasses() {
    try {
      const raw = localStorage.getItem(ROTATOR_STORAGE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== &#x27;object&#x27; || !parsed.classes || typeof parsed.classes !== &#x27;object&#x27;) return {};
      return parsed.classes;
    } catch {
      return {};
    }
  }

  function toStudentRecord(item) {
    if (typeof item === &#x27;string&#x27;) {
      const name = item.trim();
      if (!name) return null;
      return { id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; };
    }
    if (item &amp;&amp; typeof item === &#x27;object&#x27; &amp;&amp; typeof item.name === &#x27;string&#x27;) {
      const name = item.name.trim();
      if (!name) return null;
      return { id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; };
    }
    return null;

  function makeClassId(name) {
    const normalized = String(name)
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, &#x27;_&#x27;)
      .replace(/^_+|_+$/g, &#x27;&#x27;);
    return `rot_${normalized || generateId().slice(0, 8)}`;
  }

  function syncFromRotatorData() {
    const classes = getRotatorClasses();
    const classNames = Object.keys(classes);
    if (!classNames.length) return;
    classNames.forEach(className =&gt; {
      const students = Array.isArray(classes[className]) ? classes[className].map(toStudentRecord).filter(Boolean) : [];
      let existingId = Object.keys(appData).find(id =&gt;
        appData[id].label === className || appData[id].sourceClassName === className
      );
      if (!existingId) {
        const baseId = makeClassId(className);
        let candidateId = baseId;
        let suffix = 2;
        while (appData[candidateId] &amp;&amp; appData[candidateId].sourceClassName !== className) {
          candidateId = `${baseId}_${suffix}`;
          suffix += 1;
        }
        existingId = candidateId;
        appData[existingId] = {
          label: className,
          sourceClassName: className,
          settings: { maxMcq: 40, scaledMcq: 52, maxFrq: 48, maxRaw: 100, formula: &#x27;=RAW_PCT&#x27;, assignmentName: &#x27;&#x27; },
          assignments: [],
          students: students
        };
        return;
      }
      appData[existingId].label = className;
      appData[existingId].sourceClassName = className;
      const hasManualGrades = appData[existingId].students.some(s =&gt; String(s.mcq).trim() !== &#x27;&#x27; || String(s.frq).trim() !== &#x27;&#x27;);
      if (!hasManualGrades) {
        appData[existingId].students = students;
      }
    });
    if (!appData[currentClass]) {
      currentClass = Object.keys(appData)[0];

  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        appData = { ...appData, ...parsed };
        Object.keys(appData).forEach(key =&gt; {
          if (!appData[key].settings) appData[key].settings = { maxMcq: 40, scaledMcq: 52, maxFrq: 48, maxRaw: 100, formula: &#x27;=RAW_PCT&#x27;, assignmentName: &#x27;&#x27; };
          if (!Object.prototype.hasOwnProperty.call(appData[key].settings, &#x27;formula&#x27;)) appData[key].settings.formula = &#x27;=RAW_PCT&#x27;;
          if (!Object.prototype.hasOwnProperty.call(appData[key].settings, &#x27;assignmentName&#x27;)) appData[key].settings.assignmentName = &#x27;&#x27;;
          if (!appData[key].label) appData[key].label = key;
          if (!Object.prototype.hasOwnProperty.call(appData[key], &#x27;sourceClassName&#x27;)) appData[key].sourceClassName = null;
          if (!Array.isArray(appData[key].assignments)) appData[key].assignments = [];
          if (!Array.isArray(appData[key].students)) appData[key].students = [];
        });
        if (!appData[currentClass]) currentClass = Object.keys(appData)[0];
      } catch {

  function loadDefaults() {
    const rotatorClasses = getRotatorClasses();

    if (classNames.length) {
      appData = {};
      classNames.forEach(className =&gt; {
        const classId = makeClassId(className);

        appData[classId] = {
          label: className,
          sourceClassName: className,
          settings: { maxMcq: 40, scaledMcq: 52, maxFrq: 48, maxRaw: 100, formula: &#x27;=RAW_PCT&#x27;, assignmentName: &#x27;&#x27; },

    appData.class2.sourceClassName = null;

  function loadClassDefaults(cls) {

      appData[cls].students = roster.map(toStudentRecord).filter(Boolean);
      appData[cls].settings.formula = &#x27;=RAW_PCT&#x27;;

    }
    const defaults = cls === &#x27;class1&#x27; ? DEFAULT_STUDENTS_CLASS1 : cls === &#x27;class2&#x27; ? DEFAULT_STUDENTS_CLASS2 : [];
    appData[cls].students = defaults.map(name =&gt; ({ id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; }));
    appData[cls].settings.formula = &#x27;=RAW_PCT&#x27;;

  function syncOrderToOtherApp(targetKey) {
    try {
      const saved = localStorage.getItem(targetKey);
      if (!saved) return;
      const otherData = JSON.parse(saved);
      let changed = false;
      Object.keys(appData).forEach(classId =&gt; {
        if (otherData[classId] &amp;&amp; otherData[classId].students &amp;&amp; appData[classId].students) {
          const newOrder = [];
          const sourceStudents = appData[classId].students;
          const targetStudents = otherData[classId].students;
          sourceStudents.forEach(s =&gt; {
            const matched = targetStudents.find(ts =&gt; ts.id === s.id || ts.name === s.name);
            if (matched) newOrder.push(matched);
            else newOrder.push({ id: s.id, name: s.name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; });
          });
          if (JSON.stringify(targetStudents.map(ts=&gt;ts.name)) !== JSON.stringify(newOrder.map(n=&gt;n.name))) {
            otherData[classId].students = newOrder;
            changed = true;
          }
        }
      });
      if (changed) {
        localStorage.setItem(targetKey, JSON.stringify(otherData));
      }
    } catch {}
  }

  function generateId() {
    if (crypto &amp;&amp; crypto.randomUUID) return crypto.randomUUID();
    return &#x27;id_&#x27; + Math.random().toString(36).slice(2);
  }

  function toNumber(v) {
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : null;
  }

  function buildFormulaScope(ctx) {
    const round = (n, d = 0) =&gt; {
      const p = Math.pow(10, d);
      return Math.round(n * p) / p;
    };
    const roundup = (n, d = 0) =&gt; {
      const p = Math.pow(10, d);
      return Math.sign(n) * Math.ceil(Math.abs(n) * p) / p;
    };
    const rounddown = (n, d = 0) =&gt; {
      const p = Math.pow(10, d);
      return Math.sign(n) * Math.floor(Math.abs(n) * p) / p;
    };
    return {
      ...ctx,
      IF: (c, a, b) =&gt; c ? a : b,
      AND: (...args) =&gt; args.every(Boolean),
      OR: (...args) =&gt; args.some(Boolean),
      NOT: (x) =&gt; !x,
      MIN: (...args) =&gt; Math.min(...args),
      MAX: (...args) =&gt; Math.max(...args),
      ABS: (x) =&gt; Math.abs(x),
      SQRT: (x) =&gt; Math.sqrt(x),
      ROUND: round,
      ROUNDUP: roundup,
      ROUNDDOWN: rounddown,
      INT: (x) =&gt; Math.floor(x),
      CEILING: (x, sig = 1) =&gt; Math.ceil(x / sig) * sig,
      FLOOR: (x, sig = 1) =&gt; Math.floor(x / sig) * sig,
      CEILING_MATH: (x, sig = 1) =&gt; Math.ceil(x / sig) * sig,
      FLOOR_MATH: (x, sig = 1) =&gt; Math.floor(x / sig) * sig,
      POWER: (x, y) =&gt; Math.pow(x, y),
      MOD: (x, y) =&gt; x % y,
      SUM: (...args) =&gt; args.reduce((a, b) =&gt; a + b, 0),
      AVERAGE: (...args) =&gt; args.length ? args.reduce((a, b) =&gt; a + b, 0) / args.length : 0,
      COUNT: (...args) =&gt; args.filter(x =&gt; Number.isFinite(x)).length,
      COUNTA: (...args) =&gt; args.filter(x =&gt; x !== null &amp;&amp; x !== undefined &amp;&amp; x !== &#x27;&#x27;).length,
      MEDIAN: (...args) =&gt; {
        if (!args.length) return 0;
        const s = [...args].sort((a, b) =&gt; a - b);
        const m = Math.floor(s.length / 2);
        return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
      },
      TRUNC: (x, d = 0) =&gt; {
        const p = Math.pow(10, d);
        return x &lt; 0 ? Math.ceil(x * p) / p : Math.floor(x * p) / p;
      },
      SIGN: (x) =&gt; Math.sign(x),
      EXP: (x) =&gt; Math.exp(x),
      LN: (x) =&gt; Math.log(x),
      LOG: (x, base = 10) =&gt; Math.log(x) / Math.log(base),
      LOG10: (x) =&gt; Math.log10(x),
      SIN: (x) =&gt; Math.sin(x),
      COS: (x) =&gt; Math.cos(x),
      TAN: (x) =&gt; Math.tan(x),
      ASIN: (x) =&gt; Math.asin(x),
      ACOS: (x) =&gt; Math.acos(x),
      ATAN: (x) =&gt; Math.atan(x),
      MROUND: (x, m) =&gt; Math.round(x / m) * m,
      RAND: () =&gt; Math.random(),
      RANDBETWEEN: (a, b) =&gt; Math.floor(Math.random() * (b - a + 1)) + a,
      IFERROR: (value, fallback) =&gt; {
        if (value === null || value === undefined || Number.isNaN(value)) return fallback;
        return value;
      },
      TRUE: true,
      FALSE: false,
      PI: Math.PI,
      E: Math.E
    };
  }

  function normalizeFormula(formula) {
    let f = String(formula || &#x27;&#x27;).trim();
    if (!f) return &#x27;&#x27;;
    if (f.startsWith(&#x27;=&#x27;)) f = f.slice(1);
    f = f.replace(/;/g, &#x27;,&#x27;);
    f = f.replace(/(\d+(\.\d+)?)\s*%/g, &#x27;($1/100)&#x27;);
    f = f.replace(/\^/g, &#x27;**&#x27;);
    f = f.replace(/&lt;&gt;/g, &#x27;!=&#x27;);
    f = f.replace(/(^|[^&lt;&gt;=!])=([^=])/g, &#x27;$1==$2&#x27;);
    f = f.toUpperCase();
    return f;
  }

  function evaluateCurveFormula(formula, ctx) {
    const normalized = normalizeFormula(formula);
    if (!normalized) return { value: null, error: &#x27;Formula is empty&#x27; };
    if (/[^A-Z0-9_+\-*/().,&lt;&gt;=!%\s]/.test(normalized)) {
      return { value: null, error: &#x27;Formula contains unsupported characters&#x27; };
    }
    try {
      const scope = buildFormulaScope(ctx);
      const argNames = Object.keys(scope);
      const argVals = Object.values(scope);
      const fn = Function(...argNames, `&quot;use strict&quot;; return (${normalized});`);
      const value = fn(...argVals);
      if (!Number.isFinite(value)) return { value: null, error: &#x27;Formula result is not a valid number&#x27; };
      return { value, error: null };
    } catch {
      return { value: null, error: &#x27;Formula could not be parsed&#x27; };
    }
  }

  function processStudentGrades(student) {
    const mcq = toNumber(String(student.mcq).trim());
    const frq = toNumber(String(student.frq).trim());
    const state = appData[currentClass];
    let scaledMcq = null;
    let rawScore = null;
    let rawPct = null;
    let curve = null;
    let curveError = null;
    const hasMcq = mcq !== null;
    const hasFrq = frq !== null;
    if (hasMcq) {
      scaledMcq = (mcq / (state.settings.maxMcq || 40)) * (state.settings.scaledMcq || 52);
    }
    if (hasMcq || hasFrq) {
      rawScore = (scaledMcq || 0) + (hasFrq ? frq : 0);
      rawPct = (rawScore / (state.settings.maxRaw || 100)) * 100;
      const evalResult = evaluateCurveFormula(state.settings.formula || &#x27;=RAW_PCT&#x27;, {
        RAW: rawScore,
        RAW_PCT: rawPct,
        MCQ: hasMcq ? mcq : 0,
        FRQ: hasFrq ? frq : 0,
        SCALED_MCQ: scaledMcq || 0,
        MAX_MCQ: state.settings.maxMcq || 40,
        SCALED_MCQ_MAX: state.settings.scaledMcq || 52,
        MAX_FRQ: state.settings.maxFrq || 48,
        MAX_RAW: state.settings.maxRaw || 100
      });
      curve = evalResult.value;
      curveError = evalResult.error;
    }
    return { scaledMcq, rawScore, rawPct, curve, curveError };
  }

    const active = document.activeElement;

    const field = active.dataset.field;
    if (!id || !field) return null;
    return {
      id,
      field,
      start: typeof active.selectionStart === &#x27;number&#x27; ? active.selectionStart : null,
      end: typeof active.selectionEnd === &#x27;number&#x27; ? active.selectionEnd : null

  }

    if (!focusInfo) return;
    const selector = `input[data-id=&quot;${focusInfo.id}&quot;][data-field=&quot;${focusInfo.field}&quot;]`;
    const input = studentListEl.querySelector(selector);
    if (!input) return;
    input.focus();
    if (focusInfo.start !== null &amp;&amp; focusInfo.end !== null) input.setSelectionRange(focusInfo.start, focusInfo.end);
  }

  function validateFormulaUI() {
    const state = appData[currentClass];
    const probe = evaluateCurveFormula(state.settings.formula || &#x27;=RAW_PCT&#x27;, {
      RAW: 72,
      RAW_PCT: 72,
      MCQ: 28,
      FRQ: 35,
      SCALED_MCQ: 37,
      MAX_MCQ: state.settings.maxMcq || 40,
      SCALED_MCQ_MAX: state.settings.scaledMcq || 52,
      MAX_FRQ: state.settings.maxFrq || 48,
      MAX_RAW: state.settings.maxRaw || 100
    });
    if (probe.error) {
      formulaStatus.textContent = `Error: ${probe.error}`;
      formulaStatus.style.color = &#x27;#fda4af&#x27;;
    } else {
      formulaStatus.textContent = &#x27;Variables: RAW, RAW_PCT, MCQ, FRQ, SCALED_MCQ, MAX_RAW, MAX_MCQ, MAX_FRQ | Functions: SQRT, IF, ROUND, MIN, MAX, LOG, LN&#x27;;
      formulaStatus.style.color = &#x27;#a5b4fc&#x27;;
    }
  }

  function setupEventListeners() {
    classSelector.addEventListener(&#x27;change&#x27;, (e) =&gt; {
      currentClass = e.target.value;
      syncUIWithState();
    });
    window.addEventListener(&#x27;storage&#x27;, (e) =&gt; {
      if (e.key === ROTATOR_STORAGE_KEY) {
        syncFromRotatorData();
        syncUIWithState();
      } else if (e.key === STORAGE_KEY) {
        loadData();
        syncUIWithState();
      }
    });
    studentListEl.addEventListener(&#x27;input&#x27;, (e) =&gt; {
      if (e.target.tagName === &#x27;INPUT&#x27;) {
        const id = e.target.dataset.id;
        const field = e.target.dataset.field;
        const val = e.target.value;
        const state = appData[currentClass];
        const student = state.students.find(s =&gt; s.id === id);
        if (student) {
          student[field] = val;
          saveData();
          updateRowDisplay(e.target.closest(&#x27;tr&#x27;), student);
        }
      }
    });
    studentListEl.addEventListener(&#x27;click&#x27;, (e) =&gt; {
      const nameTd = e.target.closest(&#x27;td.col-name&#x27;);
      if (nameTd) {
        const id = nameTd.dataset.studentId;
        const student = appData[currentClass].students.find(s =&gt; s.id === id);
        if (student) startNameEdit(nameTd, student);
      }
      const deleteBtn = e.target.closest(&#x27;.delete-btn&#x27;);
      if (deleteBtn) {
        const id = deleteBtn.dataset.id;
        const state = appData[currentClass];
        state.students = state.students.filter(s =&gt; s.id !== id);
        saveData();
        renderTable();
      }
    });
    [maxMcqInput, scaledMcqInput, maxFrqInput, maxRawScoreInput].forEach(input =&gt; {
      input.addEventListener(&#x27;change&#x27;, () =&gt; {
        saveData();
        validateFormulaUI();
        renderTable();
      });
    });
    curveFormulaInput.addEventListener(&#x27;input&#x27;, () =&gt; {
      saveData();
      validateFormulaUI();
      renderTable();
    });
    assignmentNameInput.addEventListener(&#x27;input&#x27;, () =&gt; {
      saveData();
    });
    resetDataBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
      if (confirm(&#x27;This will clear all entered grades and reset the student list for the current class. Continue?&#x27;)) {
        loadClassDefaults(currentClass);
        syncUIWithState();
      }
    });
    addStudentBtn.addEventListener(&#x27;click&#x27;, showModal);
    closeModalBtn.addEventListener(&#x27;click&#x27;, hideModal);
    cancelModalBtn.addEventListener(&#x27;click&#x27;, hideModal);
    document.addEventListener(&#x27;keydown&#x27;, (e) =&gt; { if (e.key === &#x27;Escape&#x27;) hideModal(); });
    confirmAddBtn.addEventListener(&#x27;click&#x27;, handleAddStudent);
    newStudentNameInput.addEventListener(&#x27;keypress&#x27;, (e) =&gt; { if (e.key === &#x27;Enter&#x27;) handleAddStudent(); });
    saveAssignmentBtn.addEventListener(&#x27;click&#x27;, saveAssignmentSnapshot);
    exportCsvBtn.addEventListener(&#x27;click&#x27;, exportToCSV);
    renameClassBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
      const newName = prompt(&#x27;Rename class:&#x27;, appData[currentClass].label || currentClass);
      if (newName &amp;&amp; newName.trim()) {
        appData[currentClass].label = newName.trim();
        saveData();
        renderClassSelector();
      }
    });
    addClassBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
      const name = prompt(&#x27;New class name:&#x27;);
      if (name &amp;&amp; name.trim()) {
        const id = &#x27;class_&#x27; + generateId().slice(0, 8);
        appData[id] = {
          label: name.trim(),
          sourceClassName: null,
          settings: { maxMcq: 40, scaledMcq: 52, maxFrq: 48, maxRaw: 100, formula: &#x27;=RAW_PCT&#x27;, assignmentName: &#x27;&#x27; },
          assignments: [],
          students: []
        };
        currentClass = id;
        saveData();
        syncUIWithState();
      }
    });
    deleteClassBtn.addEventListener(&#x27;click&#x27;, () =&gt; {
      if (Object.keys(appData).length &lt;= 1) return;
      const label = appData[currentClass].label || currentClass;
      if (!confirm(`Delete &quot;${label}&quot; and all its data? This cannot be undone.`)) return;
      delete appData[currentClass];
      currentClass = Object.keys(appData)[0];
      saveData();
      syncUIWithState();
    });
  }

  function startNameEdit(td, student) {
    if (td.querySelector(&#x27;input&#x27;)) return;
    const prev = student.name;
    const input = document.createElement(&#x27;input&#x27;);
    input.type = &#x27;text&#x27;;
    input.value = prev;
    input.style.cssText = &#x27;width:100%;padding:0.35rem 0.5rem;font-size:inherit;font-weight:600;&#x27;;
    td.textContent = &#x27;&#x27;;
    td.appendChild(input);
    input.focus();
    input.select();
    const commit = () =&gt; {
      const val = input.value.trim();
      student.name = val || prev;
      saveData();
      td.textContent = student.name;
      td.title = &#x27;Click to edit name&#x27;;
    };
    input.addEventListener(&#x27;blur&#x27;, commit);
    input.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
      if (e.key === &#x27;Enter&#x27;) input.blur();
      if (e.key === &#x27;Escape&#x27;) {
        input.value = prev;
        input.blur();
      }
    });
  }

  function updateRowDisplay(row, student) {
    const results = processStudentGrades(student);
    const scaledStr = results.scaledMcq !== null ? results.scaledMcq.toFixed(1) : &#x27;-&#x27;;
    const rawStr = results.rawScore !== null ? results.rawScore.toFixed(1) : &#x27;-&#x27;;
    const rawPctStr = results.rawPct !== null ? results.rawPct.toFixed(1) + &#x27;%&#x27; : &#x27;-&#x27;;
    const curveStr = results.curve !== null ? results.curve.toFixed(1) + &#x27;%&#x27; : results.curveError ? &#x27;#ERR&#x27; : &#x27;-&#x27;;
    const cells = row.querySelectorAll(&#x27;td&#x27;);
    cells[4].textContent = scaledStr;
    cells[5].textContent = rawStr;
    cells[6].textContent = rawPctStr;
    cells[7].textContent = curveStr;
    cells[7].className = results.curveError ? &#x27;curve-error&#x27; : &#x27;calculated highlight-score&#x27;;
    cells[7].title = results.curveError || &#x27;&#x27;;
  }

  function showModal() {
    modal.classList.add(&#x27;show&#x27;);
    newStudentNameInput.value = &#x27;&#x27;;
    setTimeout(() =&gt; newStudentNameInput.focus(), 40);
  }

  function hideModal() {
    modal.classList.remove(&#x27;show&#x27;);
  }

  function handleAddStudent() {
    const name = newStudentNameInput.value.trim();
    if (name) {
      const state = appData[currentClass];
      state.students.push({ id: generateId(), name, mcq: &#x27;&#x27;, frq: &#x27;&#x27; });
      saveData();
      renderTable();
      hideModal();
    }
  }

  function escapeCsvField(val) {
    return `&quot;${String(val).replace(/&quot;/g, &#x27;&quot;&quot;&#x27;)}&quot;`;
  }

  function getClassLabel() {
    return appData[currentClass]?.label || currentClass;
  }

  function currentDateTimeIso() {
    return new Date().toISOString();
  }

  function formatDateForFile(dateIso) {
    return String(dateIso || &#x27;&#x27;).replace(/[:.]/g, &#x27;-&#x27;);
  }

  function buildAssignmentRows(assignmentName, savedAtIso) {
    const state = appData[currentClass];
    return state.students.map(student =&gt; {
      const r = processStudentGrades(student);
      return {
        classLabel: getClassLabel(),
        assignmentName,
        savedAtIso,
        studentName: student.name,
        mcq: student.mcq || &#x27;&#x27;,
        frq: student.frq || &#x27;&#x27;,
        scaledMcq: r.scaledMcq !== null ? r.scaledMcq.toFixed(1) : &#x27;&#x27;,
        rawScore: r.rawScore !== null ? r.rawScore.toFixed(1) : &#x27;&#x27;,
        rawPct: r.rawPct !== null ? r.rawPct.toFixed(1) : &#x27;&#x27;,
        curvedScore: r.curve !== null ? r.curve.toFixed(1) : &#x27;&#x27;,
        formula: state.settings.formula || &#x27;=RAW_PCT&#x27;
      };
    });
  }

  function saveAssignmentSnapshot() {
    const assignmentName = assignmentNameInput.value.trim();
    if (!assignmentName) {
      saveStatus.textContent = &#x27;Enter assignment name first&#x27;;
      saveStatus.style.color = &#x27;#fda4af&#x27;;
      assignmentNameInput.focus();
      return;
    }
    const savedAtIso = currentDateTimeIso();
    const snapshotRows = buildAssignmentRows(assignmentName, savedAtIso);
    if (!appData[currentClass].assignments) appData[currentClass].assignments = [];
    appData[currentClass].assignments.push({
      id: generateId(),
      assignmentName,
      savedAtIso,
      rows: snapshotRows
    });
    saveData();
    exportToCSV();
    saveStatus.textContent = `Saved &quot;${assignmentName}&quot; at ${new Date(savedAtIso).toLocaleString()}`;
    saveStatus.style.color = &#x27;#86efac&#x27;;
  }

  function exportToCSV() {
    const rows = [[&#x27;Class Name&#x27;, &#x27;Assignment Name&#x27;, &#x27;Saved At&#x27;, &#x27;Student Name&#x27;, &#x27;MCQ Score&#x27;, &#x27;FRQ Score&#x27;, &#x27;Scaled MCQ&#x27;, &#x27;Raw Score&#x27;, &#x27;Raw %&#x27;, &#x27;Curved Score (%)&#x27;, &#x27;Formula&#x27;]];
    const state = appData[currentClass];
    const assignments = Array.isArray(state.assignments) ? state.assignments : [];
    assignments.forEach(record =&gt; {
      (record.rows || []).forEach(row =&gt; {
        rows.push([
          row.classLabel || getClassLabel(),
          row.assignmentName || &#x27;&#x27;,
          row.savedAtIso || &#x27;&#x27;,
          row.studentName || &#x27;&#x27;,
          row.mcq || &#x27;&#x27;,
          row.frq || &#x27;&#x27;,
          row.scaledMcq || &#x27;&#x27;,
          row.rawScore || &#x27;&#x27;,
          row.rawPct || &#x27;&#x27;,
          row.curvedScore || &#x27;&#x27;,
          row.formula || &#x27;&#x27;
        ]);
      });
    });
    if (rows.length === 1) {
      saveStatus.textContent = &#x27;No saved assignments yet. Click Save Assignment first.&#x27;;
      saveStatus.style.color = &#x27;#fda4af&#x27;;
      return;
    }
    const csvContent = rows.map(r =&gt; r.map(escapeCsvField).join(&#x27;,&#x27;)).join(&#x27;\n&#x27;);
    const blob = new Blob([csvContent], { type: &#x27;text/csv;charset=utf-8;&#x27; });
    const url = URL.createObjectURL(blob);
    const link = document.createElement(&#x27;a&#x27;);
    link.href = url;
    const latestDate = assignments.length ? assignments[assignments.length - 1].savedAtIso : currentDateTimeIso();
    link.download = `Formula_Curves_${getClassLabel().replace(/[^\w-]+/g, &#x27;_&#x27;)}_${formatDateForFile(latestDate)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }
});
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
</div>

<script>
const tabBar = document.querySelector('.tab-bar');
const appHeader = document.querySelector('.app-header-container');
const topHoverZone = document.getElementById('topHoverZone');
const headerToggleBtn = document.getElementById('headerToggleBtn');
const TAB_ORDER_STORAGE_KEY = 'teacher-pro-tab-order-v1';
const HEADER_COLLAPSED_STORAGE_KEY = 'teacher-pro-header-collapsed-v1';
let isHeaderCollapsed = false;
let hoverCloseTimer = null;

function getTabButtons() {
  return Array.from(document.querySelectorAll('.tab-btn'));
}

function getTabOrder() {
  return getTabButtons().map(btn => btn.dataset.tabId);
}

function saveTabOrder() {
  localStorage.setItem(TAB_ORDER_STORAGE_KEY, JSON.stringify(getTabOrder()));
}

function applySavedTabOrder() {
  const saved = localStorage.getItem(TAB_ORDER_STORAGE_KEY);
  if (!saved) return;
  let order;
  try {
    order = JSON.parse(saved);
  } catch {
    return;
  }
  if (!Array.isArray(order)) return;

  const buttonsById = new Map(getTabButtons().map(btn => [btn.dataset.tabId, btn]));
  order.forEach(tabId => {
    const btn = buttonsById.get(tabId);
    if (btn) tabBar.appendChild(btn);
  });

  getTabButtons().forEach(btn => {
    if (!order.includes(btn.dataset.tabId)) {
      tabBar.appendChild(btn);
    }
  });
}

function switchTab(tabId) {
  getTabButtons().forEach(el => el.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(el => el.classList.remove('active'));

  const btn = tabBar.querySelector(`[data-tab-id="${tabId}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('frame-' + tabId).classList.add('active');
}

function notifyEmbeddedAppsResize() {
  window.dispatchEvent(new Event('resize'));
  document.querySelectorAll('iframe').forEach(frame => {
    try {
      frame.contentWindow.dispatchEvent(new Event('resize'));
    } catch {}
  });
}

function setHeaderCollapsed(collapsed, persist = true) {
  isHeaderCollapsed = collapsed;
  document.body.classList.toggle('header-collapsed', collapsed);
  if (!collapsed) document.body.classList.remove('header-hover-open');
  headerToggleBtn.textContent = collapsed ? '▾' : '▴';
  headerToggleBtn.setAttribute('aria-expanded', String(!collapsed));
  if (persist) localStorage.setItem(HEADER_COLLAPSED_STORAGE_KEY, collapsed ? '1' : '0');
  notifyEmbeddedAppsResize();
}

function setHeaderHoverOpen(open) {
  if (!isHeaderCollapsed) return;
  document.body.classList.toggle('header-hover-open', open);
  notifyEmbeddedAppsResize();
}

function clearHoverCloseTimer() {
  if (!hoverCloseTimer) return;
  clearTimeout(hoverCloseTimer);
  hoverCloseTimer = null;
}

function queueHeaderHoverClose() {
  if (!isHeaderCollapsed) return;
  clearHoverCloseTimer();
  hoverCloseTimer = setTimeout(() => {
    setHeaderHoverOpen(false);
  }, 220);
}

function initHeaderControls() {
  setHeaderCollapsed(localStorage.getItem(HEADER_COLLAPSED_STORAGE_KEY) === '1', false);
  headerToggleBtn.addEventListener('click', () => {
    clearHoverCloseTimer();
    setHeaderCollapsed(!isHeaderCollapsed, true);
  });
  topHoverZone.addEventListener('mouseenter', () => {
    clearHoverCloseTimer();
    setHeaderHoverOpen(true);
  });
  topHoverZone.addEventListener('mouseleave', () => {
    queueHeaderHoverClose();
  });
  appHeader.addEventListener('mouseenter', () => {
    clearHoverCloseTimer();
    if (isHeaderCollapsed) setHeaderHoverOpen(true);
  });
  appHeader.addEventListener('mouseleave', () => {
    queueHeaderHoverClose();
  });
}

let draggedButton = null;

function initTabReordering() {
  getTabButtons().forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tabId));
    btn.addEventListener('dragstart', (event) => {
      draggedButton = btn;
      event.dataTransfer.effectAllowed = 'move';
    });
    btn.addEventListener('dragover', (event) => {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
    });
    btn.addEventListener('drop', (event) => {
      event.preventDefault();
      if (!draggedButton || draggedButton === btn) return;

      const rect = btn.getBoundingClientRect();
      const dropBefore = event.clientX < rect.left + rect.width / 2;
      if (dropBefore) {
        tabBar.insertBefore(draggedButton, btn);
      } else {
        tabBar.insertBefore(draggedButton, btn.nextSibling);
      }
      saveTabOrder();
    });
    btn.addEventListener('dragend', () => {
      draggedButton = null;
    });
  });
}

applySavedTabOrder();
initTabReordering();
initHeaderControls();
</script>
