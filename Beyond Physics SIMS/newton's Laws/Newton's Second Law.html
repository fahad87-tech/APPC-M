    <script>
// Password protection (works even if body not yet parsed)
const TARGET_HASH = "596a81d15423beb932e31857b7c2f4296e4a885a94edfdadfc7cbeb4fc3289e4";
document.documentElement.classList.add("password-locked");

// Inject gate CSS
const style = document.createElement("style");
style.textContent = `
  html.password-locked body { overflow: hidden; }
  html.password-locked body > * { visibility: hidden; }
  #password-gate {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5, 9, 18, 0.88);
    padding: 24px;
    z-index: 9999;
    visibility: hidden;
  }
  html.password-locked #password-gate { visibility: visible; }
  #password-gate-card {
    width: min(100%, 420px);
    background: #101625;
    border: 1px solid rgba(100,181,246,0.28);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    color: #e7edf7;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #password-gate-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  #password-gate-message { font-size: 14px; color: rgba(255,255,255,0.72); margin-bottom: 16px; line-height: 1.5; }
  #password-gate-input {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(100,181,246,0.35);
    background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 16px;
  }
  #password-gate-input:focus { border-color: #64b5f6; box-shadow: 0 0 0 3px rgba(100,181,246,0.16); }
  #password-gate-actions { display: flex; justify-content: flex-end; gap: 10px; }
  .password-gate-button { border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
  #password-gate-cancel { background: rgba(255,255,255,0.08); color: #d9e2f2; }
  #password-gate-submit { background: #64b5f6; color: #08101c; }
`;
document.head.appendChild(style);

// Show gate and handle verification
function showGate() {
  return new Promise(resolve => {
    const existing = document.getElementById("password-gate");
    if (existing) { existing.remove(); }
    const gate = document.createElement("div");
    gate.id = "password-gate";
    gate.innerHTML = `
      <div id="password-gate-card">
        <div id="password-gate-title">Simulation Access</div>
        <div id="password-gate-message">Classroom password required for this simulation:</div>
        <input id="password-gate-input" type="password" autocomplete="current-password">
        <div id="password-gate-actions">
          <button id="password-gate-cancel" class="password-gate-button" type="button">Cancel</button>
          <button id="password-gate-submit" class="password-gate-button" type="button">Unlock</button>
        </div>
      </div>`;
    // Append to body if available, else to html (head already has CSS)
    const parent = document.body || document.documentElement;
    parent.appendChild(gate);
    const input = document.getElementById("password-gate-input");
    const cancel = document.getElementById("password-gate-cancel");
    const submit = document.getElementById("password-gate-submit");
    const finish = v => { gate.remove(); resolve(v); };
    cancel.addEventListener("click", () => finish(null));
    submit.addEventListener("click", () => finish(input.value));
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") finish(input.value);
      if (e.key === "Escape") finish(null);
    });
    input.focus();
  });
}

async function verifyPageAccess() {
  const userInput = await showGate();
  if (userInput === null) {
    window.location.href = "../index.html";
    return;
  }
  const encoder = new TextEncoder();
  const data = encoder.encode(userInput);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
  if (hashHex === TARGET_HASH) {
    document.documentElement.classList.remove("password-locked");
  } else {
    alert("Incorrect password. Access denied.");
    window.location.href = "../index.html";
  }
}

// Run as soon as possible
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", verifyPageAccess, { once: true });
} else {
  verifyPageAccess();
}
    </script>
