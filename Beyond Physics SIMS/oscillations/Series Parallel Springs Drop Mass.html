<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Physics: Advanced SHM Laboratory</title>
    <script>
        const TARGET_HASH = "596a81d15423beb932e31857b7c2f4296e4a885a94edfdadfc7cbeb4fc3289e4";

        document.documentElement.classList.add("password-locked");

        const passwordGateStyle = document.createElement("style");
        passwordGateStyle.textContent = `
            html.password-locked body { overflow: hidden; }
            html.password-locked body > * { visibility: hidden; }
            #password-gate {
                position: fixed;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                background: rgba(5, 9, 18, 0.88);
                padding: 24px;
                z-index: 9999;
            }
            html.password-locked #password-gate { display: flex; visibility: visible; }
            #password-gate-card {
                width: min(100%, 420px);
                background: #101625;
                border: 1px solid rgba(100,181,246,0.28);
                border-radius: 18px;
                padding: 24px;
                box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
                color: #e7edf7;
                font-family: 'Segoe UI', Arial, sans-serif;
            }
            #password-gate-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
            #password-gate-message { font-size: 14px; color: rgba(255,255,255,0.72); margin-bottom: 16px; line-height: 1.5; }
            #password-gate-input {
                width: 100%;
                padding: 12px 14px;
                border-radius: 12px;
                border: 1px solid rgba(100,181,246,0.35);
                background: rgba(255,255,255,0.05);
                color: #fff;
                font-size: 16px;
                outline: none;
                margin-bottom: 16px;
                box-sizing: border-box;
            }
            #password-gate-input:focus {
                border-color: #64b5f6;
                box-shadow: 0 0 0 3px rgba(100,181,246,0.16);
            }
            #password-gate-actions { display: flex; justify-content: flex-end; gap: 10px; }
            .password-gate-button {
                border: none;
                border-radius: 10px;
                padding: 10px 16px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }
            #password-gate-cancel { background: rgba(255,255,255,0.08); color: #d9e2f2; }
            #password-gate-submit { background: #64b5f6; color: #08101c; }
        `;
        document.head.appendChild(passwordGateStyle);

        function requestPassword(title, message) {
            return new Promise(resolve => {
                const existingGate = document.getElementById("password-gate");
                if (existingGate) existingGate.remove();
                const gate = document.createElement("div");
                gate.id = "password-gate";
                gate.innerHTML = `
                    <div id="password-gate-card">
                        <div id="password-gate-title">${title}</div>
                        <div id="password-gate-message">${message}</div>
                        <input id="password-gate-input" type="password" autocomplete="current-password">
                        <div id="password-gate-actions">
                            <button id="password-gate-cancel" class="password-gate-button" type="button">Cancel</button>
                            <button id="password-gate-submit" class="password-gate-button" type="button">Unlock</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(gate);
                const input = document.getElementById("password-gate-input");
                const cancelButton = document.getElementById("password-gate-cancel");
                const submitButton = document.getElementById("password-gate-submit");
                const finish = value => { gate.remove(); resolve(value); };
                cancelButton.addEventListener("click", () => finish(null));
                submitButton.addEventListener("click", () => finish(input.value));
                input.addEventListener("keydown", event => {
                    if (event.key === "Enter") finish(input.value);
                    if (event.key === "Escape") finish(null);
                });
                window.requestAnimationFrame(() => input.focus());
            });
        }

        async function verifyPageAccess() {
            const userInput = await requestPassword("Simulation Access", "Classroom password required for this simulation:");
            if (userInput === null) { window.location.href = "../index.html"; return; }
            const encoder = new TextEncoder();
            const data = encoder.encode(userInput);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
            if (hashHex === TARGET_HASH) {
                document.documentElement.classList.remove("password-locked");
            } else {
                alert("Incorrect password. Access denied.");
                window.location.href = "../index.html";
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", verifyPageAccess, { once: true });
        } else {
            verifyPageAccess();
        }
    </script>

<script>
/* ==========================================
   1. PHYSICS ENGINE (Fixed Timestep)
   ========================================== */
class PhysicsEngine {
    constructor() {
        this.isRunning = true;
        this.resetParams();
    }

    resetParams() {
        this.baseMass = parseFloat(document.getElementById('in-m').value);
        this.dropMass = parseFloat(document.getElementById('in-q').value);
        this.k_base = parseFloat(document.getElementById('in-k').value);
        this.config = document.getElementById('k-config').value;
        this.frictionC = parseFloat(document.getElementById('in-fric').value);
        this.initialA = parseFloat(document.getElementById('in-a0').value);
        
        this.m_current = this.baseMass;
        this.x = this.initialA; 
        this.v = 0;
        this.a = 0;
        this.F = 0;
        
        this.dropArmedEq = false;
        this.dropArmedAmp = false;
        this.hasDropped = false;
        this.dropAnimY = -200; // Starting height for drop animation
        
        this.calcKeq();
        this.calculateForces(); // Initial force calc before step 1
    }

    calcKeq() {
        if (this.config === 'single') this.k_eq = this.k_base;
        else if (this.config === 'parallel') this.k_eq = this.k_base * 2;
        else if (this.config === 'series') this.k_eq = this.k_base / 2;
    }

    armEq() { if(!this.hasDropped) { this.dropArmedEq = true; this.dropArmedAmp = false; this.dropAnimY = -200; } }
    armAmp() { if(!this.hasDropped) { this.dropArmedAmp = true; this.dropArmedEq = false; this.dropAnimY = -200; } }

    calculateForces() {
        this.a = (-(this.k_eq * this.x) - (this.frictionC * this.v)) / this.m_current;
        this.F = this.a * this.m_current;
    }

    step(dt) {
        if (!this.isRunning) return;

        const x_old = this.x;
        const v_old = this.v;

        // Semi-Implicit Euler with friction
        this.calculateForces();
        this.v += this.a * dt;
        this.x += this.v * dt;

        // Visual animation of drop mass falling before impact
        if(this.dropArmedEq || this.dropArmedAmp) {
            this.dropAnimY += 600 * dt; // Fall speed
            if (this.dropAnimY > 10) this.dropAnimY = 10; // Stop just above block
        }

        // Collision Detection Logic
        if ((this.dropArmedEq || this.dropArmedAmp) && !this.hasDropped) {
            let trigger = false;

            if (this.dropArmedEq) {
                // Check if crossing zero
                if (x_old * this.x <= 0) { trigger = true; this.x = 0; }
            } else if (this.dropArmedAmp) {
                // Check if velocity reverses direction
                if (v_old * this.v <= 0) { trigger = true; this.v = 0; }
            }

            if (trigger) {
                // Conservation of Momentum: m_old * v_old = (m_old + m_drop) * v_new
                const v_new = this.v * (this.m_current / (this.m_current + this.dropMass));
                this.v = v_new;
                this.m_current += this.dropMass;
                this.dropArmedEq = false;
                this.dropArmedAmp = false;
                this.hasDropped = true;
            }
        }
    }

    getTelemetry() {
        const KE = 0.5 * this.m_current * (this.v * this.v);
        const PE = 0.5 * this.k_eq * (this.x * this.x);
        return { x: this.x, KE, PE };
    }
}

/* ==========================================
   2. RENDERER
   ========================================== */
class Renderer {
    constructor(canvas, engine) {
        this.canvas = canvas; this.ctx = canvas.getContext('2d');
        this.engine = engine; this.scale = 50; 
        this.wallX = 440; // Avoid left panel
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight;
        this.surfaceY = this.canvas.height / 2 + 80;
        this.eqX = this.canvas.width / 2 + 50; 
    }

    drawSpring(startX, endX, yOffset, isSeriesConnector = false) {
        const ctx = this.ctx; ctx.beginPath(); ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
        if (isSeriesConnector) {
            ctx.fillStyle = '#666'; ctx.fillRect(startX - 5, yOffset - 10, 10, 20); return;
        }
        const coils = 15; const coilWidth = (endX - startX) / coils; const amplitude = 18;
        ctx.moveTo(startX, yOffset);
        for (let i = 1; i <= coils; i++) {
            const px = startX + i * coilWidth - (coilWidth / 2);
            const py = yOffset + (i % 2 === 0 ? amplitude : -amplitude);
            ctx.lineTo(px, py);
        }
        ctx.lineTo(endX, yOffset); ctx.stroke();
    }

    drawArrow(fromX, fromY, toX, toY, color, label) {
        const ctx = this.ctx;
        const headlen = 8;
        const dx = toX - fromX; const dy = toY - fromY;
        const angle = Math.atan2(dy, dx);
        
        ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5;
        ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.stroke();
        
        ctx.fillStyle = color; ctx.font = 'bold 14px sans-serif';
        ctx.fillText(label, toX + (dx > 0 ? 8 : -20), toY - 8);
    }

    render() {
        const ctx = this.ctx;
        ctx.fillStyle = this.engine.isRunning ? '#050508' : '#0a0a0f'; 
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Prominent Equilibrium Line
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath(); ctx.moveTo(this.eqX, this.surfaceY - 200); ctx.lineTo(this.eqX, this.surfaceY + 50); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '14px monospace'; ctx.textAlign = 'center';
        ctx.fillText('Equilibrium (x=0)', this.eqX, this.surfaceY + 30);

        // Surface & Friction Indicator
        if(this.engine.frictionC > 0) {
            ctx.fillStyle = `rgba(255, 100, 50, ${Math.min(0.3, this.engine.frictionC * 0.1)})`;
            ctx.fillRect(this.wallX, this.surfaceY, this.canvas.width, 20);
            ctx.fillStyle = 'rgba(255, 100, 50, 0.5)'; ctx.textAlign = 'left';
            ctx.fillText(`Friction c = ${this.engine.frictionC}`, this.eqX + 10, this.surfaceY + 15);
        } else {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(this.wallX, this.surfaceY, this.canvas.width, 2);
        }

        // Wall
        ctx.fillStyle = '#111'; ctx.fillRect(0, this.surfaceY - 300, this.wallX, 350);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(this.wallX, this.surfaceY - 300); ctx.lineTo(this.wallX, this.surfaceY+50); ctx.stroke();

        const blockX = this.eqX + (this.engine.x * this.scale);
        const baseSize = 60 + (this.engine.baseMass * 5); 
        const attachY = this.surfaceY - baseSize/2;
        
        // Draw Springs
        if (this.engine.config === 'single') {
            this.drawSpring(this.wallX, blockX - baseSize/2, attachY);
        } else if (this.engine.config === 'parallel') {
            this.drawSpring(this.wallX, blockX - baseSize/2, attachY - 15);
            this.drawSpring(this.wallX, blockX - baseSize/2, attachY + 15);
        } else if (this.engine.config === 'series') {
            const midX = this.wallX + (blockX - baseSize/2 - this.wallX) / 2;
            this.drawSpring(this.wallX, midX, attachY);
            this.drawSpring(midX, midX, attachY, true);
            this.drawSpring(midX, blockX - baseSize/2, attachY);
        }

        // Base Mass
        ctx.fillStyle = 'rgba(0, 229, 255, 0.2)'; ctx.strokeStyle = '#00E5FF'; ctx.lineWidth = 2;
        ctx.fillRect(blockX - baseSize/2, this.surfaceY - baseSize, baseSize, baseSize);
        ctx.strokeRect(blockX - baseSize/2, this.surfaceY - baseSize, baseSize, baseSize);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(`${this.engine.baseMass} kg`, blockX, this.surfaceY - baseSize/2 + 5);

        // Physics Vectors Toggle
        if (document.getElementById('tog-vectors').checked) {
            const cY = this.surfaceY - baseSize/2;
            
            // Force (F) - Red (Scaled visually)
            if (Math.abs(this.engine.F) > 0.5) {
                this.drawArrow(blockX, cY + 20, blockX + this.engine.F * 0.8, cY + 20, '#FF3B30', 'F');
            }
            // Acceleration (a) - Yellow
            if (Math.abs(this.engine.a) > 0.5) {
                this.drawArrow(blockX, cY, blockX + this.engine.a * 2.5, cY, '#FFCC00', 'a');
            }
            // Velocity (v) - Cyan
            if (Math.abs(this.engine.v) > 0.5) {
                this.drawArrow(blockX, cY - 20, blockX + this.engine.v * 10, cY - 20, '#00E5FF', 'v');
            }
        }

        // Drop Mass Visualization
        const dropSize = 40 + (this.engine.dropMass * 3);
        
        if (this.engine.hasDropped) {
            // Stacked on top
            ctx.fillStyle = 'rgba(255, 59, 48, 0.4)'; ctx.strokeStyle = '#FF3B30';
            ctx.fillRect(blockX - dropSize/2, this.surfaceY - baseSize - dropSize, dropSize, dropSize);
            ctx.strokeRect(blockX - dropSize/2, this.surfaceY - baseSize - dropSize, dropSize, dropSize);
            ctx.fillStyle = '#fff'; ctx.fillText(`+${this.engine.dropMass} kg`, blockX, this.surfaceY - baseSize - dropSize/2 + 5);
        } else if (this.engine.dropArmedEq || this.engine.dropArmedAmp) {
            // Falling from top of screen tracking target
            let targetX = this.engine.dropArmedEq ? this.eqX : blockX;
            let currentY = this.surfaceY - baseSize - dropSize - 40 + this.engine.dropAnimY;
            
            // Limit Y so it doesn't go through block
            if (currentY > this.surfaceY - baseSize - dropSize - 5) currentY = this.surfaceY - baseSize - dropSize - 5;

            ctx.fillStyle = 'rgba(255, 59, 48, 0.8)'; ctx.strokeStyle = '#FF3B30';
            ctx.fillRect(targetX - dropSize/2, currentY, dropSize, dropSize);
            ctx.strokeRect(targetX - dropSize/2, currentY, dropSize, dropSize);
            ctx.fillStyle = '#fff'; ctx.fillText(`FALLING`, targetX, currentY + dropSize/2 + 5);
        }
    }
}

/* ==========================================
   3. TRIPLE GRAPH MANAGER (Chart.js)
   ========================================== */
class GraphManager {
    constructor() {
        Chart.defaults.color = '#778';
        Chart.defaults.font.family = '-apple-system, sans-serif';
        
        this.maxPoints = 120; 
        this.updateCounter = 0;

        const commonOptions = (title, yLabel) => ({
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { 
                legend: { display: false },
                title: { display: true, text: title, color: '#f0f0f5', font: {size: 11}, padding: {top: 2, bottom: 2} }
            },
            elements: { point: { radius: 0 }, line: { tension: 0.4 } }, 
            scales: {
                x: { display: true, title: {display: true, text: 'Time (s)', color: '#556'}, grid: {display: false}, ticks: {display: false} },
                y: { display: true, title: {display: true, text: yLabel, color: '#556'}, grid: { color: 'rgba(255,255,255,0.05)' }, grace: '5%' }
            }
        });

        this.dispChart = new Chart(document.getElementById('dispChart').getContext('2d'), {
            type: 'line', data: { labels: Array(this.maxPoints).fill(''), datasets: [{ borderColor: '#00E5FF', data: Array(this.maxPoints).fill(0), borderWidth: 2.5 }] },
            options: commonOptions('Displacement (x)', 'Meters (m)')
        });

        this.keChart = new Chart(document.getElementById('keChart').getContext('2d'), {
            type: 'line', data: { labels: Array(this.maxPoints).fill(''), datasets: [{ borderColor: '#FF3B30', data: Array(this.maxPoints).fill(0), borderWidth: 2.5 }] },
            options: commonOptions('Kinetic Energy (KE)', 'Joules (J)')
        });

        this.peChart = new Chart(document.getElementById('peChart').getContext('2d'), {
            type: 'line', data: { labels: Array(this.maxPoints).fill(''), datasets: [{ borderColor: '#32d74b', data: Array(this.maxPoints).fill(0), borderWidth: 2.5 }] },
            options: commonOptions('Potential Energy (PE)', 'Joules (J)')
        });
    }

    reset() {
        [this.dispChart, this.keChart, this.peChart].forEach(chart => {
            chart.data.datasets[0].data = Array(this.maxPoints).fill(0);
            chart.update('none');
        });
    }

    update(data, isRunning) {
        if (!isRunning) return; 
        
        // Push data to chart every 2nd frame for higher visual fidelity (prevents aliasing)
        if (this.updateCounter++ % 2 !== 0) return; 

        this.dispChart.data.datasets[0].data.shift(); this.dispChart.data.datasets[0].data.push(data.x);
        this.keChart.data.datasets[0].data.shift(); this.keChart.data.datasets[0].data.push(data.KE);
        this.peChart.data.datasets[0].data.shift(); this.peChart.data.datasets[0].data.push(data.PE);

        this.dispChart.update('none'); this.keChart.update('none'); this.peChart.update('none');
    }
}

class InquiryStateManager {
    constructor() {
        this.idx = 0; this.answers = Array(10).fill("");
        this.load(); this.bindEvents(); this.render();
    }
    load() { const saved = localStorage.getItem('shm_v6_answers'); if (saved) this.answers = JSON.parse(saved); }
    save() {
        localStorage.setItem('shm_v6_answers', JSON.stringify(this.answers));
        const status = document.getElementById('status-msg'); status.innerText = "Autosaved ✓";
        clearTimeout(this.msgTimer); this.msgTimer = setTimeout(() => status.innerText = "", 2000);
    }
    bindEvents() {
        document.getElementById('qa-answer').addEventListener('input', (e) => { this.answers[this.idx] = e.target.value; this.save(); });
        document.getElementById('btn-prev').onclick = () => { if (this.idx > 0) { this.idx--; this.render(); } };
        document.getElementById('btn-next').onclick = () => { if (this.idx < 9) { this.idx++; this.render(); } };
        document.getElementById('btn-export').onclick = () => this.exportDOCX();
    }
    render() {
        const p = prompts[this.idx];
        document.getElementById('qa-stage').innerText = `[${p.stage}]`;
        document.getElementById('qa-counter').innerText = `Prompt ${this.idx + 1} of 10`;
        document.getElementById('qa-question').innerText = p.q;
        document.getElementById('qa-answer').value = this.answers[this.idx];
    }
    async exportDOCX() {
        const name = prompt("Enter Student Name for the Lab Report:"); if (!name) return;
        const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;
        const children = [
            new Paragraph({ text: "AP Physics: SHM & Momentum Lab Report", heading: HeadingLevel.HEADING_1 }),
            new Paragraph({ text: `Student Name: ${name}` }), new Paragraph({ text: `Date: ${new Date().toLocaleString()}\n` })
        ];
        prompts.forEach((p, i) => {
            children.push(new Paragraph({ text: `[${p.stage}] Prompt ${i + 1}:`, heading: HeadingLevel.HEADING_2 }));
            children.push(new Paragraph({ children: [new TextRun({ text: p.q, italics: true })] }));
            children.push(new Paragraph({ text: this.answers[i] || "(No Answer)" })); children.push(new Paragraph({ text: "" }));
        });
        const doc = new Document({ sections: [{ properties: {}, children: children }] });
        try { const blob = await Packer.toBlob(doc); saveAs(blob, `${name.replace(/\s+/g, '_')}_SHM_Lab.docx`); } 
        catch (err) { alert("Export failed. See console."); console.error(err); }
    }
}

// Fixed Timestep Loop for Perfect Sinusoids
let lastTime = performance.now();
let dtAccumulator = 0;
const fixedDt = 1 / 120; // 120Hz physics step

function loop(currentTime) {
    let frameTime = (currentTime - lastTime) / 1000;
    if (frameTime > 0.1) frameTime = 0.1; // Prevent massive jumps
    lastTime = currentTime;

    if (engine.isRunning) {
        dtAccumulator += frameTime;
        while (dtAccumulator >= fixedDt) {
            engine.step(fixedDt);
            dtAccumulator -= fixedDt;
        }
        graph.update(engine.getTelemetry(), engine.isRunning);
    }
    
    renderer.render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ==========================================
TEACHER GRADING RUBRIC
=============================================
1. [Engage] KE is max at equilibrium (x=0) because velocity is highest. PE is max at the turning points (amplitude) because displacement x is highest.
2. [Engage] Exponential decay. The amplitude decreases exponentially over time due to the viscous damping force (friction) being proportional to velocity.
3. [Explore] Amplitude decreases instantly. The inelastic collision at max velocity loses kinetic energy. Since total energy drops, it cannot reach the same potential energy (amplitude) again.
4. [Explore] Amplitude does NOT change. Because velocity was zero at the turning point, dropping mass adds zero momentum. No kinetic energy is lost.
5. [Explain] p_i = p_f. If dropped at eq, m*v_max = (m+drop)*v_new. Velocity must drop. If dropped at amp, m*(0) = (m+drop)*v_new. Velocity remains 0. 
6. [Explain] E_total = ½mv² + ½kx². At equilibrium, x=0, so E_total = ½mv². Since v drops (and mass increases), the new E_total is lower. Since E_total also equals ½kA², a lower E_total means A must be smaller.
7. [Elaborate] Period T depends ONLY on mass and k. Since final mass is the same in both scenarios (m + dropMass), the new period is identical regardless of *where* the mass was dropped.
8. [Elaborate] Parallel springs double the k (2k). Since T = 2π√(m/k), doubling k decreases the period (it oscillates faster).
9. [Evaluate] False. The collision is inelastic. The "missing" energy was converted to internal energy (heat/deformation) when the blocks collided at equilibrium. If dropped at amplitude, energy stays exactly the same, it does not increase.
10. [Evaluate] Without damping (friction), the car would continue to oscillate back and forth indefinitely after hitting a bump, perfectly conserving its mechanical energy.
============================================= */
