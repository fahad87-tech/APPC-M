<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angular Momentum — Ball ↔ Rod Collision</title>
<script>
  const TARGET_HASH = "596a81d15423beb932e31857b7c2f4296e4a885a94edfdadfc7cbeb4fc3289e4";

  document.documentElement.classList.add("password-locked");

  const passwordGateStyle = document.createElement("style");
  passwordGateStyle.textContent = `
    html.password-locked body { overflow: hidden; }
    html.password-locked body > * { visibility: hidden; }
    #password-gate {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 9, 18, 0.88);
      padding: 24px;
      z-index: 9999;
    }
    html.password-locked #password-gate { display: flex; visibility: visible; }
    #password-gate-card {
      width: min(100%, 420px);
      background: #101625;
      border: 1px solid rgba(100,181,246,0.28);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      color: #e7edf7;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #password-gate-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    #password-gate-message {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    #password-gate-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(100,181,246,0.35);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
    }
    #password-gate-input:focus {
      border-color: #64b5f6;
      box-shadow: 0 0 0 3px rgba(100,181,246,0.16);
    }
    #password-gate-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .password-gate-button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #password-gate-cancel {
      background: rgba(255,255,255,0.08);
      color: #d9e2f2;
    }
    #password-gate-submit {
      background: #64b5f6;
      color: #08101c;
    }
  `;
  document.head.appendChild(passwordGateStyle);

  function requestPassword(title, message) {
    return new Promise(resolve => {
      const existingGate = document.getElementById("password-gate");
      if (existingGate) existingGate.remove();

      const gate = document.createElement("div");
      gate.id = "password-gate";
      gate.innerHTML = `
        <div id="password-gate-card">
          <div id="password-gate-title">${title}</div>
          <div id="password-gate-message">${message}</div>
          <input id="password-gate-input" type="password" autocomplete="current-password">
          <div id="password-gate-actions">
            <button id="password-gate-cancel" class="password-gate-button" type="button">Cancel</button>
            <button id="password-gate-submit" class="password-gate-button" type="button">Unlock</button>
          </div>
        </div>
      `;
      document.body.appendChild(gate);

      const input = document.getElementById("password-gate-input");
      const cancelButton = document.getElementById("password-gate-cancel");
      const submitButton = document.getElementById("password-gate-submit");

      const finish = value => {
        gate.remove();
        resolve(value);
      };

      cancelButton.addEventListener("click", () => finish(null));
      submitButton.addEventListener("click", () => finish(input.value));
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") finish(input.value);
        if (event.key === "Escape") finish(null);
      });

      window.requestAnimationFrame(() => input.focus());
    });
  }

  async function verifyPageAccess() {
    const userInput = await requestPassword("Simulation Access", "Classroom password required for this simulation:");

    if (userInput === null) {
      window.location.href = "../index.html";
      return;
    }

    const encoder = new TextEncoder();
    const data = encoder.encode(userInput);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

    if (hashHex === TARGET_HASH) {
      document.documentElement.classList.remove("password-locked");
    } else {
      alert("Incorrect password. Access denied.");
      window.location.href = "../index.html";
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", verifyPageAccess, { once: true });
  } else {
    verifyPageAccess();
  }
</script>
<script>
  const WASM_PATH = "123_core_bg.wasm";
  let wasmModule = null;
  let wasmReady = false;
  async function loadSimWasm() {
    try {
      const res = await fetch(WASM_PATH);
      if (!res.ok) return;
      const bytes = await res.arrayBuffer();
      const mod = await WebAssembly.instantiate(bytes, {});
      wasmModule = mod.instance.exports;
      wasmReady = true;
    } catch (e) {
      wasmReady = false;
    }
  }
  loadSimWasm();
  window.simWasm = {
    ready: () => wasmReady,
    init: (...args) => wasmReady && wasmModule.init ? wasmModule.init(...args) : null,
    setParams: (...args) => wasmReady && wasmModule.set_params ? wasmModule.set_params(...args) : null,
    step: (dt, n) => wasmReady && wasmModule.step ? wasmModule.step(dt, n) : false,
    getStatePtr: () => wasmReady && wasmModule.get_state_ptr ? wasmModule.get_state_ptr() : 0,
    getStateLen: () => wasmReady && wasmModule.get_state_len ? wasmModule.get_state_len() : 0
  };
</script>

<!-- ══════ SCRIPT ═════════════════════════════════════════════════ -->
<script>
"use strict";

/* ── Colours ──────────────────────────────────────────────────────── */
const C = {
  bg:"#0d1117", card:"#161b22", border:"#30363d",
  accent:"#58a6ff", green:"#3fb950", purple:"#bc8cff",
  orange:"#f0883e", red:"#f85149", white:"#e6edf3",
  dim:"#8b949e", gold:"#d4a017", cyan:"#39d2c0"
};

/* ── Physics ──────────────────────────────────────────────────────── */
const phy = {
  v_p0:200, m_p:0.5, M_rod:3.0, L_rod:300, mode:0,
  I_rod:0, m_eff:0, r:0, L_i:0, v_pf:0, omega:0,
  KE_i:0, KE_f:0, KE_ball_f:0, KE_rod_f:0, KE_lost:0,
  L_ball_f:0, L_rod_f:0, L_total_f:0,

  recalc() {
    const r = this.L_rod / 2; this.r = r;
    const I = this.M_rod * this.L_rod**2 / 12; this.I_rod = I;
    const m_eff = this.M_rod / 3; this.m_eff = m_eff;
    const Li = this.m_p * this.v_p0 * r; this.L_i = Li;
    this.KE_i = 0.5 * this.m_p * this.v_p0**2;

    if (this.mode === 0) {
      const vpf = this.v_p0 * (this.m_p - m_eff) / (this.m_p + m_eff);
      this.v_pf = vpf;
      this.omega = (Li - this.m_p * vpf * r) / I;
      this.KE_ball_f = 0.5 * this.m_p * vpf**2;
      this.KE_rod_f  = 0.5 * I * this.omega**2;
      this.KE_f = this.KE_ball_f + this.KE_rod_f;
    } else if (this.mode === 1) {
      this.v_pf = 0; this.omega = Li / I;
      this.KE_ball_f = 0; this.KE_rod_f = 0.5 * I * this.omega**2;
      this.KE_f = this.KE_rod_f;
    } else {
      const It = I + this.m_p * r**2;
      this.v_pf = 0; this.omega = Li / It;
      this.KE_ball_f = 0.5 * this.m_p * (this.omega * r)**2;
      this.KE_rod_f  = 0.5 * I * this.omega**2;
      this.KE_f = 0.5 * It * this.omega**2;
    }
    this.L_ball_f  = this.mode===0 ? this.m_p*this.v_pf*r : 0;
    this.L_rod_f   = Li - this.L_ball_f;
    this.L_total_f = this.L_ball_f + this.L_rod_f;
    this.KE_lost   = this.KE_i - this.KE_f;
  }
};
phy.recalc();

/* ── Sim state ────────────────────────────────────────────────────── */
const sim = {
  phase:"ready", t:0,
  ball_x:0, ball_y:0, ball_vx:0, ball_vy:0, ball_r:14,
  rod_angle:0, rod_omega:0, stuck:false,
  rod_cx:0, rod_cy:0,
  hist_t:[], hist_Lb:[], hist_Lr:[], hist_Lt:[],
  hist_KEb:[], hist_KEr:[], hist_KEt:[],
  t_hit:null,

  reset() {
    this.phase="ready"; this.t=0;
    this.ball_x=0; this.ball_y=0; this.ball_vx=0; this.ball_vy=0;
    this.rod_angle=0; this.rod_omega=0; this.stuck=false;
    this.hist_t=[]; this.hist_Lb=[]; this.hist_Lr=[]; this.hist_Lt=[];
    this.hist_KEb=[]; this.hist_KEr=[]; this.hist_KEt=[];
    this.t_hit=null;
  },

  launch(cw, ch) {
    this.reset(); this.phase="moving";
    const r = phy.r;
    this.rod_cx = cw * 0.55; this.rod_cy = ch * 0.5;
    this.ball_x = this.rod_cx - 250;
    this.ball_y = this.rod_cy - r;
    this.ball_vx = phy.v_p0; this.ball_vy = 0;
  },

  step(dt) {
    if (this.phase === "ready") return;
    this.t += dt;
    const r = phy.r;
    const ex = this.rod_cx + r * Math.sin(this.rod_angle);
    const ey = this.rod_cy - r * Math.cos(this.rod_angle);

    if (this.phase === "moving") {
      this.ball_x += this.ball_vx * dt;
      this.ball_y += this.ball_vy * dt;
      const d = Math.hypot(this.ball_x - ex, this.ball_y - ey);
      if (d < this.ball_r + 6 && this.ball_vx > 0) this._collide();
    } else if (this.phase === "post") {
      this.rod_angle += this.rod_omega * dt;
      if (this.stuck) {
        this.ball_x = this.rod_cx + r * Math.sin(this.rod_angle);
        this.ball_y = this.rod_cy - r * Math.cos(this.rod_angle);
      } else {
        this.ball_x += this.ball_vx * dt;
        this.ball_y += this.ball_vy * dt;
      }
    }
    const Lb = this._Lb(), Lr = this.phase==="post" ? phy.I_rod*this.rod_omega : 0;
    const KEb = 0.5*phy.m_p*(this.ball_vx**2+this.ball_vy**2);
    const KEr = 0.5*phy.I_rod*this.rod_omega**2;
    this.hist_t.push(this.t); this.hist_Lb.push(Lb);
    this.hist_Lr.push(Lr); this.hist_Lt.push(Lb+Lr);
    this.hist_KEb.push(KEb); this.hist_KEr.push(KEr); this.hist_KEt.push(KEb+KEr);
  },

  _Lb() {
    const rx=this.ball_x-this.rod_cx, ry=this.ball_y-this.rod_cy;
    return phy.m_p*(rx*this.ball_vy - ry*this.ball_vx);
  },

  _collide() {
    this.t_hit = this.t; this.phase="post";
    if (phy.mode===0) { this.ball_vx=phy.v_pf; this.rod_omega=phy.omega; }
    else if (phy.mode===1) { this.ball_vx=0; this.ball_vy=0; this.rod_omega=phy.omega; }
    else { this.ball_vx=0; this.ball_vy=0; this.rod_omega=phy.omega; this.stuck=true; }
  }
};

/* ── Canvas helpers ───────────────────────────────────────────────── */
function hiDpi(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: rect.height };
}

function arrow(ctx, x1,y1, x2,y2, color, lw, label) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a = Math.atan2(y2-y1, x2-x1), hl=10;
  for (const da of [2.7, -2.7]) {
    ctx.beginPath(); ctx.moveTo(x2,y2);
    ctx.lineTo(x2-hl*Math.cos(a+da), y2-hl*Math.sin(a+da)); ctx.stroke();
  }
  if (label) {
    ctx.font = "bold 9px 'Segoe UI'"; ctx.fillStyle = color;
    ctx.fillText(label, (x1+x2)/2 - 20, Math.min(y1,y2) - 8);
  }
  ctx.restore();
}

/* ── Draw: sim canvas ─────────────────────────────────────────────── */
function drawSim() {
  const cv = document.getElementById("sim-canvas");
  const { ctx, w, h } = hiDpi(cv);

  // bg
  const bg = ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,"#0d1117"); bg.addColorStop(1,"#161b22");
  ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

  // grid dots
  ctx.fillStyle = "rgba(255,255,255,0.06)";
  for (let gx=0; gx<w; gx+=30) for (let gy=0; gy<h; gy+=30) ctx.fillRect(gx,gy,1,1);

  if (sim.phase === "ready") {
    ctx.font = "16px 'Segoe UI'"; ctx.fillStyle = C.dim;
    ctx.textAlign = "center"; ctx.fillText("Press LAUNCH to start", w/2, h/2);
    ctx.textAlign = "start"; return;
  }

  const r = phy.r, a = sim.rod_angle;
  const rcx=sim.rod_cx, rcy=sim.rod_cy;
  const tx = rcx + r*Math.sin(a), ty = rcy - r*Math.cos(a);
  const bx2= rcx - r*Math.sin(a), by2= rcy + r*Math.cos(a);

  // rod shadow
  ctx.strokeStyle="rgba(0,0,0,0.25)"; ctx.lineWidth=10; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(tx+3,ty+3); ctx.lineTo(bx2+3,by2+3); ctx.stroke();

  // rod body gradient
  const rg = ctx.createLinearGradient(tx,ty,bx2,by2);
  rg.addColorStop(0, C.purple); rg.addColorStop(1, "#7c5cbf");
  ctx.strokeStyle = rg; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(bx2,by2); ctx.stroke();

  // pivot
  ctx.fillStyle = C.white; ctx.beginPath(); ctx.arc(rcx,rcy,5,0,Math.PI*2); ctx.fill();
  // top-end
  ctx.fillStyle = C.orange; ctx.beginPath(); ctx.arc(tx,ty,4,0,Math.PI*2); ctx.fill();

  // ball
  const bx=sim.ball_x, by=sim.ball_y, br=sim.ball_r;
  // glow
  const gl = ctx.createRadialGradient(bx,by,0, bx,by,br*3);
  gl.addColorStop(0,"rgba(88,166,255,0.15)"); gl.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=gl; ctx.fillRect(bx-br*3,by-br*3,br*6,br*6);
  // body
  const bg2 = ctx.createRadialGradient(bx-br*.3,by-br*.3,0,bx,by,br*1.3);
  bg2.addColorStop(0,"#80caff"); bg2.addColorStop(0.7,C.accent); bg2.addColorStop(1,"#1a5276");
  ctx.fillStyle = bg2; ctx.strokeStyle = C.accent; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // velocity arrow
  if (showV && (Math.abs(sim.ball_vx)>1||Math.abs(sim.ball_vy)>1)) {
    const sc=0.4;
    arrow(ctx, bx, by-br-4, bx+sim.ball_vx*sc, by-br-4+sim.ball_vy*sc,
          C.green, 2.5, `v = ${sim.ball_vx.toFixed(0)} px/s`);
  }

  // omega arc
  if (showV && Math.abs(sim.rod_omega)>0.01) {
    const ar=30, span=Math.min(Math.abs(sim.rod_omega)*1.5, Math.PI*1.5);
    const dir = sim.rod_omega > 0 ? 1 : -1;
    ctx.strokeStyle=C.orange; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(rcx,rcy,ar, 0, dir*span, dir<0); ctx.stroke();
    // arrowhead at end of arc
    const ea = dir*span;
    const ex2 = rcx+ar*Math.cos(ea), ey2 = rcy+ar*Math.sin(ea);
    const ta = ea + dir*Math.PI/2;
    for (const da of [2.5,-2.5]) {
      ctx.beginPath(); ctx.moveTo(ex2,ey2);
      ctx.lineTo(ex2-8*Math.cos(ta+da), ey2-8*Math.sin(ta+da)); ctx.stroke();
    }
    ctx.font="bold 10px 'Segoe UI'"; ctx.fillStyle=C.orange;
    ctx.fillText(`ω = ${sim.rod_omega.toFixed(2)} rad/s`, rcx+ar+8, rcy+4);
  }

  // L overlay
  if (showL) {
    const Lb = sim.hist_Lb.length ? sim.hist_Lb[sim.hist_Lb.length-1] : 0;
    const Lr = sim.hist_Lr.length ? sim.hist_Lr[sim.hist_Lr.length-1] : 0;
    ctx.font = "10px 'Segoe UI'"; ctx.fillStyle = C.cyan;
    ctx.fillText(`L_ball  = ${Lb.toFixed(0)}`, 10, 20);
    ctx.fillText(`L_rod   = ${Lr.toFixed(0)}`, 10, 36);
    ctx.fillText(`L_total = ${(Lb+Lr).toFixed(0)}`, 10, 52);
  }

  // phase badge
  const badges = {ready:"READY",moving:"APPROACHING",post:"POST‑COLLISION"};
  const bcolors = {ready:C.dim,moving:C.accent,post:C.green};
  ctx.font="bold 11px 'Segoe UI'"; ctx.fillStyle=bcolors[sim.phase];
  ctx.textAlign="right"; ctx.fillText(badges[sim.phase], w-14, 22); ctx.textAlign="start";
}

/* ── Draw: L graph ────────────────────────────────────────────────── */
function drawLGraph() {
  const cv = document.getElementById("l-graph");
  const { ctx, w, h } = hiDpi(cv);
  ctx.fillStyle = C.card; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = C.border; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);

  ctx.font="bold 10px 'Segoe UI'"; ctx.fillStyle=C.accent;
  ctx.fillText("Angular Momentum vs Time", 10, 16);

  const ml=50, mr=15, mt=28, mb=30;
  const gw=w-ml-mr, gh=h-mt-mb;

  if (sim.hist_t.length < 2) {
    ctx.font="11px 'Segoe UI'"; ctx.fillStyle=C.dim;
    ctx.textAlign="center"; ctx.fillText("Launch to see L vs t graph", w/2, h/2);
    ctx.textAlign="start"; return;
  }

  const ox=ml, oy=h-mb;
  ctx.strokeStyle=C.dim; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ox,mt); ctx.lineTo(ox,oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(w-mr,oy); ctx.stroke();

  const tMax = Math.max(sim.hist_t[sim.hist_t.length-1], 0.1);
  const all = [...sim.hist_Lt,...sim.hist_Lb,...sim.hist_Lr];
  let Lmax = Math.max(...all.map(Math.abs)) || 1;
  let Lmin = Math.min(...all);
  if (Lmin>=0) Lmin = -Lmax*0.1;
  const Lrng = Math.max(Lmax-Lmin, 1);
  const txF = t => ox + t/tMax*gw;
  const tyF = L => oy - (L-Lmin)/Lrng*gh;

  // grid
  ctx.setLineDash([2,4]); ctx.strokeStyle="rgba(255,255,255,0.08)"; ctx.lineWidth=1;
  for (const f of [0.25,0.5,0.75,1]) {
    const yy=tyF(Lmin+Lrng*f);
    ctx.beginPath(); ctx.moveTo(ox,yy); ctx.lineTo(w-mr,yy); ctx.stroke();
  }
  ctx.setLineDash([]);

  // tick labels
  ctx.font="8px 'Segoe UI'"; ctx.fillStyle=C.dim;
  ctx.fillText(Lmax.toFixed(0), ox-44, tyF(Lmax)+4);
  ctx.fillText(Lmin.toFixed(0), ox-44, tyF(Lmin)+4);
  ctx.textAlign="right"; ctx.fillText(tMax.toFixed(2)+"s", w-mr, oy+14); ctx.textAlign="start";

  // datasets
  const ds = [
    [sim.hist_Lb, C.accent, "L_ball"],
    [sim.hist_Lr, C.purple, "L_rod"],
    [sim.hist_Lt, C.white,  "L_total"],
  ];
  for (const [data, color, name] of ds) {
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
    for (let i=0;i<data.length;i++) {
      const px=txF(sim.hist_t[i]), py=tyF(data[i]);
      i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  // collision marker
  if (sim.t_hit !== null) {
    ctx.setLineDash([4,4]); ctx.strokeStyle=C.red; ctx.lineWidth=1.5;
    const cx = txF(sim.t_hit);
    ctx.beginPath(); ctx.moveTo(cx,mt); ctx.lineTo(cx,oy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font="bold 8px 'Segoe UI'"; ctx.fillStyle=C.red;
    ctx.fillText("collision", cx+4, mt+12);
  }

  // legend
  let lx=ml+10, ly=mt+10;
  ctx.font="bold 8px 'Segoe UI'";
  for (const [,color,name] of ds) {
    ctx.strokeStyle=color; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+14,ly); ctx.stroke();
    ctx.fillStyle=C.white; ctx.fillText(name, lx+18, ly+3);
    lx += 80;
  }
}

/* ── Draw: energy bar chart ───────────────────────────────────────── */
function drawEnergy() {
  const cv = document.getElementById("energy-canvas");
  const { ctx, w, h } = hiDpi(cv);
  ctx.fillStyle = C.card; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = C.border; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);

  const modeNames = ["Elastic","Ball Stops","Ball Sticks"];
  ctx.font="bold 11px 'Segoe UI'"; ctx.fillStyle=C.gold;
  ctx.fillText(`Energy Breakdown — ${modeNames[phy.mode]}`, 12, 20);

  const mt=34, mb=50, mlr=30;
  const ch = h-mt-mb, cw = w-mlr*2;
  if (ch<30||cw<60) return;

  const KEi = phy.KE_i;
  if (KEi < 0.01) {
    ctx.font="10px 'Segoe UI'"; ctx.fillStyle=C.dim;
    ctx.textAlign="center"; ctx.fillText("Set v₀ > 0 to see energy", w/2, h/2);
    ctx.textAlign="start"; return;
  }

  // real-time values
  let keb, ker;
  if (sim.hist_KEb.length) {
    keb = sim.hist_KEb[sim.hist_KEb.length-1];
    ker = sim.hist_KEr[sim.hist_KEr.length-1];
  } else { keb=KEi; ker=0; }
  const ket = keb+ker, klost = Math.max(0, KEi-ket);

  const barW = Math.min(70, cw/4), gap = Math.max(36, cw/5);
  const totalW = barW*2+gap;
  const sx = mlr + (cw-totalW)/2;
  const maxKE = KEi*1.05;
  const yBase = mt+ch;

  function drawBar(x, sections, label) {
    let yBot = yBase;
    for (const [val, color, name] of sections) {
      const bh = (val/maxKE)*ch;
      if (bh<1) continue;
      const yt = yBot - bh;
      const g = ctx.createLinearGradient(x,yt,x+barW,yBot);
      const c1 = lightenHex(color, 30), c2 = color;
      g.addColorStop(0,c1); g.addColorStop(1,c2);
      ctx.fillStyle = g;
      roundRect(ctx, x, yt, barW, bh, 4); ctx.fill();

      // glow edge
      const gl = ctx.createLinearGradient(x,yt,x,yt+6);
      gl.addColorStop(0, hexAlpha(color,0.45)); gl.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=gl; ctx.fillRect(x,yt,barW,Math.min(6,bh));

      // label inside
      if (bh > 28) {
        ctx.font="bold 8px 'Segoe UI'"; ctx.fillStyle="#000";
        ctx.textAlign="center";
        ctx.fillText(name, x+barW/2, yt+bh/2-4);
        ctx.fillText(val.toFixed(0), x+barW/2, yt+bh/2+8);
        ctx.textAlign="start";
      }
      yBot = yt;
    }
    ctx.font="bold 10px 'Segoe UI'"; ctx.fillStyle=C.white;
    ctx.textAlign="center"; ctx.fillText(label, x+barW/2, yBase+16); ctx.textAlign="start";
  }

  drawBar(sx, [[KEi, C.accent, "KE_ball"]], "BEFORE");

  const afterSec = [[keb, C.accent, "KE_ball"], [ker, C.purple, "KE_rod"]];
  if (klost > 0.5) afterSec.push([klost, C.red, "Lost"]);
  drawBar(sx+barW+gap, afterSec, "AFTER");

  // axis
  ctx.strokeStyle=C.dim; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx-10,yBase); ctx.lineTo(sx+totalW+10,yBase); ctx.stroke();

  // scale ticks
  ctx.font="8px 'Segoe UI'"; ctx.fillStyle=C.dim;
  ctx.setLineDash([2,4]); ctx.strokeStyle="rgba(255,255,255,0.08)"; ctx.lineWidth=1;
  for (const frac of [0,0.25,0.5,0.75,1]) {
    const yy = yBase - frac*ch, val = frac*maxKE;
    ctx.fillText(val.toFixed(0), sx-46, yy+3);
    if (frac>0) { ctx.beginPath(); ctx.moveTo(sx-6,yy); ctx.lineTo(sx+totalW+6,yy); ctx.stroke(); }
  }
  ctx.setLineDash([]);

  // conservation badge
  const ratio = ket/KEi;
  ctx.font="bold 9px 'Segoe UI'";
  if (ratio > 0.99) {
    ctx.fillStyle=C.green;
    ctx.fillText(`KE conserved ✓  (KE_f/KE_i = ${ratio.toFixed(4)})`, 12, h-10);
  } else {
    ctx.fillStyle=C.orange;
    ctx.fillText(`KE lost: ${((1-ratio)*100).toFixed(1)}%  (KE_f/KE_i = ${ratio.toFixed(4)})`, 12, h-10);
  }

  // legend
  let lx = w-170, ly=mt+4;
  ctx.font="bold 8px 'Segoe UI'";
  for (const [color,name] of [[C.accent,"KE_ball"],[C.purple,"KE_rod"],[C.red,"KE_lost"]]) {
    ctx.fillStyle=color; roundRect(ctx,lx,ly-6,10,10,2); ctx.fill();
    ctx.fillStyle=C.white; ctx.fillText(name, lx+14, ly+3); lx+=56;
  }
}

/* ── Draw: equations panel ────────────────────────────────────────── */
function drawEqns() {
  const cv = document.getElementById("eqn-canvas");
  const { ctx, w, h } = hiDpi(cv);
  ctx.fillStyle = C.card; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = C.border; ctx.lineWidth=1; ctx.strokeRect(0,0,w,h);

  let y = 18;
  function line(text, color=C.white, bold=false, size=10) {
    ctx.font = (bold?"bold ":"") + size + "px Consolas, monospace";
    ctx.fillStyle = color;
    ctx.fillText(text, 12, y);
    y += size + 8;
  }

  line("── Parameters ──", C.accent, true, 11);
  line(`v₀     = ${phy.v_p0.toFixed(0)} px/s`);
  line(`m_ball = ${phy.m_p.toFixed(2)} kg`);
  line(`M_rod  = ${phy.M_rod.toFixed(1)} kg`);
  line(`ℓ_rod  = ${phy.L_rod.toFixed(0)} px`);
  line(`r      = ${phy.r.toFixed(0)} px`);
  y += 4;
  line("── Derived ──", C.accent, true, 11);
  line(`I_rod  = ${phy.I_rod.toFixed(0)}`);
  line(`m_eff  = ${phy.m_eff.toFixed(2)} kg`);
  line(`L_i    = ${phy.L_i.toFixed(0)}`);
  y += 4;
  line("── Results ──", C.green, true, 11);
  const mn = ["Elastic","Ball stops","Ball sticks"];
  line(`Mode: ${mn[phy.mode]}`, C.gold, true);
  line(`v_pf   = ${phy.v_pf.toFixed(1)} px/s`);
  line(`ω      = ${phy.omega.toFixed(3)} rad/s`);
  y += 4;
  line("── Energy ──", C.gold, true, 11);
  line(`KE_i       = ${phy.KE_i.toFixed(0)}`);
  line(`KE_ball_f  = ${phy.KE_ball_f.toFixed(0)}`);
  line(`KE_rod_f   = ${phy.KE_rod_f.toFixed(0)}`);
  line(`KE_f       = ${phy.KE_f.toFixed(0)}`);
  line(`KE_lost    = ${phy.KE_lost.toFixed(0)}`);
  const ratio = phy.KE_i>0 ? phy.KE_f/phy.KE_i : 0;
  line(`KE_f/KE_i  = ${ratio.toFixed(4)}`, ratio>0.99?C.green:C.orange, true);
  y += 4;
  line("── Key Formulas ──", C.purple, true, 11);
  line("L = m·v·r", C.dim);
  line("I_rod = M·ℓ²/12", C.dim);
  line("m_eff = M/3", C.dim);
  if (phy.mode===0) line("v_pf=v₀(m-m_eff)/(m+m_eff)", C.dim);
  else if (phy.mode===1) line("ω = L_i / I_rod", C.dim);
  else line("ω = L_i/(I_rod+m·r²)", C.dim);
}

/* ── Utility ──────────────────────────────────────────────────────── */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function hexToRgb(hex) {
  hex = hex.replace("#","");
  return [parseInt(hex.substring(0,2),16), parseInt(hex.substring(2,4),16), parseInt(hex.substring(4,6),16)];
}

function lightenHex(hex, amt) {
  let [r,g,b] = hexToRgb(hex);
  r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
  return `rgb(${r},${g},${b})`;
}

function hexAlpha(hex, a) {
  const [r,g,b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

/* ── Wiring ───────────────────────────────────────────────────────── */
let showV = true, showL = true, running = false, animId = null;

function readSliders() {
  phy.v_p0  = +document.getElementById("sl-v").value;
  phy.m_p   = +document.getElementById("sl-m").value / 100;
  phy.M_rod = +document.getElementById("sl-M").value / 10;
  phy.L_rod = +document.getElementById("sl-L").value;
  document.getElementById("vl-v").textContent = phy.v_p0.toFixed(0) + " px/s";
  document.getElementById("vl-m").textContent = phy.m_p.toFixed(2) + " kg";
  document.getElementById("vl-M").textContent = phy.M_rod.toFixed(1) + " kg";
  document.getElementById("vl-L").textContent = phy.L_rod.toFixed(0) + " px";
  phy.recalc();
  drawEqns();
  drawEnergy();
}

document.getElementById("sl-v").addEventListener("input", readSliders);
document.getElementById("sl-m").addEventListener("input", readSliders);
document.getElementById("sl-M").addEventListener("input", readSliders);
document.getElementById("sl-L").addEventListener("input", readSliders);

document.querySelectorAll('input[name=mode]').forEach(r => r.addEventListener("change", e => {
  phy.mode = +e.target.value; phy.recalc(); drawEqns(); drawEnergy();
}));

document.getElementById("cb-v").addEventListener("change", e => showV = e.target.checked);
document.getElementById("cb-L").addEventListener("change", e => showL = e.target.checked);

document.getElementById("btn-launch").addEventListener("click", () => {
  phy.recalc();
  const cv = document.getElementById("sim-canvas");
  const rect = cv.getBoundingClientRect();
  sim.launch(rect.width, rect.height);
  running = true;
  document.getElementById("btn-pause").textContent = "PAUSE";
  if (!animId) tick();
});

document.getElementById("btn-pause").addEventListener("click", () => {
  running = !running;
  document.getElementById("btn-pause").textContent = running ? "PAUSE" : "RESUME";
  if (running && !animId) tick();
});

document.getElementById("btn-reset").addEventListener("click", () => {
  running = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  sim.reset();
  document.getElementById("btn-pause").textContent = "PAUSE";
  drawSim(); drawLGraph(); drawEnergy();
});

/* ── Animation loop ───────────────────────────────────────────────── */
function tick() {
  if (running) {
    sim.step(0.016);
  }
  drawSim(); drawLGraph(); drawEnergy();
  animId = running ? requestAnimationFrame(tick) : null;
}

/* ── Resize handling ──────────────────────────────────────────────── */
window.addEventListener("resize", () => { drawSim(); drawLGraph(); drawEnergy(); drawEqns(); });

/* ── Initial draw ─────────────────────────────────────────────────── */
requestAnimationFrame(() => { readSliders(); drawSim(); drawLGraph(); drawEnergy(); drawEqns(); });

</script>
