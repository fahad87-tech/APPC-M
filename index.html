<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPC-M</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    header { text-align: center; margin-bottom: 50px; }
    h1 { font-size: 32px; font-weight: bold; letter-spacing: 6px; color: rgba(255,255,255,0.9); margin-bottom: 10px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 330px)); gap: 22px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 30px 26px;
      text-decoration: none;
      color: #e0e0e0;
      transition: background 0.25s, transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      display: block;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #64b5f6, #bb86fc, #03dac6);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(100,181,246,0.45);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(100,181,246,0.12), 0 0 0 1px rgba(100,181,246,0.08);
    }
    .card:hover::before { opacity: 1; }
    .card-icon { font-size: 40px; margin-bottom: 16px; display: inline-block; }
    .card-title { font-size: 17px; font-weight: bold; color: #90caf9; margin-bottom: 5px; letter-spacing: 0.5px; }
    .card-desc { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.7; }
  </style>
</head>
<body>
  <header>
    <h1>⚛ APPC-M</h1>
    <p class="subtitle">Physics Simulations Collection</p>
  </header>
  <div class="container">
    <div class="grid">
      <a class="card" href="Beyond Physics SIMS/">
        <div class="card-icon">📁</div>
        <div class="card-title">Beyond Physics SIMS</div>
        <div class="card-desc">Interactive physics simulations for AP Physics classrooms</div>
      </a>
      <a class="card" href="Complete Clasroom Tool/Combined_App.html">
        <div class="card-icon">🎓</div>
        <div class="card-title">Complete Classroom Tool</div>
        <div class="card-desc">All-in-one classroom management tools</div>
      </a>
    </div>
  </div>
</body>
</html>
